<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Oracle v8.9</title>
    <style>
        :root { --sentinel: #00ff41; --bg: #050505; --accent: #00d4ff; --gold: #d4af37; }
        body { background: var(--bg); color: var(--sentinel); font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .header { border-bottom: 2px solid var(--sentinel); width: 100%; text-align: center; padding-bottom: 10px; }
        .nav-box { width: 90%; max-width: 650px; background: #111; border: 1px solid #333; padding: 15px; margin: 15px; border-left: 5px solid var(--accent); }
        .input-group { margin-bottom: 10px; display: flex; flex-direction: column; }
        input { background: #000; border: 1px solid #444; color: var(--accent); padding: 8px; font-size: 1rem; }
        canvas { border: 1px solid var(--accent); background: #000; box-shadow: 0 0 30px rgba(0, 212, 255, 0.1); }
        .btn { background: transparent; border: 1px solid var(--sentinel); color: var(--sentinel); padding: 10px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn:hover { background: var(--sentinel); color: #000; }
    </style>
</head>
<body>

<div class="header">
    <strong>PROJECT NP: ADELIC ORACLE v8.9</strong>
    <div style="font-size: 0.7rem; color: #888;">[DETERMINISTIC PROBLEM LOOKUP]</div>
</div>

<div class="nav-box">
    <div class="input-group">
        <label style="font-size:0.7rem; color:var(--gold)">PROBLEM ANCHOR (Entropy Base)</label>
        <input type="text" id="prob-anchor" value="40947044">
    </div>
    <div class="input-group">
        <label style="font-size:0.7rem; color:var(--accent)">SOLUTION INDEX (Residue)</label>
        <input type="text" id="sol-index" value="0">
    </div>
    <button class="btn" onclick="startUnifiedInference()">Manifest Isomorphism</button>
</div>

<canvas id="mainCanvas"></canvas>
<div id="log" style="font-size: 0.7rem; color: #555; margin-top: 10px; width: 90%; max-width: 650px;">> System Ready.</div>

<script>
let z=3, N=9, total=81, isRunning = false;
let board = new Uint16Array(81), fixed = new Uint16Array(81);
const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');

function log(msg) { document.getElementById('log').innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + document.getElementById('log').innerHTML; }

function init() {
    canvas.width = canvas.height = 450;
    render();
}

async function startUnifiedInference() {
    if (isRunning) return;
    isRunning = true;
    
    // Rigorous Unification: Problem + Index = Unique Path
    let probBase = BigInt(document.getElementById('prob-anchor').value);
    let solIndex = BigInt(document.getElementById('sol-index').value);
    
    // MSB Injection to break symmetry
    let activePath = (probBase ^ (1n << 63n)) + solIndex;
    
    let d = 0, scanStep = 0n;
    log(`Syncing to Manifold: Prob(${probBase}) | Index(${solIndex})`);

    while (isRunning) {
        // Delayed Grounding: Ripple the entire grid first
        for (let i = 0; i < total; i++) {
            if (fixed[i] !== 0) board[i] = fixed[i];
            else {
                let seed = Number(((activePath ^ BigInt(i)) * 0x517cc1b727220a95n) % 0xFFFFFFFn);
                board[i] = (Math.abs(seed) % N) + 1;
            }
        }

        // Test the residue at the end of the manifold
        if (checkTrinity()) {
            isRunning = false;
            render(true);
            log(`<b>SINGULARITY ATTAINED.</b> Residue Grounded at Step ${scanStep}`);
            break;
        } else {
            // DPI: Shift the residue until ground is found
            scanStep++;
            activePath = (probBase ^ (1n << 63n)) + solIndex + scanStep;
            if (scanStep % 2000n === 0n) {
                render();
                await new Promise(r => setTimeout(r, 0));
            }
        }
    }
}

function checkTrinity() {
    let rM = new Array(9).fill(0), cM = new Array(9).fill(0), bM = new Array(9).fill(0);
    for (let i = 0; i < total; i++) {
        let r = Math.floor(i / 9), c = i % 9, b = Math.floor(r / 3) * 3 + Math.floor(c / 3);
        let bit = 1 << board[i];
        if ((rM[r] & bit) || (cM[c] & bit) || (bM[b] & bit)) return false;
        rM[r] |= bit; cM[c] |= bit; bM[b] |= bit;
    }
    return true;
}

function render(final = false) {
    const s = 450 / 9; ctx.clearRect(0, 0, 450, 450);
    for (let i = 0; i < 81; i++) {
        let x = (i % 9) * s, y = Math.floor(i / 9) * s;
        ctx.strokeStyle = "#222"; ctx.strokeRect(x, y, s, s);
        if (board[i]) {
            ctx.fillStyle = fixed[i] ? "var(--gold)" : (final ? "var(--sentinel)" : "#444");
            ctx.textAlign = "center"; ctx.fillText(board[i], x + s/2, y + s * 0.7);
        }
    }
}

canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const idx = Math.floor((e.clientY - rect.top) / (450/9)) * 9 + Math.floor((e.clientX - rect.left) / (450/9));
    let v = prompt("Fix:"); if (v) fixed[idx] = parseInt(v); render();
});

init();
</script>
</body>
</html>
