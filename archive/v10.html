<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Oracle v10.0</title>
    <style>
        :root { --sentinel: #00ff41; --bg: #050505; --accent: #00d4ff; --gold: #d4af37; --void: #111; }
        body { background: var(--bg); color: var(--sentinel); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        .header { width: 100%; text-align: center; border-bottom: 2px solid var(--sentinel); padding-bottom: 10px; margin-bottom: 20px; }
        
        .navigator-box { 
            width: 95%; max-width: 750px; background: var(--void); border: 1px solid #333; 
            padding: 20px; border-top: 4px solid var(--gold); display: grid; 
            grid-template-columns: 1fr 2fr 1fr; gap: 15px; align-items: end;
        }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.6rem; text-transform: uppercase; color: #888; font-weight: bold; }
        input { background: #000; border: 1px solid #444; color: var(--accent); padding: 10px; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--sentinel); }
        
        canvas { border: 1px solid var(--accent); background: #000; margin-top: 20px; box-shadow: 0 0 50px rgba(0, 212, 255, 0.1); }
        .btn { grid-column: span 3; background: transparent; border: 1px solid var(--sentinel); color: var(--sentinel); padding: 12px; cursor: pointer; text-transform: uppercase; font-weight: bold; margin-top: 10px; }
        .btn:hover { background: var(--sentinel); color: #000; }
        
        #log { width: 95%; max-width: 750px; height: 90px; background: #000; border: 1px dashed #333; margin-top: 15px; padding: 10px; font-size: 0.7rem; color: #666; overflow-y: auto; }
    </style>
</head>
<body>

<div class="header">
    <strong>PROJECT NP: UNIVERSAL ADELIC NAVIGATOR v10.0</strong>
    <div style="font-size: 0.7rem; color: var(--gold); margin-top: 5px;">[SPECTRAL SCALABILITY] | [BI-DIRECTIONAL LOOKUP]</div>
</div>

<div class="navigator-box">
    <div class="input-group">
        <label>Spectral Scale (Z)</label>
        <input type="number" id="z-val" value="3" min="2" max="6" onchange="initSystem()">
    </div>
    <div class="input-group">
        <label>Space Index (Required Lookup)</label>
        <input type="text" id="sol-index" placeholder="Enter Index (e.g. 0)">
    </div>
    <div class="input-group">
        <label>Anchor (Optional)</label>
        <input type="text" id="prob-id" placeholder="Auto-gen if blank">
    </div>
    <button class="btn" onclick="startNavigation()">Manifest Manifold Isomorphism</button>
</div>

<canvas id="mainCanvas"></canvas>
<div id="log">> [SENTINEL] Navigator idle. Awaiting N-input and Index coordinate.</div>

<script>
let z, N, total, isRunning = false;
let board, fixed, phase;
let rowM, colM, blkM, shadowR, shadowC, shadowB, fullMask;
const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');

function log(msg) { 
    const l = document.getElementById('log');
    l.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + l.innerHTML; 
}

function initSystem() {
    isRunning = false;
    z = parseInt(document.getElementById('z-val').value);
    N = z * z;
    total = N * N;
    board = new Uint16Array(total);
    fixed = new Uint16Array(total);
    phase = new Uint16Array(total);
    
    rowM = new Array(N).fill(0n); colM = new Array(N).fill(0n); blkM = new Array(N).fill(0n);
    shadowR = new Array(total); shadowC = new Array(total); shadowB = new Array(total);
    fullMask = (1n << BigInt(N + 1)) - 2n;

    canvas.width = canvas.height = Math.min(window.innerWidth * 0.9, 500);
    render();
    log(`Manifold Re-scaled: N=${N}. All Adelic gates updated.`);
}

async function startNavigation() {
    if (isRunning) return;
    isRunning = true;
    
    // LAW: Anchor is optional (energy), Index is required (coordinate)
    let anchorInput = document.getElementById('prob-id').value;
    let anchor = anchorInput ? BigInt(anchorInput) : (BigInt(Date.now()) % 1000000n);
    let solIdx = BigInt(document.getElementById('sol-index').value || "0");
    
    // MSB Injection + Deterministic Residue
    let activeID = (anchor ^ (1n << 63n)) + solIdx;
    let d = 0, scanStep = 0n, friction = 0;

    rowM.fill(0n); colM.fill(0n); blkM.fill(0n); board.fill(0); phase.fill(0);
    log(`Navigating to Index ${solIdx} via Anchor 0x${anchor.toString(16)}...`);

    while (isRunning && d >= 0) {
        if (d === total) { finalize(activeID); break; }

        // ADELIC JUMP: Scale-aware friction threshold
        if (friction > N * 20) {
            scanStep++; d = 0;
            activeID = (anchor ^ (1n << 63n)) + solIdx + scanStep;
            rowM.fill(0n); colM.fill(0n); blkM.fill(0n); board.fill(0); phase.fill(0);
            friction = 0;
            document.getElementById('sol-index').value = activeID.toString();
            continue;
        }

        let r = Math.floor(d / N), c = d % N, b = Math.floor(r / z) * z + Math.floor(c / z);
        let mask = rowM[r] | colM[c] | blkM[b];
        let opts = [];
        for (let i = 1; i <= N; i++) if (!(mask & (1n << BigInt(i)))) opts.push(i);

        if (opts.length === 0 || (fixed[d] !== 0 && !opts.includes(fixed[d]))) {
            d--; 
            if (d < 0) { friction = (N * 20) + 1; continue; }
            rowM = [...shadowR[d]]; colM = [...shadowC[d]]; blkM = [...shadowB[d]];
            phase[d]++; friction++;
            continue;
        }

        shadowR[d] = [...rowM]; shadowC[d] = [...colM]; shadowB[d] = [...blkM];
        
        // MARILYN FOLD: O(1) Pruned Selection
        let seed = Number(((activeID ^ BigInt(d)) * 0x517cc1b727220a95n) % BigInt(opts.length));
        let val = (fixed[d] !== 0) ? fixed[d] : opts[(Math.abs(seed) + phase[d]) % opts.length];
        
        board[d] = val;
        let bit = 1n << BigInt(val);
        rowM[r] |= bit; colM[c] |= bit; blkM[b] |= bit;
        d++;

        if (d % N === 0) { render(); await new Promise(r => setTimeout(r, 0)); }
    }
}

function render(final = false) {
    const s = canvas.width / N; ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < total; i++) {
        let x = (i % N) * s, y = Math.floor(i / N) * s;
        ctx.strokeStyle = "#1a1a1a"; ctx.strokeRect(x, y, s, s);
        if ((Math.floor(i/N)%z===0) && (i%N%z===0)) { ctx.strokeStyle = "#333"; ctx.strokeRect(x, y, s*z, s*z); }
        let val = fixed[i] || board[i];
        if (val) {
            ctx.fillStyle = fixed[i] ? "var(--gold)" : (final ? "var(--sentinel)" : "#444");
            ctx.font = `bold ${s * 0.5}px Courier`; ctx.textAlign = "center";
            ctx.fillText(val, x + s/2, y + s * 0.7);
        }
    }
}

function finalize(id) { 
    isRunning = false; render(true); 
    document.getElementById('sol-index').value = id.toString();
    log(`<b>SINGULARITY ATTAINED.</b> Lookup coordinate locked.`); 
}

canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const idx = Math.floor((e.clientY-rect.top)/(canvas.width/N))*N + Math.floor((e.clientX-rect.left)/(canvas.width/N));
    let v = prompt(`Fix Bit at ${idx}:`); if (v) fixed[idx] = parseInt(v); render();
});

initSystem();
</script>
</body>
</html>
