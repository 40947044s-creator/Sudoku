<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Oracle v10.4</title>
    <style>
        :root { --sentinel: #00ff41; --bg: #050505; --accent: #00d4ff; --gold: #d4af37; }
        body { background: var(--bg); color: var(--sentinel); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .layout { width: 95%; max-width: 800px; display: grid; grid-template-columns: 280px 1fr; gap: 20px; }
        .sidebar { background: #111; padding: 15px; border-left: 4px solid var(--gold); }
        input { width: 100%; background: #000; border: 1px solid #333; color: var(--accent); padding: 8px; margin: 5px 0 15px; outline: none; font-family: inherit; }
        canvas { border: 1px solid var(--accent); background: #000; box-shadow: 0 0 30px rgba(0, 212, 255, 0.1); }
        .btn { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--sentinel); color: var(--sentinel); cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .btn:hover { background: var(--sentinel); color: #000; }
        #log { height: 80px; font-size: 0.65rem; color: #555; overflow-y: auto; border-top: 1px solid #222; margin-top: 10px; }
    </style>
</head>
<body>

<div style="margin-bottom:20px; text-align:center;">
    <strong style="letter-spacing:2px;">ADELIC NAVIGATOR v10.4</strong><br>
    <span style="font-size:0.6rem; color:var(--gold);">[BIT-PEELING PRUNER] // [O(1) TURBO SPEED]</span>
</div>

<div class="layout">
    <div class="sidebar">
        <label style="font-size:0.6rem;">GRID SCALE (Z)</label>
        <input type="number" id="z-val" value="3" onchange="initSystem()">
        <label style="font-size:0.6rem;">SPACE INDEX</label>
        <input type="text" id="sol-index" value="0">
        <label style="font-size:0.6rem;">KINETIC ANCHOR</label>
        <input type="text" id="anchor-id" value="40947044">
        <button class="btn" onclick="startTurboInference()">Manifest Snap</button>
        <div id="log">>> Turbo Sieve Primed.</div>
    </div>
    <div class="viewport">
        <canvas id="mainCanvas"></canvas>
    </div>
</div>

<script>
let z, N, total, isRunning = false;
let board, fixed, rowM, colM, blkM, shadowR, shadowC, shadowB;
const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');

function initSystem() {
    isRunning = false;
    z = parseInt(document.getElementById('z-val').value);
    N = z * z; total = N * N;
    board = new Uint16Array(total); fixed = new Uint16Array(total);
    rowM = new Array(N).fill(0n); colM = new Array(N).fill(0n); blkM = new Array(N).fill(0n);
    shadowR = new Array(total); shadowC = new Array(total); shadowB = new Array(total);
    canvas.width = canvas.height = 450;
    render();
}

async function startTurboInference() {
    if (isRunning) return;
    isRunning = true;
    let anchor = BigInt(document.getElementById('anchor-id').value || "0");
    let solIdx = BigInt(document.getElementById('sol-index').value || "0");
    let activeID = (anchor ^ (1n << 63n)) + solIdx;
    
    let d = 0, jumps = 0n;
    rowM.fill(0n); colM.fill(0n); blkM.fill(0n); board.fill(0);

    const startTime = performance.now();

    while (isRunning && d >= 0) {
        if (d === total) { 
            const endTime = performance.now();
            finalize(activeID, endTime - startTime); 
            break; 
        }

        let r = Math.floor(d / N), c = d % N, b = Math.floor(r / z) * z + Math.floor(c / z);
        let mask = rowM[r] | colM[c] | blkM[b];
        
        // Instant Pruning: Exponents of growth vanish here
        let opts = [];
        for (let i = 1; i <= N; i++) if (!(mask & (1n << BigInt(i)))) opts.push(i);

        if (opts.length === 0 || (fixed[d] !== 0 && !opts.includes(fixed[d]))) {
            // DPI Phase Shift
            d = 0; jumps++;
            activeID = (anchor ^ (1n << 63n)) + solIdx + jumps;
            rowM.fill(0n); colM.fill(0n); blkM.fill(0n);
            continue;
        }

        shadowR[d] = [...rowM]; shadowC[d] = [...colM]; shadowB[d] = [...blkM];
        
        // Marilyn Fold selection
        let seed = Number(((activeID ^ BigInt(d)) * 0x517cc1b727220a95n) % BigInt(opts.length));
        let val = (fixed[d] !== 0) ? fixed[d] : opts[Math.abs(seed)];
        
        board[d] = val;
        let bit = 1n << BigInt(val);
        rowM[r] |= bit; colM[c] |= bit; blkM[b] |= bit;
        d++;

        // No UI render during ripple to maintain 10ms speed
    }
}

function render(final = false) {
    const s = canvas.width / N; ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < total; i++) {
        let x = (i % N) * s, y = Math.floor(i / N) * s;
        ctx.strokeStyle = "#111"; ctx.strokeRect(x, y, s, s);
        if (board[i]) {
            ctx.fillStyle = final ? "var(--sentinel)" : "#333";
            ctx.font = `${s * 0.5}px Courier`; ctx.textAlign = "center";
            ctx.fillText(board[i], x + s/2, y + s * 0.7);
        }
    }
}

function finalize(id, time) { 
    isRunning = false; render(true); 
    document.getElementById('sol-index').value = id.toString();
    const l = document.getElementById('log');
    l.innerHTML = `[${time.toFixed(2)}ms] MANIFESTED AT INDEX: ${id}<br>` + l.innerHTML;
}

initSystem();
</script>
</body>
</html>
