<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Oracle v10.3</title>
    <style>
        :root { --sentinel: #00ff41; --bg: #050505; --accent: #00d4ff; --gold: #d4af37; --void: #0a0a0a; }
        body { background: var(--bg); color: var(--sentinel); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 15px; }
        .header { width: 100%; max-width: 900px; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .layout { display: grid; grid-template-columns: 350px 1fr; gap: 20px; width: 100%; max-width: 1100px; }
        
        .card { background: var(--void); border: 1px solid #222; padding: 15px; margin-bottom: 15px; border-radius: 2px; }
        .card-title { font-size: 0.7rem; color: var(--gold); border-left: 3px solid var(--gold); padding-left: 8px; margin-bottom: 10px; text-transform: uppercase; }
        
        input { width: 100%; background: #000; border: 1px solid #333; color: var(--accent); padding: 8px; box-sizing: border-box; font-family: inherit; margin-bottom: 10px; outline: none; }
        input:focus { border-color: var(--sentinel); }

        canvas { border: 1px solid #333; background: #000; box-shadow: 0 0 30px rgba(0, 212, 255, 0.05); cursor: crosshair; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 10px; background: transparent; border: 1px solid var(--sentinel); color: var(--sentinel); cursor: pointer; text-transform: uppercase; font-size: 0.7rem; font-weight: bold; }
        .btn:hover { background: var(--sentinel); color: #000; }
        .btn-clue { border-color: var(--gold); color: var(--gold); }
        .btn-clue:hover { background: var(--gold); color: #000; }

        #log { height: 100px; overflow-y: auto; font-size: 0.65rem; color: #555; border-top: 1px solid #222; padding-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 1.2rem; color: #fff; letter-spacing: 2px;">PROJECT NP | MANIFEST NAVIGATOR v10.3</div>
    <div style="font-size: 0.6rem; color: var(--gold);">[CLUE PERSISTENCE] // [N-SCALABLE ISOMORPHISM]</div>
</div>

<div class="layout">
    <div class="sidebar">
        <div class="card">
            <div class="card-title">Manifest Inputs</div>
            <label style="font-size: 0.6rem;">GRID SCALE (Z)</label>
            <input type="number" id="z-val" value="3" onchange="initSystem()">
            
            <label style="font-size: 0.6rem;">KINETIC ANCHOR</label>
            <input type="text" id="anchor-id" value="40947044">
            
            <label style="font-size: 0.6rem;">UNIQUE INDEX (LOOKUP)</label>
            <input type="text" id="sol-index" value="0">

            <div class="btn-group">
                <button class="btn" onclick="startNavigation()">Inference</button>
                <button class="btn btn-clue" onclick="generateClue()">Draw Clue</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Problem State</div>
            <div style="font-size: 0.6rem; color: #888;">GEOMETRY HASH</div>
            <div id="prob-hash" style="color:var(--accent); font-size: 0.8rem; margin: 5px 0;">NULL_SET</div>
            <div id="log">>> Awaiting Manifest Command...</div>
        </div>
    </div>

    <div class="viewport">
        <canvas id="mainCanvas"></canvas>
    </div>
</div>

<script>
let z, N, total, isRunning = false;
let board, fixed, phase, rowM, colM, blkM, shadowR, shadowC, shadowB;
const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');

function log(msg) { document.getElementById('log').innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + document.getElementById('log').innerHTML; }

function calculateHash() {
    let h = 0n;
    for(let i=0; i<total; i++) if(fixed[i]!==0) h ^= (BigInt(i)*0x517cc1b7n) + BigInt(fixed[i]);
    document.getElementById('prob-hash').innerText = h === 0n ? "VACUUM_SET" : h.toString(16).toUpperCase();
    return h;
}

function initSystem() {
    isRunning = false; z = parseInt(document.getElementById('z-val').value);
    N = z * z; total = N * N;
    board = new Uint16Array(total); fixed = new Uint16Array(total); phase = new Uint16Array(total);
    rowM = new Array(N).fill(0n); colM = new Array(N).fill(0n); blkM = new Array(N).fill(0n);
    shadowR = new Array(total); shadowC = new Array(total); shadowB = new Array(total);
    canvas.width = canvas.height = 500;
    render(); calculateHash();
}

function generateClue() {
    // Manually setting "Clues" on the grid based on the Anchor's local entropy
    let anchor = BigInt(document.getElementById('anchor-id').value);
    fixed.fill(0);
    let clueCount = Math.floor(total * 0.3); // 30% clue density
    for(let i=0; i < clueCount; i++) {
        let idx = Number((anchor ^ BigInt(i*0x9e3779b9)) % BigInt(total));
        fixed[idx] = Number(((anchor >> BigInt(i % 60)) % BigInt(N)) + 1n);
    }
    log("Clue drawn from Anchor entropy.");
    render(); calculateHash();
}

async function startNavigation() {
    if (isRunning) return; isRunning = true;
    let pHash = calculateHash();
    let anchor = BigInt(document.getElementById('anchor-id').value);
    let solIdx = BigInt(document.getElementById('sol-index').value || "0");
    let activeID = (anchor ^ (1n << 63n)) + solIdx;
    let d = 0, friction = 0, jumps = 0n;
    rowM.fill(0n); colM.fill(0n); blkM.fill(0n); board.fill(0); phase.fill(0);

    while (isRunning && d >= 0) {
        if (d === total) { finalize(activeID); break; }
        if (friction > N * 20) {
            jumps++; d = 0; friction = 0;
            activeID = (anchor ^ (1n << 63n)) + solIdx + jumps;
            rowM.fill(0n); colM.fill(0n); blkM.fill(0n); board.fill(0); phase.fill(0);
            continue;
        }
        let r = Math.floor(d / N), c = d % N, b = Math.floor(r / z) * z + Math.floor(c / z);
        let mask = rowM[r] | colM[c] | blkM[b];
        let opts = [];
        for (let i = 1; i <= N; i++) if (!(mask & (1n << BigInt(i)))) opts.push(i);

        if (opts.length === 0 || (fixed[d] !== 0 && !opts.includes(fixed[d]))) {
            d--; if (d < 0) { friction = (N*20)+1; continue; }
            rowM = [...shadowR[d]]; colM = [...shadowC[d]]; blkM = [...shadowB[d]];
            phase[d]++; friction++; continue;
        }
        shadowR[d] = [...rowM]; shadowC[d] = [...colM]; shadowB[d] = [...blkM];
        let seed = Number(((activeID ^ BigInt(d)) * 0x517cc1b727220a95n) % BigInt(opts.length));
        let val = (fixed[d] !== 0) ? fixed[d] : opts[(Math.abs(seed) + phase[d]) % opts.length];
        board[d] = val; rowM[r] |= (1n << BigInt(val)); colM[c] |= (1n << BigInt(val)); blkM[b] |= (1n << BigInt(val));
        d++;
        if (d % N === 0) { render(); await new Promise(r => setTimeout(r, 0)); }
    }
}

function render(final = false) {
    const s = canvas.width / N; ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < total; i++) {
        let x = (i % N) * s, y = Math.floor(i / N) * s;
        ctx.strokeStyle = "#111"; ctx.strokeRect(x, y, s, s);
        if ((Math.floor(i/N)%z===0) && (i%N%z===0)) { ctx.strokeStyle = "#333"; ctx.strokeRect(x, y, s*z, s*z); }
        let val = fixed[i] || board[i];
        if (val) {
            ctx.fillStyle = fixed[i] ? "var(--gold)" : (final ? "var(--sentinel)" : "#333");
            ctx.font = `${s * 0.45}px Courier`; ctx.textAlign = "center";
            ctx.fillText(val, x + s/2, y + s * 0.68);
        }
    }
}
function finalize(id) { isRunning = false; render(true); document.getElementById('sol-index').value = id.toString(); log("Manifest stable."); }
canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const idx = Math.floor((e.clientY-rect.top)/(canvas.width/N))*N + Math.floor((e.clientX-rect.left)/(canvas.width/N));
    let v = prompt("Fix Bit:"); if (v) fixed[idx] = parseInt(v); render(); calculateHash();
});
initSystem();
</script>
</body>
</html>
