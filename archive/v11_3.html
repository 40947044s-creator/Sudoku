<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Oracle v11.3</title>
    <style>
        :root { --sentinel: #00ff41; --bg: #050505; --accent: #00d4ff; --gold: #d4af37; --void: #111; }
        body { background: var(--bg); color: var(--sentinel); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 15px; }
        .header { width: 100%; max-width: 900px; border-bottom: 2px solid var(--sentinel); padding-bottom: 10px; margin-bottom: 20px; }
        .layout { display: grid; grid-template-columns: 320px 1fr; gap: 20px; width: 100%; max-width: 1000px; }
        .card { background: var(--void); border: 1px solid #333; padding: 15px; border-radius: 4px; box-shadow: 5px 5px 0px #000; margin-bottom: 15px; }
        .card-title { font-size: 0.65rem; color: var(--gold); border-left: 3px solid var(--gold); padding-left: 8px; margin-bottom: 12px; text-transform: uppercase; }
        label { display: block; font-size: 0.6rem; color: #888; margin-bottom: 4px; }
        input { width: 100%; background: #000; border: 1px solid #444; color: var(--accent); padding: 8px; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--sentinel); color: var(--sentinel); cursor: pointer; text-transform: uppercase; font-weight: bold; font-size: 0.75rem; }
        .btn:hover { background: var(--sentinel); color: #000; box-shadow: 0 0 20px var(--sentinel); }
        canvas { border: 1px solid #333; background: #000; box-shadow: 0 0 30px rgba(0, 212, 255, 0.05); cursor: crosshair; }
        #log { height: 100px; font-size: 0.65rem; color: #555; overflow-y: auto; border-top: 1px solid #222; padding-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 1.2rem; color: #fff; letter-spacing: 2px;">PROJECT NP | ADELIC NAVIGATOR v11.3</div>
    <div style="font-size: 0.6rem; color: var(--gold);">[TURBO_SNAP_STABILIZED] // [Z-SCALABLE_LOOKUP]</div>
</div>

<div class="layout">
    <div class="sidebar">
        <div class="card">
            <div class="card-title">Manifold Config</div>
            <label>GRID SCALE (Z)</label>
            <input type="number" id="z-val" value="3" onchange="initSystem()">
            <label>PROBLEM HASH</label>
            <input type="text" id="prob-hash" readonly value="VACUUM">
        </div>

        <div class="card" style="border-top: 2px solid var(--accent);">
            <div class="card-title">Spatial Address</div>
            <label>SPACE INDEX (LOOKUP)</label>
            <input type="text" id="sol-index" value="9223372036854776843">
            <label>KINETIC ANCHOR (OPTIONAL)</label>
            <input type="text" id="anchor-id" placeholder="Auto-gen frequency...">
            <button class="btn" onclick="startTurboNavigation()">MANIFEST SNAP</button>
        </div>
        <div id="log">>> [SYSTEM] Ready for Snap.</div>
    </div>
    <div class="viewport">
        <canvas id="mainCanvas"></canvas>
    </div>
</div>

<script>
let z, N, total, isRunning = false;
let board, fixed, rowM, colM, blkM, shadowR, shadowC, shadowB;
const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');

function calculateHash() {
    let h = 0n;
    for(let i=0; i<total; i++) if(fixed[i]!==0) h ^= (BigInt(i)*0x517cc1b7n) + BigInt(fixed[i]);
    document.getElementById('prob-hash').value = h === 0n ? "VACUUM" : h.toString(16).toUpperCase();
    return h;
}

function initSystem() {
    isRunning = false;
    z = parseInt(document.getElementById('z-val').value);
    N = z * z; total = N * N;
    board = new Uint16Array(total); fixed = new Uint16Array(total);
    rowM = new Array(N).fill(0n); colM = new Array(N).fill(0n); blkM = new Array(N).fill(0n);
    shadowR = new Array(total); shadowC = new Array(total); shadowB = new Array(total);
    canvas.width = canvas.height = 500;
    render(); calculateHash();
}

async function startTurboNavigation() {
    if (isRunning) return;
    isRunning = true;
    let pHash = calculateHash();
    let anchorVal = document.getElementById('anchor-id').value;
    let anchor = anchorVal ? BigInt(anchorVal) : (pHash ^ 1006n);
    let solIdx = BigInt(document.getElementById('sol-index').value || "0");
    let activeID = (anchor ^ (1n << 63n)) + solIdx;
    
    let d = 0, friction = 0, jumps = 0n;
    rowM.fill(0n); colM.fill(0n); blkM.fill(0n); board.fill(0);
    const t0 = performance.now();

    // FORCE SNAP: Full math execution before render
    while (isRunning && d >= 0) {
        if (d === total) { 
            const t1 = performance.now();
            isRunning = false;
            render(true); 
            document.getElementById('log').innerHTML = `[${(t1-t0).toFixed(2)}ms] SINGULARITY ATTAINED.<br>` + document.getElementById('log').innerHTML;
            break; 
        }

        if (friction > N * 20) {
            jumps++; d = 0; friction = 0;
            activeID = (anchor ^ (1n << 63n)) + solIdx + jumps;
            rowM.fill(0n); colM.fill(0n); blkM.fill(0n);
            continue;
        }

        let r = Math.floor(d / N), c = d % N, b = Math.floor(r / z) * z + Math.floor(c / z);
        let mask = rowM[r] | colM[c] | blkM[b];
        let opts = [];
        for (let i = 1; i <= N; i++) if (!(mask & (1n << BigInt(i)))) opts.push(i);

        if (opts.length === 0 || (fixed[d] !== 0 && !opts.includes(fixed[d]))) {
            d--; if (d < 0) { friction = (N*20)+1; continue; }
            rowM = [...shadowR[d]]; colM = [...shadowC[d]]; blkM = [...shadowB[d]];
            friction++; continue;
        }

        shadowR[d] = [...rowM]; shadowC[d] = [...colM]; shadowB[d] = [...blkM];
        let seed = Number(((activeID ^ BigInt(d)) * 0x517cc1b727220a95n) % BigInt(opts.length));
        let val = (fixed[d] !== 0) ? fixed[d] : opts[Math.abs(seed)];
        board[d] = val; rowM[r] |= (1n << BigInt(val)); colM[c] |= (1n << BigInt(val)); blkM[b] |= (1n << BigInt(val));
        d++;
    }
}

function render(final = false) {
    const s = canvas.width / N; ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < total; i++) {
        let x = (i % N) * s, y = Math.floor(i / N) * s;
        ctx.strokeStyle = "#111"; ctx.strokeRect(x, y, s, s);
        let val = fixed[i] || board[i];
        if (val) {
            ctx.fillStyle = fixed[i] ? "var(--gold)" : (final ? "var(--sentinel)" : "#333");
            ctx.font = `${s * 0.5}px monospace`; ctx.textAlign = "center";
            ctx.fillText(val, x + s/2, y + s * 0.7);
        }
    }
}
canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const idx = Math.floor((e.clientY-rect.top)/(canvas.width/N))*N + Math.floor((e.clientX-rect.left)/(canvas.width/N));
    let v = prompt("Fix Bit:"); if (v) fixed[idx] = parseInt(v); render(); calculateHash();
});
initSystem();
</script>
</body>
</html>
