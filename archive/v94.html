<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Oracle v9.4</title>
    <style>
        :root { --sentinel: #00ff41; --bg: #050505; --accent: #00d4ff; --gold: #d4af37; }
        body { background: var(--bg); color: var(--sentinel); font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .header { border-bottom: 2px solid var(--sentinel); width: 100%; text-align: center; padding-bottom: 10px; margin-bottom: 20px; }
        .nav-box { width: 95%; max-width: 700px; background: #111; border: 1px solid #333; padding: 20px; border-left: 5px solid var(--accent); }
        .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; }
        label { font-size: 0.65rem; text-transform: uppercase; color: #888; }
        input { background: #000; border: 1px solid #444; color: var(--accent); padding: 10px; font-size: 1.1rem; outline: none; }
        canvas { border: 1px solid var(--accent); background: #000; margin-top: 10px; box-shadow: 0 0 40px rgba(0, 212, 255, 0.1); }
        .btn { width: 100%; background: transparent; border: 1px solid var(--sentinel); color: var(--sentinel); padding: 12px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .btn:hover { background: var(--sentinel); color: #000; }
        #log { width: 95%; max-width: 700px; height: 80px; background: #000; border: 1px dashed #333; margin-top: 15px; padding: 10px; font-size: 0.7rem; color: #666; overflow-y: auto; }
    </style>
</head>
<body>

<div class="header">
    <strong>PROJECT NP: ADELIC ORACLE v9.4</strong>
    <div style="font-size: 0.7rem; color: var(--accent);">[UNIVERSAL MANIFOLD NAVIGATION] | [O(1) PRUNING]</div>
</div>

<div class="nav-box">
    <div class="input-group">
        <label>Active Anchor (Variable)</label>
        <input type="text" id="prob-id" placeholder="Enter any Anchor (e.g. 40947044)">
    </div>
    <div class="input-group">
        <label>Space Index (Final Destination)</label>
        <input type="text" id="sol-index" value="0">
    </div>
    <button class="btn" onclick="startUniversalInference()">Manifest Singularity</button>
</div>

<canvas id="mainCanvas"></canvas>
<div id="log">> [SENTINEL] Universal Mode Active. Pruning Sieve initialized.</div>

<script>
let z=3, N=9, total=81, isRunning = false;
let board = new Uint16Array(81), fixed = new Uint16Array(81), phase = new Uint16Array(81);
let rowM, colM, blkM, shadowR, shadowC, shadowB;
const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');

function log(msg) { document.getElementById('log').innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + document.getElementById('log').innerHTML; }

function init() {
    canvas.width = canvas.height = 450;
    rowM = new Array(9).fill(0n); colM = new Array(9).fill(0n); blkM = new Array(9).fill(0n);
    shadowR = new Array(81); shadowC = new Array(81); shadowB = new Array(81);
    render();
}

async function startUniversalInference() {
    if (isRunning) return;
    isRunning = true;
    
    let anchor = BigInt(document.getElementById('prob-id').value || Date.now());
    let solIdx = BigInt(document.getElementById('sol-index').value);
    let activeID = (anchor ^ (1n << 63n)) + solIdx;
    
    let d = 0, friction = 0, jumps = 0n;
    rowM.fill(0n); colM.fill(0n); blkM.fill(0n);
    board.fill(0); phase.fill(0);

    log(`Orbiting Manifold at Base: ${anchor}`);

    while (isRunning && d >= 0) {
        if (d === total) { finalize(activeID); break; }

        // ADELIC JUMP: Escape deadlock by shifting frequency
        if (friction > 150) {
            jumps++;
            d = 0; 
            activeID = (anchor ^ (1n << 63n)) + solIdx + jumps;
            rowM.fill(0n); colM.fill(0n); blkM.fill(0n);
            board.fill(0); phase.fill(0);
            friction = 0;
            document.getElementById('sol-index').value = activeID.toString();
            continue;
        }

        let r = Math.floor(d / 9), c = d % 9, b = Math.floor(r / 3) * 3 + Math.floor(c / 3);
        let mask = rowM[r] | colM[c] | blkM[b];
        
        // Complex Sieve Pruning
        let opts = [];
        for (let i = 1; i <= 9; i++) if (!(mask & (1n << BigInt(i)))) opts.push(i);

        if (opts.length === 0 || (fixed[d] !== 0 && !opts.includes(fixed[d]))) {
            d--; 
            if (d < 0) { friction += 200; continue; } 
            rowM = [...shadowR[d]]; colM = [...shadowC[d]]; blkM = [...shadowB[d]];
            phase[d]++; friction++;
            continue;
        }

        shadowR[d] = [...rowM]; shadowC[d] = [...colM]; shadowB[d] = [...blkM];

        // Deterministic Ripple selection
        let val = (fixed[d] !== 0) ? fixed[d] : opts[Number(((activeID ^ BigInt(d)) * 0x517cc1b727220a95n) % BigInt(opts.length))];
        
        board[d] = val;
        let bit = 1n << BigInt(val);
        rowM[r] |= bit; colM[c] |= bit; blkM[b] |= bit;
        d++;

        if (d % 27 === 0) { render(); await new Promise(r => setTimeout(r, 0)); }
    }
}

function render(final = false) {
    const s = 50; ctx.clearRect(0, 0, 450, 450);
    for (let i = 0; i < 81; i++) {
        let x = (i % 9) * s, y = Math.floor(i / 9) * s;
        ctx.strokeStyle = "#222"; ctx.strokeRect(x, y, s, s);
        if (board[i]) {
            ctx.fillStyle = fixed[i] ? "var(--gold)" : (final ? "var(--sentinel)" : "#444");
            ctx.textAlign = "center"; ctx.fillText(board[i], x + s/2, y + s * 0.7);
        }
    }
}

function finalize(id) { 
    isRunning = false; render(true); 
    document.getElementById('sol-index').value = id.toString();
    log(`<b>SINGULARITY ATTAINED.</b> Final Index updated.`); 
}

canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const idx = Math.floor((e.clientY - rect.top) / 50) * 9 + Math.floor((e.clientX - rect.left) / 50);
    let v = prompt("Fix Node:"); if (v) fixed[idx] = parseInt(v); render();
});

init();
</script>
</body>
</html>
