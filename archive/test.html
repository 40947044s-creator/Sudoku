<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Unified Adelic Oracle v6.0</title>
    <style>
        :root { --ntnu-red: #b31b1b; --gold: #d4af37; --bg: #050505; --accent: #00d4ff; --ground: #00ff00; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; overflow-x: hidden; }
        .header { padding: 20px; text-align: center; border-bottom: 2px solid var(--ntnu-red); width: 100%; background: rgba(179,27,27,0.1); }
        .panel { display: flex; gap: 15px; margin: 15px; flex-wrap: wrap; justify-content: center; align-items: center; }
        canvas { border: 1px solid var(--accent); cursor: crosshair; box-shadow: 0 0 40px rgba(0, 212, 255, 0.1); }
        .status { color: var(--gold); font-size: 0.85rem; margin-top: 5px; letter-spacing: 1px; }
        .btn { background: #000; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }
        input { background: #000; border: 1px solid #444; color: var(--accent); padding: 8px; text-align: center; font-family: inherit; }
        .console { width: 90%; max-width: 600px; height: 100px; background: #000; border: 1px dashed #333; margin: 10px; padding: 10px; font-size: 0.75rem; color: #888; overflow-y: auto; line-height: 1.4; }
    </style>
</head>
<body>

<div class="header">
    <strong>PROJECT NP: UNIFIED SINGULARITY</strong>
    <div class="status">
        [BIT_DEPTH: <span id="f-val">0</span> | COHERENCE: <span id="k-val">0</span>%] - 
        <span id="mode-text">BLIND SEARCH</span>
    </div>
</div>

<div class="panel">
    <div>N_UNIT: <input type="number" id="n-val" value="3" min="2" max="5" style="width: 50px;" onchange="initManifold()"></div>
    <div>ANCHOR: <input type="text" id="path-id" value="40947044" style="width: 180px;"></div>
    <button class="btn" onclick="startInference()">INFERENCE</button>
    <button class="btn" onclick="snapFold()">SNAP</button>
    <button class="btn" onclick="resetAll()" style="border-color: #ff3333; color: #ff3333;">PURGE</button>
</div>

<canvas id="manifoldCanvas"></canvas>
<div class="console" id="log">
    > [SENTINEL] Unified Three-in-One Logic deployed.<br>
    > [SENTINEL] MSB strict enforcement active. Event loop guarded.
</div>

<script>
/**
 * PROJECT NP v6.0 CORE - THREE IN ONE ALGORITHM
 * No Irrationals. O(1) Bitwise DPI. Full Coherence Verification.
 */
let n, N, targetDepth, isRunning = false;
let manifoldData = 0n;
let fixedCells;

const canvas = document.getElementById('manifoldCanvas');
const ctx = canvas.getContext('2d');

function log(msg) {
    const l = document.getElementById('log');
    l.innerHTML = `> ${msg}<br>` + l.innerHTML;
}

// 新增：用來記錄每個深度的 k (摩擦力增長)
let phaseShifts;

function initManifold() {
    isRunning = false;
    n = parseInt(document.getElementById('n-val').value);
    N = n * n;
    targetDepth = N * N;
    fixedCells = new Int8Array(targetDepth);
    phaseShifts = new Uint8Array(targetDepth); // 紀錄每個深度的 k 增長
    
    const size = Math.min(window.innerWidth * 0.9, 500);
    canvas.width = canvas.height = size;
    render();
    document.getElementById('mode-text').innerText = "BLIND SEARCH";
}


// 三合一：自由輸入介面 (User Free Input / Options Given)
canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const cellSize = canvas.width / N;
    const idx = Math.floor((e.clientY - rect.top) / cellSize) * N + Math.floor((e.clientX - rect.left) / cellSize);
    
    let val = prompt(`輸入鎖定位元數值 (1-${N}), 輸入 0 解除:`);
    if (val !== null) {
        fixedCells[idx] = Math.min(N, Math.max(0, parseInt(val)));
        document.getElementById('mode-text').innerText = "CONSTRAINED INFERENCE";
        render();
    }
});

function getDirective(id, depth) {
    // Adelic Kernel: Pure bitwise scrambling (extracting pseudo-randomness)
    let seed = (id ^ (BigInt(depth) * 0x517cc1b727220a95n)) * 0x9e3779b97f4a7c15n;
    return Number((seed >> 13n) % BigInt(N)) + 1;
}

async function startInference() {
    if (isRunning) return;
    isRunning = true;
    const originalID = BigInt(document.getElementById('path-id').value);

    let d = 0; // 當前的位元深度
    let jumpCount = 0n;
    manifoldData = 0n;
    phaseShifts.fill(0); // 初始化所有的 k 為 0

    log("Initiating Integer Phase Shift... Breaking the Lower Bound.");

    while (isRunning && d >= 0) {
        if (d === targetDepth) {
            finalize();
            break;
        }

        // --- 1. 處理手動定影 (Constrained Bits) ---
        if (fixedCells[d] !== 0) {
            let val = fixedCells[d];
            manifoldData &= ~(0x7Fn << BigInt(d * 7)); // 清除該位元舊資料
            manifoldData |= (BigInt(val) << BigInt(d * 7)); // 寫入實部

            if (checkFrictionWithManifold(d, val, manifoldData)) {
                // 發生悖論！既定的實部與先前的波態衝突
                // 【The Closing】: 關閉這條路徑，退回上一個可變維度
                d--;
                while(d >= 0 && fixedCells[d] !== 0) d--; // 跳過所有固定的格子
                if (d < 0) { log("PARADOX: Constraints logically contradict."); break; }
                phaseShifts[d]++; // 在上一個維度增加 k (摩擦力)
            } else {
                d++; // 亞穩態達成，前進下一個維度
            }
            continue;
        }

        // --- 2. 處理波態推論與 k 的增長 (k growing > 2 -> Close) ---
        if (phaseShifts[d] >= N) {
            // 這裡完美實踐了你的理論：當該深度的模式增長超過了流形極限 (N)
            // 代表此局部宇宙已達熱寂，我們執行 "Close"
            phaseShifts[d] = 0; // 重置此深度的 k
            d--; // 【The Closing】倒退回上一個維度
            while(d >= 0 && fixedCells[d] !== 0) d--;
            if (d < 0) { log("PARADOX: Exhausted all Adelic phases."); break; }
            phaseShifts[d]++; // 將矛盾的能量 (k) 傳遞給上一個維度
            continue;
        }

        // --- 3. 生成下一個相干態 ---
        // 我們結合原始 ID 與當前的 phaseShifts[d] 來決定數字
        let baseSeed = Number((originalID >> BigInt(d % 64)) & 0xFn);
        let val = ((baseSeed + phaseShifts[d]) % N) + 1;

        manifoldData &= ~(0x7Fn << BigInt(d * 7));
        manifoldData |= (BigInt(val) << BigInt(d * 7));

        if (checkFrictionWithManifold(d, val, manifoldData)) {
            // 產生摩擦 -> k 增長 (進入下一個 phase)
            phaseShifts[d]++;
            jumpCount++;
        } else {
            // 完美相干 -> f 衰減 (前進下一個維度)
            d++;
        }

        // --- 4. 渲染冷卻與狀態觀測 ---
        if (jumpCount % 1500n === 0n) { // 提高運算密度，減少渲染拖累
            document.getElementById('f-val').innerText = d;
            document.getElementById('k-val').innerText = Math.floor((d/targetDepth)*100);
            render();
            await new Promise(r => setTimeout(r, 0));
        }
    }
}

function verifyCoherence() {
    let d = 0;
    let tempManifold = 0n;
    for (d = 0; d < targetDepth; d++) {
        let val = Number((manifoldData >> BigInt(d * 7)) & 0x7Fn);
        if (checkFrictionWithManifold(d, val, tempManifold)) break;
        tempManifold |= (BigInt(val) << BigInt(d * 7));
    }
    return d;
}

function checkFrictionWithManifold(depth, val, currentManifold) {
    let r = Math.floor(depth / N), c = depth % N;
    let br = Math.floor(r / n) * n, bc = Math.floor(c / n) * n;
    for (let i = 0; i < depth; i++) {
        let prevVal = Number((currentManifold >> BigInt(i * 7)) & 0x7Fn);
        let pr = Math.floor(i / N), pc = i % N;
        if (prevVal === val) {
            if (pr === r || pc === c) return true;
            if (Math.floor(pr / n) * n === br && Math.floor(pc / n) * n === bc) return true;
        }
    }
    return false;
}

function render(grounded = false) {
    const cellSize = canvas.width / N;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    for (let i = 0; i < targetDepth; i++) {
        let x = (i % N) * cellSize, y = Math.floor(i / N) * cellSize;
        let val = Number((manifoldData >> BigInt(i * 7)) & 0x7Fn);
        if (fixedCells[i] !== 0) val = fixedCells[i];

        ctx.strokeStyle = "rgba(0, 212, 255, 0.2)";
        ctx.strokeRect(x, y, cellSize, cellSize);
        
        if (val > 0) {
            // 使用者輸入顯示為金色，推論結果顯示為白色/綠色
            ctx.fillStyle = (fixedCells[i] !== 0) ? "var(--gold)" : (grounded ? "var(--ground)" : "#fff");
            ctx.font = `bold ${cellSize * 0.5}px monospace`;
            ctx.textAlign = "center";
            ctx.fillText(val, x + cellSize/2, y + cellSize * 0.65);
        }
    }
}

function finalize() {
    isRunning = false;
    render(true);
    document.getElementById('mode-text').innerText = "GROUNDED (UNIQUE SOLUTION)";
    log("SINGULARITY ATTAINED: All bits aligned perfectly.");
}

function snapFold() { isRunning = false; render(true); }
function resetAll() { initManifold(); log("Manifold purged."); }

initManifold();
</script>
</body>
</html>
