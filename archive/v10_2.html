<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Oracle v10.2</title>
    <style>
        :root { 
            --sentinel: #00ff41; --bg: #050505; --accent: #00d4ff; 
            --gold: #d4af37; --void: #0a0a0a; --glass: rgba(0, 212, 255, 0.1);
        }
        body { 
            background: var(--bg); color: var(--sentinel); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px;
        }
        .header { width: 100%; max-width: 900px; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 25px; text-align: left; }
        .header h1 { font-size: 1.2rem; margin: 0; letter-spacing: 3px; color: #fff; }
        .header span { font-size: 0.65rem; color: var(--gold); }

        .layout { display: grid; grid-template-columns: 320px 1fr; gap: 30px; width: 100%; max-width: 1000px; }
        
        /* Control Sidebar */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .card { 
            background: var(--void); border: 1px solid #222; padding: 15px; 
            border-radius: 4px; box-shadow: 8px 8px 0px #000;
        }
        .card-title { font-size: 0.65rem; text-transform: uppercase; color: #666; margin-bottom: 12px; border-left: 2px solid var(--accent); padding-left: 8px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.6rem; color: #888; margin-bottom: 5px; }
        input { 
            width: 100%; background: #000; border: 1px solid #333; color: var(--accent); 
            padding: 10px; box-sizing: border-box; font-family: 'Courier New', monospace; outline: none;
        }
        input:focus { border-color: var(--sentinel); }

        /* Main Viewport */
        .viewport { display: flex; flex-direction: column; align-items: center; position: relative; }
        canvas { 
            border: 1px solid #333; background: #000; 
            box-shadow: 0 0 40px var(--glass); cursor: crosshair; 
        }
        
        .btn { 
            width: 100%; padding: 12px; background: transparent; border: 1px solid var(--sentinel); 
            color: var(--sentinel); cursor: pointer; text-transform: uppercase; font-weight: bold; 
            font-size: 0.75rem; transition: 0.3s;
        }
        .btn:hover { background: var(--sentinel); color: #000; box-shadow: 0 0 15px var(--sentinel); }

        .status-bar { 
            margin-top: 20px; width: 100%; padding: 10px; background: #111; 
            font-size: 0.7rem; color: #555; border: 1px solid #222;
        }
        .status-bar b { color: var(--gold); }

        #log { 
            margin-top: 10px; height: 120px; width: 100%; overflow-y: auto; 
            font-size: 0.65rem; color: #444; border-top: 1px solid #222; padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>PROJECT NP | ADELIC NAVIGATOR v10.2</h1>
    <span>ELASTIC MANIFOLD INFRASTRUCTURE // O(1) GROUNDING</span>
</div>

<div class="layout">
    <div class="sidebar">
        <div class="card">
            <div class="card-title">Manifold Configuration</div>
            <div class="input-group">
                <label>Spectral Modulus (Z)</label>
                <input type="number" id="z-val" value="3" min="2" max="6" onchange="initSystem()">
            </div>
            <div class="input-group">
                <label>Problem Geometry Hash</label>
                <input type="text" id="prob-hash" readonly value="NULL_SET">
            </div>
        </div>

        <div class="card" style="border-top: 2px solid var(--gold);">
            <div class="card-title">Spatial Coordinates</div>
            <div class="input-group">
                <label>Target Space Index (Look-up)</label>
                <input type="text" id="sol-index" placeholder="Unique Residue...">
            </div>
            <div class="input-group">
                <label>Kinetic Anchor (Optional)</label>
                <input type="text" id="anchor-id" placeholder="Auto-generate frequency...">
            </div>
            <button class="btn" onclick="startNavigation()">Manifest Isomorphism</button>
        </div>

        <div class="status-bar">
            MANIFOLD STATE: <b id="state-txt">IDLE</b><br>
            BIT DEPTH: <b id="depth-txt">0/0</b>
        </div>
    </div>

    <div class="viewport">
        <canvas id="mainCanvas"></canvas>
        <div id="log">>> INITIALIZING ADELIC GATES... READY.</div>
    </div>
</div>

<script>
let z, N, total, isRunning = false;
let board, fixed, phase;
let rowM, colM, blkM, shadowR, shadowC, shadowB;
const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');

function log(msg) {
    const l = document.getElementById('log');
    l.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + l.innerHTML;
}

function calculateHash() {
    let h = 0n;
    for(let i=0; i<total; i++) if(fixed[i]!==0) h ^= (BigInt(i)*0x517cc1b7n) + BigInt(fixed[i]);
    document.getElementById('prob-hash').value = h.toString(16).toUpperCase();
    return h;
}

function initSystem() {
    isRunning = false;
    z = parseInt(document.getElementById('z-val').value);
    N = z * z; total = N * N;
    board = new Uint16Array(total); fixed = new Uint16Array(total); phase = new Uint16Array(total);
    rowM = new Array(N).fill(0n); colM = new Array(N).fill(0n); blkM = new Array(N).fill(0n);
    shadowR = new Array(total); shadowC = new Array(total); shadowB = new Array(total);
    canvas.width = canvas.height = 500;
    document.getElementById('depth-txt').innerText = `0/${total}`;
    render();
    calculateHash();
}

async function startNavigation() {
    if (isRunning) return;
    isRunning = true;
    document.getElementById('state-txt').innerText = "RIPPLE_ACTIVE";
    
    let pHash = calculateHash();
    let userAnchor = document.getElementById('anchor-id').value;
    let anchor = userAnchor ? BigInt(userAnchor) : (pHash ^ BigInt(Date.now()));
    let solIdx = BigInt(document.getElementById('sol-index').value || "0");
    
    let activeID = (anchor ^ (1n << 63n)) + solIdx;
    let d = 0, friction = 0, jumps = 0n;

    rowM.fill(0n); colM.fill(0n); blkM.fill(0n); board.fill(0); phase.fill(0);

    while (isRunning && d >= 0) {
        if (d === total) { finalize(activeID); break; }

        if (friction > N * 25) {
            jumps++; d = 0; friction = 0;
            activeID = (anchor ^ (1n << 63n)) + solIdx + jumps;
            rowM.fill(0n); colM.fill(0n); blkM.fill(0n); board.fill(0); phase.fill(0);
            document.getElementById('sol-index').value = activeID.toString();
            continue;
        }

        let r = Math.floor(d / N), c = d % N, b = Math.floor(r / z) * z + Math.floor(c / z);
        let mask = rowM[r] | colM[c] | blkM[b];
        let opts = [];
        for (let i = 1; i <= N; i++) if (!(mask & (1n << BigInt(i)))) opts.push(i);

        if (opts.length === 0 || (fixed[d] !== 0 && !opts.includes(fixed[d]))) {
            d--; 
            if (d < 0) { friction = (N*25)+1; continue; }
            rowM = [...shadowR[d]]; colM = [...shadowC[d]]; blkM = [...shadowB[d]];
            phase[d]++; friction++;
            continue;
        }

        shadowR[d] = [...rowM]; shadowC[d] = [...colM]; shadowB[d] = [...blkM];
        let seed = Number(((activeID ^ BigInt(d)) * 0x517cc1b727220a95n) % BigInt(opts.length));
        let val = (fixed[d] !== 0) ? fixed[d] : opts[(Math.abs(seed) + phase[d]) % opts.length];
        
        board[d] = val;
        let bit = 1n << BigInt(val);
        rowM[r] |= bit; colM[c] |= bit; blkM[b] |= bit;
        d++;
        if (d % N === 0) { 
            document.getElementById('depth-txt').innerText = `${d}/${total}`;
            render(); 
            await new Promise(r => setTimeout(r, 0)); 
        }
    }
}

function render(final = false) {
    const s = canvas.width / N; ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < total; i++) {
        let x = (i % N) * s, y = Math.floor(i / N) * s;
        ctx.strokeStyle = "#111"; ctx.strokeRect(x, y, s, s);
        if ((Math.floor(i/N)%z===0) && (i%N%z===0)) { ctx.strokeStyle = "#222"; ctx.strokeRect(x, y, s*z, s*z); }
        let val = fixed[i] || board[i];
        if (val) {
            ctx.fillStyle = fixed[i] ? "var(--gold)" : (final ? "var(--sentinel)" : "#333");
            ctx.font = `${s * 0.4}px monospace`; ctx.textAlign = "center";
            ctx.fillText(val, x + s/2, y + s * 0.65);
        }
    }
}
function finalize(id) { 
    isRunning = false; render(true); 
    document.getElementById('state-txt').innerText = "STABLE_SINGULARITY";
    document.getElementById('sol-index').value = id.toString();
    log("Singularity attained.");
}
canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const idx = Math.floor((e.clientY-rect.top)/(canvas.width/N))*N + Math.floor((e.clientX-rect.left)/(canvas.width/N));
    let v = prompt(`Fix at ${idx}:`); if (v) fixed[idx] = parseInt(v); render(); calculateHash();
});
initSystem();
</script>
</body>
</html>
