<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Oracle v9.0</title>
    <style>
        :root { --sentinel: #00ff41; --bg: #050505; --accent: #00d4ff; --gold: #d4af37; }
        body { background: var(--bg); color: var(--sentinel); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .header { border-bottom: 2px solid var(--sentinel); width: 100%; text-align: center; padding-bottom: 10px; margin-bottom: 20px; }
        .nav-box { width: 95%; max-width: 700px; background: #111; border: 1px solid #333; padding: 20px; border-left: 5px solid var(--gold); display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.65rem; text-transform: uppercase; color: #888; }
        input { background: #000; border: 1px solid #444; color: var(--accent); padding: 8px; font-size: 1rem; outline: none; }
        canvas { border: 1px solid var(--accent); background: #000; margin-top: 20px; box-shadow: 0 0 40px rgba(0, 212, 255, 0.1); }
        .btn-zone { grid-column: span 2; display: flex; gap: 10px; }
        .btn { flex: 1; background: transparent; border: 1px solid var(--sentinel); color: var(--sentinel); padding: 12px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .btn:hover { background: var(--sentinel); color: #000; }
        #log { width: 95%; max-width: 700px; height: 100px; background: #000; border: 1px dashed #333; margin-top: 20px; padding: 10px; font-size: 0.7rem; color: #666; overflow-y: auto; }
    </style>
</head>
<body>

<div class="header">
    <strong>PROJECT NP: ADELIC ORACLE v9.0</strong>
    <div style="font-size: 0.7rem; color: var(--gold);">[SPECTRAL SYNC: N=Z²] | [DELAYED GROUNDING]</div>
</div>

<div class="nav-box">
    <div class="input-group">
        <label>Grid Scale (Z)</label>
        <input type="number" id="z-val" value="3" min="2" max="5" onchange="initSystem()">
    </div>
    <div class="input-group">
        <label>Problem Anchor</label>
        <input type="text" id="prob-id" value="40947044">
    </div>
    <div class="input-group" style="grid-column: span 2;">
        <label>Solution Index (Unique Residue)</label>
        <input type="text" id="sol-index" value="0">
    </div>
    <div class="btn-zone">
        <button class="btn" onclick="startUnifiedInference()">Manifest Isomorphism</button>
        <button class="btn" onclick="resetSystem()" style="border-color:#f33; color:#f33;">Purge</button>
    </div>
</div>

<canvas id="mainCanvas"></canvas>
<div id="log">> [SENTINEL] System ready. Grounded N sequence primed.</div>

<script>
let z, N, total, isRunning = false;
let board, fixed;
const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');

function log(msg) { 
    const l = document.getElementById('log');
    l.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + l.innerHTML; 
}

function initSystem() {
    z = parseInt(document.getElementById('z-val').value);
    N = z * z;
    total = N * N;
    board = new Uint16Array(total);
    fixed = new Uint16Array(total);
    canvas.width = canvas.height = Math.min(window.innerWidth * 0.9, 500);
    render();
    log(`Spectral Sync: Z=${z}, N=${N}. Manifold expanded.`);
}

async function startUnifiedInference() {
    if (isRunning) return;
    isRunning = true;
    
    let probID = BigInt(document.getElementById('prob-id').value);
    let solIdx = BigInt(document.getElementById('sol-index').value);
    
    // MSB Injection + Residue Offset
    let activePath = (probID ^ (1n << 63n)) + solIdx;
    let scanStep = 0n;

    log(`Probing Adelic Class: ${probID} @ Residue ${solIdx}`);

    while (isRunning) {
        // INFERENCE: Ripple the full spectrum
        for (let i = 0; i < total; i++) {
            if (fixed[i] !== 0) board[i] = fixed[i];
            else {
                let seed = Number(((activePath ^ BigInt(i)) * 0x517cc1b727220a95n) % 0xFFFFFFFn);
                board[i] = (Math.abs(seed) % N) + 1;
            }
        }

        // DELAYED GROUND TEST (Test total manifold resonance)
        if (checkTrinity()) {
            isRunning = false;
            render(true);
            log(`<b>SINGULARITY ATTAINED.</b> Ground found at Scan Step: ${scanStep}`);
            break;
        } else {
            // DPI Phase shift
            scanStep++;
            activePath = (probID ^ (1n << 63n)) + solIdx + scanStep;
            if (scanStep % 1000n === 0n) {
                render();
                await new Promise(r => setTimeout(r, 0));
            }
        }
    }
}

function checkTrinity() {
    let rM = new Array(N).fill(0n), cM = new Array(N).fill(0n), bM = new Array(N).fill(0n);
    for (let i = 0; i < total; i++) {
        let r = Math.floor(i / N), c = i % N, b = Math.floor(r / z) * z + Math.floor(c / z);
        let bit = 1n << BigInt(board[i]);
        if ((rM[r] & bit) || (cM[c] & bit) || (bM[b] & bit)) return false;
        rM[r] |= bit; cM[c] |= bit; bM[b] |= bit;
    }
    return true;
}

function render(final = false) {
    const s = canvas.width / N;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < total; i++) {
        let x = (i % N) * s, y = Math.floor(i / N) * s;
        ctx.strokeStyle = "#222"; ctx.strokeRect(x, y, s, s);
        if (board[i]) {
            ctx.fillStyle = fixed[i] ? "var(--gold)" : (final ? "var(--sentinel)" : "#444");
            ctx.font = `bold ${s * 0.5}px Courier`;
            ctx.textAlign = "center"; ctx.fillText(board[i], x + s/2, y + s * 0.7);
        }
    }
}

canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const idx = Math.floor((e.clientY - rect.top) / (canvas.width/N)) * N + Math.floor((e.clientX - rect.left) / (canvas.width/N));
    let v = prompt(`Fix node ${idx}:`); 
    if (v) fixed[idx] = parseInt(v); render();
});

initSystem();
</script>
</body>
</html>
