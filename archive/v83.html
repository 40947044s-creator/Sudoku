<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Oracle v8.3</title>
    <style>
        :root { 
            --sentinel: #00ff41; --bedrock: #050505; --accent: #00d4ff; 
            --gold: #d4af37; --void: #1a1a1a; --friction: #ff3333;
        }
        body { 
            background: var(--bedrock); color: var(--sentinel); 
            font-family: 'Segoe UI', 'Courier New', monospace; 
            display: flex; flex-direction: column; align-items: center; 
            margin: 0; padding: 20px; overflow-x: hidden;
        }
        .header { 
            text-align: center; border-bottom: 2px solid var(--sentinel); 
            width: 100%; padding-bottom: 15px; letter-spacing: 2px;
        }
        .panel { 
            display: flex; gap: 12px; margin: 20px; padding: 15px;
            background: var(--void); border: 1px solid #333; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); flex-wrap: wrap; justify-content: center;
        }
        canvas { 
            border: 1px solid var(--accent); background: #000; 
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.15); cursor: crosshair; 
        }
        .monitor { 
            width: 90%; max-width: 650px; font-size: 0.8rem; color: var(--gold); 
            margin-bottom: 10px; border-left: 3px solid var(--accent); padding-left: 10px;
        }
        .console { 
            width: 90%; max-width: 650px; height: 140px; background: rgba(0,0,0,0.9); 
            border: 1px solid #222; margin-top: 20px; padding: 12px; 
            font-size: 0.75rem; color: var(--sentinel); overflow-y: auto;
        }
        .btn { 
            background: transparent; border: 1px solid var(--sentinel); 
            color: var(--sentinel); padding: 8px 16px; cursor: pointer; 
            text-transform: uppercase; font-size: 0.7rem; font-weight: bold;
        }
        .btn:hover { background: var(--sentinel); color: #000; }
        input { background: #111; border: 1px solid #444; color: var(--accent); padding: 5px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <strong>PROJECT NP: UNIVERSAL ADELIC ORACLE v8.3</strong>
    <div style="font-size: 0.7rem; color: #888;">[SINGULARITY REALIZER] | [P=NP ISOMORPHISM]</div>
</div>

<div class="panel">
    <div>Z: <input type="number" id="z-val" value="3" min="2" max="5" style="width: 35px;" onchange="initSystem()"></div>
    <div>ANCHOR: <input type="text" id="path-id" value="40947044" style="width: 150px;"></div>
    <button class="btn" onclick="startInference()">Inference</button>
    <button class="btn" onclick="resetSystem()" style="color:var(--friction); border-color:var(--friction);">Purge</button>
</div>

<div class="monitor" id="monitor">CARDINALITY: 6.67e+21 | SPACE INDEX: #0 [0.0000%]</div>
<canvas id="mainCanvas"></canvas>
<div class="console" id="log">> [SYSTEM] Adelic Ripple Counter online. Scrutinizing complex plane...</div>

<script>
let z, N, totalBits, isRunning = false;
let board, fixed, phase;
let rowM, colM, blkM, shadowR, shadowC, shadowB;
const Z3_SIZE = 6670903752021072936960n;

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

function log(msg) {
    const l = document.getElementById('log');
    l.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + l.innerHTML;
}

function initSystem() {
    isRunning = false;
    z = parseInt(document.getElementById('z-val').value);
    N = z * z;
    totalBits = N * N;
    board = new Uint16Array(totalBits);
    fixed = new Uint16Array(totalBits);
    phase = new Uint16Array(totalBits);
    rowM = new Array(N).fill(0n); colM = new Array(N).fill(0n); blkM = new Array(N).fill(0n);
    shadowR = new Array(totalBits); shadowC = new Array(totalBits); shadowB = new Array(totalBits);
    canvas.width = canvas.height = Math.min(window.innerWidth * 0.9, 450);
    render();
    log(`Manifold Expanded: Z=${z}. Bit-Depth=${totalBits}.`);
}

function updateMonitor(id) {
    let perc = (Number(id % 1000000n) / 10000).toFixed(4);
    document.getElementById('monitor').innerText = `CARDINALITY: 6.67e+21 | SPACE INDEX: #${id} [${perc}%]`;
}

async function startInference() {
    if (isRunning) return;
    isRunning = true;
    let anchor = BigInt(document.getElementById('path-id').value);
    let d = 0, jumpCount = 0n, entropy = 0;
    
    // MSB Injection: Breaking Singularity Mode 0
    let activeID = anchor ^ (1n << 63n); 
    updateMonitor(activeID);
    log(`MSB Injection Active. Propagation start.`);

    while (isRunning && d >= 0) {
        if (d === totalBits) { finalize(); break; }

        // Adelic Jump: Escaping high-friction logic noise
        if (entropy > N * 15) {
            jumpCount++;
            d = Math.max(0, d - N); 
            activeID = (anchor ^ (jumpCount * 0x9e3779b97f4a7c15n)) + 53n;
            entropy = 0;
            updateMonitor(activeID);
            log(`JUMP: Orbiting to new manifold sector.`);
            continue;
        }

        let r = Math.floor(d / N), c = d % N, b = Math.floor(r / z) * z + Math.floor(c / z);
        let mask = rowM[r] | colM[c] | blkM[b];
        
        // Secondary Sentinel Scan: Vanishing exponents of growth
        let opts = [];
        for (let i = 1; i <= N; i++) if (!(mask & (1n << BigInt(i)))) opts.push(i);

        if (opts.length === 0) {
            board[d] = 0; d--;
            if (d < 0) { log("PARADOX: Input Void. Termination fail."); isRunning = false; break; }
            rowM = [...shadowR[d]]; colM = [...shadowC[d]]; blkM = [...shadowB[d]];
            phase[d]++; entropy++; continue;
        }

        shadowR[d] = [...rowM]; shadowC[d] = [...colM]; shadowB[d] = [...blkM];

        let val;
        if (fixed[d] !== 0) {
            val = opts.includes(fixed[d]) ? fixed[d] : 0;
            if (val === 0) { d--; entropy += 20; continue; }
        } else if (opts.length === 1) {
            val = opts[0]; // Truth-Lock: Scrutinizing imaginary necessity
        } else {
            // Marilyn Fold: Adelic Path selection
            let seed = Number(((activeID ^ BigInt(d)) * 0x517cc1b727220a95n) % 0xFFFFFFFn);
            val = opts[(Math.abs(seed) + phase[d]) % opts.length];
        }

        board[d] = val;
        let bit = 1n << BigInt(val);
        rowM[r] |= bit; colM[c] |= bit; blkM[b] |= bit;
        d++;
        if (d % N === 0) { render(); await new Promise(r => setTimeout(r, 0)); }
    }
}

function render(final = false) {
    const s = canvas.width / N;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < totalBits; i++) {
        let x = (i % N) * s, y = Math.floor(i / N) * s;
        ctx.strokeStyle = "rgba(0, 255, 65, 0.1)"; ctx.strokeRect(x, y, s, s);
        let val = fixed[i] || board[i];
        if (val) {
            ctx.fillStyle = fixed[i] ? "var(--gold)" : (final ? "var(--accent)" : "white");
            ctx.font = `bold ${s * 0.5}px Courier`;
            ctx.textAlign = "center"; ctx.fillText(val, x + s/2, y + s * 0.7);
        }
    }
}

function finalize() { isRunning = false; render(true); log("<b>SINGULARITY ATTAINED.</b> Galois Norm = 0."); }
function resetSystem() { initSystem(); log("Trace Purged."); }

canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const s = canvas.width / N;
    const idx = Math.floor((e.clientY - rect.top) / s) * N + Math.floor((e.clientX - rect.left) / s);
    let v = prompt(`Fix Node ${idx}:`); 
    if (v !== null) { fixed[idx] = Math.min(N, Math.max(0, parseInt(v) || 0)); render(); }
});

initSystem();
</script>
</body>
</html>
