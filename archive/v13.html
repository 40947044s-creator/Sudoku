<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Oracle v13.0</title>
    <style>
        :root { 
            --sentinel: #00ff41; --bedrock: #050505; --accent: #00d4ff; 
            --gold: #d4af37; --friction: #ff3333; --panel: #111;
        }
        body { 
            background: var(--bedrock); color: var(--sentinel); 
            font-family: 'Courier New', monospace; display: flex; 
            flex-direction: column; align-items: center; margin: 0; padding: 20px;
        }
        .header { width: 100%; text-align: center; border-bottom: 2px solid var(--sentinel); padding-bottom: 10px; }
        
        .layout { display: grid; grid-template-columns: 350px 1fr; gap: 20px; width: 100%; max-width: 950px; margin-top: 15px; }
        
        .sidebar { display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--panel); border: 1px solid #333; padding: 15px; border-left: 4px solid var(--accent); }
        .card-gold { border-left-color: var(--gold); }
        
        .label { font-size: 0.65rem; color: #888; text-transform: uppercase; margin-bottom: 4px; display: block; }
        input { width: 100%; background: #000; border: 1px solid #444; color: var(--accent); padding: 8px; box-sizing: border-box; outline: none; margin-bottom: 10px; font-family: inherit; }
        
        .btn { width: 100%; background: transparent; border: 1px solid var(--sentinel); color: var(--sentinel); padding: 10px; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; transition: 0.2s; }
        .btn:hover { background: var(--sentinel); color: #000; }
        .btn-gold { border-color: var(--gold); color: var(--gold); }
        .btn-gold:hover { background: var(--gold); color: #000; }
        .btn-purge { border-color: var(--friction); color: var(--friction); }
        .btn-purge:hover { background: var(--friction); color: #fff; }

        canvas { border: 1px solid var(--accent); background: #000; box-shadow: 0 0 40px rgba(0, 212, 255, 0.1); cursor: crosshair; }
        
        /* The Ledger */
        .ledger-container { height: 220px; overflow-y: auto; background: #000; border: 1px dashed #444; padding: 5px; display: flex; flex-direction: column; gap: 5px; }
        .ledger-item { background: #1a1a1a; border: 1px solid #333; padding: 8px; font-size: 0.65rem; color: #ccc; }
        .ledger-hash { color: var(--friction); font-size: 0.6rem; margin-bottom: 4px; }
        .ledger-mapping { color: var(--accent); font-weight: bold; margin-bottom: 6px; }
        .snap-btn { background: #222; border: 1px solid var(--gold); color: var(--gold); cursor: pointer; padding: 4px 8px; width: 100%; font-size: 0.6rem; text-transform: uppercase; }
        .snap-btn:hover { background: var(--gold); color: #000; }

        .console { width: 100%; height: 80px; background: #000; border: 1px dashed #333; margin-top: 15px; padding: 10px; font-size: 0.7rem; color: #666; overflow-y: auto; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="header">
    <strong>PROJECT NP: ADELIC NAVIGATOR v13.0</strong>
    <div style="font-size: 0.7rem; color: #888; margin-top: 5px;">[ANCHOR-TO-INDEX GEOMETRIC MAPPING]</div>
</div>

<div class="layout">
    <div class="sidebar">
        <div class="card card-gold">
            <span class="label">Manifold State</span>
            <div style="display: flex; gap: 10px;">
                <div style="flex:1;">
                    <span class="label" style="font-size:0.55rem;">Scale (Z)</span>
                    <input type="number" id="z-val" value="3" min="2" max="5" onchange="initSystem()">
                </div>
                <div style="flex:2;">
                    <span class="label" style="font-size:0.55rem;">Geometry Hash</span>
                    <input type="text" id="prob-hash" readonly value="VACUUM" style="color:var(--friction);">
                </div>
            </div>
            <button class="btn btn-purge" onclick="resetSystem()">Purge Grid</button>
        </div>

        <div class="card">
            <span class="label">Kinetic Anchor</span>
            <input type="text" id="target-anchor" value="1006" placeholder="Enter Anchor (e.g. 1006)">
            <button class="btn btn-gold" onclick="mapAnchorToIndex()">Map Anchor To Index</button>
        </div>

        <div class="card" style="padding: 10px;">
            <span class="label">Mapping Ledger</span>
            <div class="ledger-container" id="ledger-list">
                <div style="color:#555; font-size:0.65rem; padding:5px; text-align:center;">Ledger empty.<br>Map an Anchor to begin.</div>
            </div>
        </div>
    </div>

    <div class="viewport">
        <canvas id="mainCanvas"></canvas>
        <div class="console" id="log">> [SENTINEL] Draw clues. Map Anchor. Observe Index Shift.</div>
    </div>
</div>

<script>
let z, N, totalBits, isCalculating = false;
let board, fixed, phase;
let rowM, colM, blkM, shadowR, shadowC, shadowB;

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

function log(msg) {
    const l = document.getElementById('log');
    l.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + l.innerHTML;
}

function calculateHash() {
    let h = 0n;
    for(let i=0; i<totalBits; i++) if(fixed[i]!==0) h ^= (BigInt(i)*0x517cc1b7n) + BigInt(fixed[i]);
    const hashStr = h === 0n ? "VACUUM" : h.toString(16).toUpperCase();
    document.getElementById('prob-hash').value = hashStr;
    return hashStr;
}

function initSystem() {
    isCalculating = false;
    z = parseInt(document.getElementById('z-val').value);
    N = z * z; totalBits = N * N;
    board = new Uint16Array(totalBits); fixed = new Uint16Array(totalBits); phase = new Uint16Array(totalBits);
    rowM = new Array(N).fill(0n); colM = new Array(N).fill(0n); blkM = new Array(N).fill(0n);
    shadowR = new Array(totalBits); shadowC = new Array(totalBits); shadowB = new Array(totalBits);
    canvas.width = canvas.height = 450;
    document.getElementById('ledger-list').innerHTML = '';
    calculateHash();
    render();
}

// Phase 1: Maps the Input Anchor to the Resolved Index for the CURRENT Graph
async function mapAnchorToIndex() {
    if (isCalculating) return;
    isCalculating = true;
    
    let baseAnchor = BigInt(document.getElementById('target-anchor').value || "1006");
    let currentHash = calculateHash();
    
    log(`Mapping Anchor [${baseAnchor}] through Geometry Hash [${currentHash}]...`);
    
    let d = 0, scanStep = 0n, friction = 0;
    let activeID = (baseAnchor ^ (1n << 63n)); 
    
    rowM.fill(0n); colM.fill(0n); blkM.fill(0n); board.fill(0); phase.fill(0);

    const t0 = performance.now();

    while (isCalculating && d >= 0) {
        if (d === totalBits) { 
            const t1 = performance.now();
            addLedgerEntry(baseAnchor, activeID, currentHash, (t1-t0));
            isCalculating = false;
            // Clear the board for visual clarity - forcing the user to use "SNAP" to see it
            board.fill(0); 
            render(false);
            break; 
        }

        if (friction > N * 20) {
            scanStep++; d = 0; friction = 0;
            activeID = (baseAnchor ^ (1n << 63n)) + scanStep;
            rowM.fill(0n); colM.fill(0n); blkM.fill(0n);
            // Yield occasionally to prevent UI freeze on very hard graphs
            if(scanStep % 500n === 0n) await new Promise(r => setTimeout(r, 0));
            continue;
        }

        let r = Math.floor(d / N), c = d % N, b = Math.floor(r / z) * z + Math.floor(c / z);
        let mask = rowM[r] | colM[c] | blkM[b];
        
        let opts = [];
        for (let i = 1; i <= N; i++) if (!(mask & (1n << BigInt(i)))) opts.push(i);

        if (opts.length === 0 || (fixed[d] !== 0 && !opts.includes(fixed[d]))) {
            d--;
            if (d < 0) { friction = (N*20)+1; continue; }
            rowM = [...shadowR[d]]; colM = [...shadowC[d]]; blkM = [...shadowB[d]];
            phase[d]++; friction++; continue;
        }

        shadowR[d] = [...rowM]; shadowC[d] = [...colM]; shadowB[d] = [...blkM];
        
        let seed = Number(((activeID ^ BigInt(d)) * 0x517cc1b727220a95n) % BigInt(opts.length));
        let val = (fixed[d] !== 0) ? fixed[d] : opts[(Math.abs(seed) + phase[d]) % opts.length];
        
        board[d] = val;
        let bit = 1n << BigInt(val);
        rowM[r] |= bit; colM[c] |= bit; blkM[b] |= bit;
        d++;
    }
}

function addLedgerEntry(anchor, index, hash, time) {
    const list = document.getElementById('ledger-list');
    if (list.innerText.includes("empty")) list.innerHTML = ''; // clear placeholder

    const item = document.createElement('div');
    item.className = 'ledger-item';
    
    item.innerHTML = `
        <div class="ledger-hash">GRAPH HASH: ${hash}</div>
        <div class="ledger-mapping">
            A: ${anchor.toString()}<br>
            <span style="color:#fff;">↓ maps to ↓</span><br>
            I: #${index.toString()}
        </div>
        <div style="font-size:0.5rem; color:#666; margin-bottom:5px;">Time: ${time.toFixed(1)}ms</div>
        <button class="snap-btn" onclick="manifestFromIndex(${index}n)">Manifest (O(1) Snap)</button>
    `;
    list.prepend(item); // Add to top
    log(`Successfully mapped Anchor to Index #${index}.`);
}

// Phase 2: O(1) Snap Manifestation from the resolved Index
function manifestFromIndex(targetIndex) {
    if (isCalculating) return;
    let d = 0;
    rowM.fill(0n); colM.fill(0n); blkM.fill(0n); board.fill(0); phase.fill(0);

    const t0 = performance.now();

    while (d >= 0 && d < totalBits) {
        let r = Math.floor(d / N), c = d % N, b = Math.floor(r / z) * z + Math.floor(c / z);
        let mask = rowM[r] | colM[c] | blkM[b];
        let opts = [];
        for (let i = 1; i <= N; i++) if (!(mask & (1n << BigInt(i)))) opts.push(i);

        if (opts.length === 0 || (fixed[d] !== 0 && !opts.includes(fixed[d]))) {
            d--; rowM = [...shadowR[d]]; colM = [...shadowC[d]]; blkM = [...shadowB[d]]; phase[d]++; continue;
        }

        shadowR[d] = [...rowM]; shadowC[d] = [...colM]; shadowB[d] = [...blkM];
        
        let seed = Number(((targetIndex ^ BigInt(d)) * 0x517cc1b727220a95n) % BigInt(opts.length));
        let val = (fixed[d] !== 0) ? fixed[d] : opts[(Math.abs(seed) + phase[d]) % opts.length];
        
        board[d] = val;
        let bit = 1n << BigInt(val);
        rowM[r] |= bit; colM[c] |= bit; blkM[b] |= bit;
        d++;
    }

    const t1 = performance.now();
    render(true);
    log(`[${(t1-t0).toFixed(2)}ms] Graph instantly snapped from Index #${targetIndex}.`);
}

function render(final = false) {
    const s = canvas.width / N; ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < totalBits; i++) {
        let x = (i % N) * s, y = Math.floor(i / N) * s;
        ctx.strokeStyle = "rgba(0, 212, 255, 0.08)"; ctx.strokeRect(x, y, s, s);
        
        if ((Math.floor(i/N)%z===0) && (i%N%z===0)) { 
            ctx.strokeStyle = "rgba(0, 212, 255, 0.3)"; ctx.strokeRect(x, y, s*z, s*z); 
        }

        let val = fixed[i] || board[i];
        if (val) {
            ctx.fillStyle = fixed[i] ? "var(--gold)" : (final ? "var(--sentinel)" : "transparent");
            ctx.font = `bold ${s * 0.5}px monospace`; ctx.textAlign = "center";
            ctx.fillText(val, x + s/2, y + s * 0.7);
        }
    }
}

function resetSystem() { initSystem(); log("Grid and Memory Purged."); }

canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const s = canvas.width / N;
    const idx = Math.floor((e.clientY - rect.top) / s) * N + Math.floor((e.clientX - rect.left) / s);
    let v = prompt(`Fix Digit at Node ${idx}:`); 
    if (v !== null) { 
        let num = parseInt(v);
        fixed[idx] = (isNaN(num) || num < 0 || num > N) ? 0 : num; 
        board.fill(0); // clear previous inference visually
        calculateHash();
        render(); 
    }
});

initSystem();
</script>
</body>
</html>
