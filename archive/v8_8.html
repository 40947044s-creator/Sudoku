<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Oracle v8.8</title>
    <style>
        :root { 
            --sentinel: #00ff41; --bedrock: #050505; --accent: #00d4ff; 
            --gold: #d4af37; --friction: #ff3333;
        }
        body { 
            background: var(--bedrock); color: var(--sentinel); 
            font-family: 'Courier New', monospace; display: flex; 
            flex-direction: column; align-items: center; margin: 0; padding: 20px;
            overflow: hidden;
        }
        .header { width: 100%; text-align: center; border-bottom: 2px solid var(--sentinel); padding-bottom: 10px; margin-bottom: 10px;}
        
        .index-bar {
            width: 90%; max-width: 600px; background: #111; border: 1px solid #333;
            margin: 10px 0; padding: 12px; border-left: 5px solid var(--gold);
            transition: all 0.2s ease;
        }
        .index-bar.active { border-left-color: var(--sentinel); box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); }
        .index-label { font-size: 0.6rem; color: #888; text-transform: uppercase; }
        .index-value { font-size: 0.85rem; color: var(--gold); word-break: break-all; font-weight: bold;}

        .panel { display: flex; gap: 15px; margin-bottom: 10px; align-items: center; }
        canvas { border: 1px solid #333; cursor: crosshair; background: #000; }
        .console { width: 90%; max-width: 600px; height: 80px; background: #000; border: 1px dashed #444; padding: 10px; font-size: 0.7rem; color: #555; overflow-y: hidden; }
        
        .status-glow { width: 10px; height: 10px; border-radius: 50%; background: var(--friction); display: inline-block; margin-right: 5px; }
        .status-glow.online { background: var(--sentinel); box-shadow: 0 0 8px var(--sentinel); }
    </style>
</head>
<body>

<div class="header">
    <strong>PROJECT NP: ADELIC ORACLE v8.8</strong>
    <div style="font-size: 0.6rem; color: #666;">DYNAMIC MANIFOLD AUTO-GENERATOR</div>
</div>

<div class="index-bar" id="bar">
    <div class="index-label">Live Adelic Anchor (Interaction Driven)</div>
    <div class="index-value" id="index-val">IDLE_WAITING_FOR_INPUT</div>
</div>

<div class="panel">
    <div style="font-size: 0.8rem;"><span id="glow" class="status-glow"></span> SCALE: 
        <select id="z-val" onchange="initSystem()" style="background: #000; color: var(--sentinel); border: 1px solid #444;">
            <option value="2">z=2 (4x4)</option>
            <option value="3" selected>z=3 (9x9)</option>
            <option value="4">z=4 (16x16)</option>
        </select>
    </div>
    <button class="btn" onclick="toggleInference()" id="exec-btn" style="background: none; border: 1px solid var(--sentinel); color: var(--sentinel); padding: 5px 10px; cursor: pointer;">Initialize Graph</button>
</div>

<canvas id="mainCanvas"></canvas>
<div class="console" id="log">> Click the grid to perturb the Anchor and guide the solution.</div>

<script>
let z, N, totalBits, isRunning = false;
let board, fixed, anchor = 40947044n;
let rowM, colM, blkM;

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

function initSystem() {
    isRunning = false;
    z = parseInt(document.getElementById('z-val').value);
    N = z * z;
    totalBits = N * N;
    board = new Uint16Array(totalBits);
    fixed = new Uint16Array(totalBits);
    rowM = new Array(N).fill(0n); colM = new Array(N).fill(0n); blkM = new Array(N).fill(0n);
    canvas.width = canvas.height = 400;
    document.getElementById('exec-btn').innerText = "Execute Inference";
    document.getElementById('glow').className = "status-glow";
    render();
}

function toggleInference() {
    if (isRunning) { isRunning = false; } 
    else { isRunning = true; startInference(); }
}

async function startInference() {
    document.getElementById('glow').className = "status-glow online";
    document.getElementById('exec-btn').innerText = "Halt System";
    document.getElementById('bar').classList.add('active');

    let d = 0;
    while (isRunning && d < totalBits) {
        if (d < 0) { // Auto-Mutation on Failure
            anchor += 1337n; 
            d = 0; 
            board.fill(0); rowM.fill(0n); colM.fill(0n); blkM.fill(0n);
            continue;
        }

        let r = Math.floor(d / N), c = d % N, b = Math.floor(r / z) * z + Math.floor(c / z);
        let mask = rowM[r] | colM[c] | blkM[b];
        
        let opts = [];
        for (let i = 1; i <= N; i++) if (!(mask & (1n << BigInt(i)))) opts.push(i);

        if (opts.length === 0) {
            d--; // Backtrack logic
            if (d >= 0) {
                let prevVal = board[d];
                let pr = Math.floor(d / N), pc = d % N, pb = Math.floor(pr / z) * z + Math.floor(pc / z);
                rowM[pr] &= ~(1n << BigInt(prevVal));
                colM[pc] &= ~(1n << BigInt(prevVal));
                blkM[pb] &= ~(1n << BigInt(prevVal));
                board[d] = 0;
            }
            continue;
        }

        // Dynamic Anchor Selection
        let seed = Number((anchor ^ BigInt(d)) % BigInt(opts.length));
        let val = opts[seed];
        
        board[d] = val;
        let bit = 1n << BigInt(val);
        rowM[r] |= bit; colM[c] |= bit; blkM[b] |= bit;
        
        d++;
        if (d % N === 0) {
            document.getElementById('index-val').innerText = `0x${(anchor ^ BigInt(d)).toString(16).toUpperCase()}`;
            render();
            await new Promise(r => setTimeout(r, 0));
        }
    }
    if (d === totalBits) finalize();
}

canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const s = canvas.width / N;
    const x = Math.floor((e.clientX - rect.left) / s);
    const y = Math.floor((e.clientY - rect.top) / s);
    
    // Interaction mutates the Anchor
    anchor = anchor + BigInt(x * y + 1);
    document.getElementById('log').innerText = `> Perturbation at [${x},${y}]. Anchor Shifted.`;
    if (!isRunning) { toggleInference(); }
});

function render() {
    const s = canvas.width / N;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < totalBits; i++) {
        let x = (i % N) * s, y = Math.floor(i / N) * s;
        ctx.strokeStyle = "#111"; ctx.strokeRect(x, y, s, s);
        if (board[i]) {
            ctx.fillStyle = isRunning ? "white" : "var(--sentinel)";
            ctx.font = `${s * 0.5}px monospace`;
            ctx.textAlign = "center";
            ctx.fillText(board[i], x + s/2, y + s * 0.7);
        }
    }
}

function finalize() {
    isRunning = false;
    document.getElementById('glow').className = "status-glow";
    document.getElementById('exec-btn').innerText = "Reset System";
    document.getElementById('bar').classList.remove('active');
    render();
}

initSystem();
</script>
</body>
</html>
