<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Oracle v11.0</title>
    <style>
        :root { --sentinel: #00ff41; --bg: #050505; --accent: #00d4ff; --gold: #d4af37; }
        body { background: var(--bg); color: var(--sentinel); font-family: 'Courier New', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .nav-panel { width: 95%; max-width: 800px; background: #111; padding: 20px; border-top: 4px solid var(--gold); display: grid; grid-template-columns: 1fr 2fr; gap: 15px; }
        input { background: #000; border: 1px solid #333; color: var(--accent); padding: 10px; font-size: 1.1rem; outline: none; }
        canvas { border: 1px solid var(--accent); background: #000; margin-top: 20px; box-shadow: 0 0 50px rgba(0, 212, 255, 0.1); }
        .btn { grid-column: span 2; background: transparent; border: 1px solid var(--sentinel); color: var(--sentinel); padding: 15px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .btn:hover { background: var(--sentinel); color: #000; }
        #log { width: 95%; max-width: 800px; height: 60px; margin-top: 15px; font-size: 0.7rem; color: #666; overflow-y: auto; }
    </style>
</head>
<body>

<div class="nav-panel">
    <div style="grid-column: span 2; text-align: center; letter-spacing: 3px; color:#fff;">ADELIC NAVIGATOR v11.0</div>
    <div class="input-group" style="display:flex; flex-direction:column;">
        <label style="font-size:0.6rem; color:#888;">SPECTRAL SCALE (Z)</label>
        <input type="number" id="z-val" value="3" onchange="initSystem()">
    </div>
    <div class="input-group" style="display:flex; flex-direction:column;">
        <label style="font-size:0.6rem; color:#888;">UNIQUE SPACE INDEX (REQUIRED)</label>
        <input type="text" id="sol-index" value="0">
    </div>
    <button class="btn" onclick="runPureLookup()">Manifest Unique Isomorphism</button>
</div>

<canvas id="mainCanvas"></canvas>
<div id="log">>> [SYSTEM] Anchor-less logic engaged. Index is the sole coordinate.</div>

<script>
let z, N, total, isRunning = false;
let board, fixed, rowM, colM, blkM, shadowR, shadowC, shadowB;
const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');

function initSystem() {
    z = parseInt(document.getElementById('z-val').value);
    N = z * z; total = N * N;
    board = new Uint16Array(total); fixed = new Uint16Array(total);
    rowM = new Array(N).fill(0n); colM = new Array(N).fill(0n); blkM = new Array(N).fill(0n);
    shadowR = new Array(total); shadowC = new Array(total); shadowB = new Array(total);
    canvas.width = canvas.height = 450;
    render();
}

async function runPureLookup() {
    if (isRunning) return;
    isRunning = true;
    
    // LAW: The Index is the ONLY source of selection entropy
    let solIdx = BigInt(document.getElementById('sol-index').value || "0");
    let activeID = solIdx; 
    
    let d = 0, friction = 0, jumps = 0n;
    rowM.fill(0n); colM.fill(0n); blkM.fill(0n); board.fill(0);
    
    const t0 = performance.now();

    while (isRunning && d >= 0) {
        if (d === total) { 
            const t1 = performance.now();
            finalize(activeID, t1 - t0); 
            break; 
        }

        // DPI Phase Shift within the Index Space
        if (friction > N * 10) {
            jumps++; d = 0; friction = 0;
            activeID = solIdx + jumps;
            rowM.fill(0n); colM.fill(0n); blkM.fill(0n); board.fill(0);
            continue;
        }

        let r = Math.floor(d / N), c = d % N, b = Math.floor(r / z) * z + Math.floor(c / z);
        let mask = rowM[r] | colM[c] | blkM[b];
        
        let opts = [];
        for (let i = 1; i <= N; i++) if (!(mask & (1n << BigInt(i)))) opts.push(i);

        if (opts.length === 0 || (fixed[d] !== 0 && !opts.includes(fixed[d]))) {
            d--;
            if (d < 0) { friction = (N * 10) + 1; continue; }
            rowM = [...shadowR[d]]; colM = [...shadowC[d]]; blkM = [...shadowB[d]];
            friction++; continue;
        }

        shadowR[d] = [...rowM]; shadowC[d] = [...colM]; shadowB[d] = [...blkM];
        
        // PURE INDEX SELECTION (No Anchor Interference)
        // Selection is a deterministic function of the Index and Current Node
        let seed = Number(((activeID ^ BigInt(d)) * 0x517cc1b727220a95n) % BigInt(opts.length));
        let val = (fixed[d] !== 0) ? fixed[d] : opts[Math.abs(seed)];
        
        board[d] = val;
        let bit = 1n << BigInt(val);
        rowM[r] |= bit; colM[c] |= bit; blkM[b] |= bit;
        d++;
    }
}

function render(final = false) {
    const s = canvas.width / N; ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < total; i++) {
        let x = (i % N) * s, y = Math.floor(i / N) * s;
        ctx.strokeStyle = "#111"; ctx.strokeRect(x, y, s, s);
        if (board[i]) {
            ctx.fillStyle = final ? "var(--sentinel)" : "#333";
            ctx.font = `${s * 0.5}px Courier`; ctx.textAlign = "center";
            ctx.fillText(board[i], x + s/2, y + s * 0.7);
        }
    }
}

function finalize(id, time) { 
    isRunning = false; render(true); 
    document.getElementById('sol-index').value = id.toString();
    document.getElementById('log').innerHTML = `[${time.toFixed(2)}ms] UNIQUE MANIFEST AT INDEX: ${id}<br>` + document.getElementById('log').innerHTML;
}

initSystem();
</script>
</body>
</html>
