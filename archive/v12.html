<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Universal Oracle v12.0</title>
    <style>
        :root { 
            --sentinel: #00ff41; --bedrock: #050505; --accent: #00d4ff; 
            --gold: #d4af37; --friction: #ff3333; --panel: #111;
        }
        body { 
            background: var(--bedrock); color: var(--sentinel); 
            font-family: 'Courier New', monospace; display: flex; 
            flex-direction: column; align-items: center; margin: 0; padding: 20px;
        }
        .header { width: 100%; text-align: center; border-bottom: 2px solid var(--sentinel); padding-bottom: 10px; }
        
        .layout { display: grid; grid-template-columns: 320px 1fr; gap: 20px; width: 100%; max-width: 900px; margin-top: 15px; }
        
        .sidebar { display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--panel); border: 1px solid #333; padding: 15px; border-left: 4px solid var(--accent); }
        .card-gold { border-left-color: var(--gold); }
        
        .label { font-size: 0.65rem; color: #888; text-transform: uppercase; margin-bottom: 4px; display: block; }
        input { width: 100%; background: #000; border: 1px solid #444; color: var(--accent); padding: 8px; box-sizing: border-box; outline: none; margin-bottom: 10px; font-family: inherit; }
        
        .btn { width: 100%; background: transparent; border: 1px solid var(--sentinel); color: var(--sentinel); padding: 10px; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .btn:hover { background: var(--sentinel); color: #000; }
        .btn-gold { border-color: var(--gold); color: var(--gold); }
        .btn-gold:hover { background: var(--gold); color: #000; }
        .btn-purge { border-color: var(--friction); color: var(--friction); }
        .btn-purge:hover { background: var(--friction); color: #fff; }

        canvas { border: 1px solid var(--accent); background: #000; box-shadow: 0 0 40px rgba(0, 212, 255, 0.1); cursor: crosshair; }
        
        /* Scrolling List for Anchors */
        .list-container { height: 180px; overflow-y: auto; background: #000; border: 1px dashed #444; padding: 5px; }
        .anchor-item { font-size: 0.7rem; color: var(--accent); padding: 5px; cursor: pointer; border-bottom: 1px solid #222; }
        .anchor-item:hover { background: #222; color: var(--sentinel); }
        
        .console { width: 100%; height: 80px; background: #000; border: 1px dashed #333; margin-top: 15px; padding: 10px; font-size: 0.7rem; color: #666; overflow-y: auto; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="header">
    <strong>PROJECT NP: ADELIC NAVIGATOR v12.0</strong>
    <div style="font-size: 0.7rem; color: #888; margin-top: 5px;">[INDEXED SOLUTION SETS] // [O(1) MANIFESTATION]</div>
</div>

<div class="layout">
    <div class="sidebar">
        <div class="card card-gold">
            <span class="label">Grid Parameters (Z)</span>
            <input type="number" id="z-val" value="3" min="2" max="5" onchange="initSystem()">
            <span class="label">Current Active Address</span>
            <input type="text" id="active-index" readonly value="#0000000000000000" style="color:var(--gold);">
            <button class="btn btn-purge" onclick="resetSystem()">Purge Grid</button>
        </div>

        <div class="card">
            <span class="label">Manifold Scanner</span>
            <button class="btn btn-gold" onclick="scanSolutions()">Scan For Anchors</button>
            <span class="label" style="margin-top:10px;">Available Anchors (Click to Snap)</span>
            <div class="list-container" id="anchor-list">
                <div style="color:#555; font-size:0.65rem; padding:5px;">Awaiting scan...</div>
            </div>
        </div>
    </div>

    <div class="viewport">
        <canvas id="mainCanvas"></canvas>
        <div class="console" id="log">> [SENTINEL] Draw clues on the grid, then scan the manifold.</div>
    </div>
</div>

<script>
let z, N, totalBits, isScanning = false;
let board, fixed, phase;
let rowM, colM, blkM, shadowR, shadowC, shadowB;

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

function log(msg) {
    const l = document.getElementById('log');
    l.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + l.innerHTML;
}

function initSystem() {
    isScanning = false;
    z = parseInt(document.getElementById('z-val').value);
    N = z * z;
    totalBits = N * N;
    board = new Uint16Array(totalBits);
    fixed = new Uint16Array(totalBits);
    phase = new Uint16Array(totalBits);
    rowM = new Array(N).fill(0n); colM = new Array(N).fill(0n); blkM = new Array(N).fill(0n);
    shadowR = new Array(totalBits); shadowC = new Array(totalBits); shadowB = new Array(totalBits);
    canvas.width = canvas.height = 450;
    document.getElementById('anchor-list').innerHTML = '';
    render();
}

// 1. SCAN MANIFOLD: Finds multiple valid Anchors for the current user graph
async function scanSolutions() {
    if (isScanning) return;
    isScanning = true;
    document.getElementById('anchor-list').innerHTML = '';
    log("Scanning active solution set...");

    let anchorBase = BigInt(Date.now() % 1000000);
    let d = 0, scanStep = 0n, friction = 0;
    let solutionsFound = 0;
    
    rowM.fill(0n); colM.fill(0n); blkM.fill(0n); board.fill(0); phase.fill(0);

    // Limit to finding 15 anchors to prevent infinite loops on sparse grids
    while (isScanning && d >= 0 && solutionsFound < 15) {
        if (d === totalBits) { 
            let foundAddress = (anchorBase ^ (1n << 63n)) + scanStep;
            addAnchorToList(foundAddress);
            solutionsFound++;
            
            // Force Backtrack to find the NEXT solution
            d--;
            rowM = [...shadowR[d]]; colM = [...shadowC[d]]; blkM = [...shadowB[d]];
            phase[d]++;
            continue; 
        }

        if (friction > N * 20) {
            scanStep++; d = 0; friction = 0;
            rowM.fill(0n); colM.fill(0n); blkM.fill(0n); board.fill(0); phase.fill(0);
            if(scanStep % 100n === 0n) await new Promise(r => setTimeout(r, 0)); // yield
            continue;
        }

        let r = Math.floor(d / N), c = d % N, b = Math.floor(r / z) * z + Math.floor(c / z);
        let mask = rowM[r] | colM[c] | blkM[b];
        
        let opts = [];
        for (let i = 1; i <= N; i++) if (!(mask & (1n << BigInt(i)))) opts.push(i);

        if (opts.length === 0 || (fixed[d] !== 0 && !opts.includes(fixed[d]))) {
            d--;
            if (d < 0) { friction = (N*20)+1; continue; }
            rowM = [...shadowR[d]]; colM = [...shadowC[d]]; blkM = [...shadowB[d]];
            phase[d]++; friction++; continue;
        }

        shadowR[d] = [...rowM]; shadowC[d] = [...colM]; shadowB[d] = [...blkM];
        
        let activeID = (anchorBase ^ (1n << 63n)) + scanStep;
        let seed = Number(((activeID ^ BigInt(d)) * 0x517cc1b727220a95n) % BigInt(opts.length));
        let val = (fixed[d] !== 0) ? fixed[d] : opts[(Math.abs(seed) + phase[d]) % opts.length];
        
        board[d] = val;
        let bit = 1n << BigInt(val);
        rowM[r] |= bit; colM[c] |= bit; blkM[b] |= bit;
        d++;
    }
    isScanning = false;
    log(`Scan complete. ${solutionsFound} anchors found.`);
    if(solutionsFound === 0) document.getElementById('anchor-list').innerHTML = '<div style="color:#f33; font-size:0.65rem; padding:5px;">Paradox: No solutions exist for this graph.</div>';
}

function addAnchorToList(address) {
    const list = document.getElementById('anchor-list');
    const item = document.createElement('div');
    item.className = 'anchor-item';
    item.innerText = `ANCHOR: ${address.toString()}`;
    item.onclick = () => snapToAnchor(address);
    list.appendChild(item);
}

// 2. O(1) SNAP GENERATION: Deterministically unfolds the graph using the selected Index
function snapToAnchor(targetAddress) {
    if (isScanning) isScanning = false; // Interrupt scan if active
    let d = 0;
    rowM.fill(0n); colM.fill(0n); blkM.fill(0n); board.fill(0); phase.fill(0);

    const t0 = performance.now();

    while (d >= 0 && d < totalBits) {
        let r = Math.floor(d / N), c = d % N, b = Math.floor(r / z) * z + Math.floor(c / z);
        let mask = rowM[r] | colM[c] | blkM[b];
        
        let opts = [];
        for (let i = 1; i <= N; i++) if (!(mask & (1n << BigInt(i)))) opts.push(i);

        if (opts.length === 0 || (fixed[d] !== 0 && !opts.includes(fixed[d]))) {
            // If the anchor is invalid for the current grid, it will backtrack.
            // A valid index will never trigger this.
            d--;
            rowM = [...shadowR[d]]; colM = [...shadowC[d]]; blkM = [...shadowB[d]];
            phase[d]++; continue;
        }

        shadowR[d] = [...rowM]; shadowC[d] = [...colM]; shadowB[d] = [...blkM];
        
        // Pure Deterministic Selection via the Index
        let seed = Number(((targetAddress ^ BigInt(d)) * 0x517cc1b727220a95n) % BigInt(opts.length));
        let val = (fixed[d] !== 0) ? fixed[d] : opts[(Math.abs(seed) + phase[d]) % opts.length];
        
        board[d] = val;
        let bit = 1n << BigInt(val);
        rowM[r] |= bit; colM[c] |= bit; blkM[b] |= bit;
        d++;
    }

    const t1 = performance.now();
    document.getElementById('active-index').value = `#${targetAddress.toString()}`;
    render(true);
    log(`[${(t1-t0).toFixed(2)}ms] Graph instantly manifested from Address.`);
}

function render(final = false) {
    const s = canvas.width / N;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < totalBits; i++) {
        let x = (i % N) * s, y = Math.floor(i / N) * s;
        ctx.strokeStyle = "rgba(0, 212, 255, 0.08)"; ctx.strokeRect(x, y, s, s);
        
        // Z-Block highlighting
        if ((Math.floor(i/N)%z===0) && (i%N%z===0)) { 
            ctx.strokeStyle = "rgba(0, 212, 255, 0.3)"; ctx.strokeRect(x, y, s*z, s*z); 
        }

        // Draw User Digits (Fixed) and Inferred Digits
        let val = fixed[i] || board[i];
        if (val) {
            // User digits are GOLD, inferred digits are SENTINEL GREEN (or white during active search)
            ctx.fillStyle = fixed[i] ? "var(--gold)" : (final ? "var(--sentinel)" : "#fff");
            ctx.font = `bold ${s * 0.5}px monospace`;
            ctx.textAlign = "center"; ctx.fillText(val, x + s/2, y + s * 0.7);
        }
    }
}

function resetSystem() { initSystem(); log("Grid and Memory Purged."); }

// Allow User to Input their Graph (Clues)
canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const s = canvas.width / N;
    const idx = Math.floor((e.clientY - rect.top) / s) * N + Math.floor((e.clientX - rect.left) / s);
    let v = prompt(`Insert Digit at Node ${idx}:`); 
    if (v !== null) { 
        let num = parseInt(v);
        fixed[idx] = (isNaN(num) || num < 0 || num > N) ? 0 : num; 
        document.getElementById('anchor-list').innerHTML = '<div style="color:#555; font-size:0.65rem; padding:5px;">Graph modified. Re-scan required.</div>';
        board.fill(0); // clear previous inference
        render(); 
    }
});

initSystem();
</script>
</body>
</html>
