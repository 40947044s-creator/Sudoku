<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Oracle v9.0 Graph-Bedrock</title>
    <style>
        :root { 
            --sentinel: #00ff41; --bedrock: #050505; --accent: #00d4ff; 
            --gold: #d4af37; --friction: #ff3333; --panel: #0a0a0a;
        }
        body { 
            background: var(--bedrock); color: var(--sentinel); 
            font-family: 'Courier New', monospace; margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
        }
        .header { width: 100%; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        .index-bar { 
            width: 95%; max-width: 900px; background: var(--panel); border: 1px solid #222; 
            padding: 12px; margin-bottom: 15px; border-left: 4px solid var(--gold); 
        }
        .index-value { font-size: 0.85rem; color: var(--gold); word-break: break-all; letter-spacing: 1px; min-height: 1.2em; }
        .main-layout { display: flex; gap: 20px; width: 95%; max-width: 1100px; justify-content: center; align-items: flex-start; }
        .sidebar { width: 260px; display: flex; flex-direction: column; gap: 10px; }
        .history-panel { height: 460px; background: #000; border: 1px solid #222; overflow-y: auto; padding: 10px; font-size: 0.7rem; color: #666; }
        .history-item { padding: 6px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }
        .history-item.illegal { color: var(--friction); font-weight: bold; }
        .history-item.legal { color: var(--gold); }
        .stage { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .controls { display: flex; gap: 10px; padding: 15px; background: rgba(0, 255, 65, 0.02); border: 1px solid #222; width: 100%; justify-content: center; }
        canvas { border: 1px solid var(--accent); background: #000; box-shadow: 0 0 50px rgba(0, 212, 255, 0.05); }
        input, button { background: #000; border: 1px solid #444; color: var(--accent); padding: 6px; font-size: 0.75rem; font-family: inherit; }
        .btn { border-color: var(--sentinel); color: var(--sentinel); cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn:hover { background: var(--sentinel); color: #000; }
        .btn.solidify { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>

<div class="header">
    <strong>PROJECT NP: ADELIC ORACLE v9.0</strong>
    <div style="font-size: 0.6rem; color: #555; margin-top: 4px;">GRAPH-BEDROCK INITIALIZATION | PRESSURE-BASED INFERENCE</div>
</div>

<div class="index-bar">
    <div style="font-size: 0.65rem; color: #888; margin-bottom: 4px;">ADELIC FREQUENCY (TOPOLOGICAL DRIFT)</div>
    <div class="index-value" id="index-val">#AWAITING_GRAPH_STATE</div>
    <div style="font-size: 0.6rem; color: var(--accent); margin-top: 6px;">
        Drifts: <span id="f-val">0</span> | Snap Stability: <span id="filled-val">0</span> / <span id="total-val">0</span>
    </div>
</div>

<div class="main-layout">
    <div class="sidebar">
        <div style="font-size: 0.7rem; color: var(--gold); letter-spacing: 1px;">STATIONARY WAVES</div>
        <div class="history-panel" id="history-list"></div>
        <button class="btn solidify" onclick="solidifyBoard()" style="width:100%; margin-top: 5px;">Solidify Board</button>
        <button class="btn" onclick="factoryReset()" style="color:var(--friction); border-color:var(--friction); width:100%;">Factory Purge</button>
    </div>

    <div class="stage">
        <div class="controls">
            <div>z: <input type="number" id="z-val" value="3" min="2" max="5" style="width: 35px;" onchange="factoryReset()"></div>
            <div>Anchor: <input type="text" id="path-id" value="40947045" style="width: 140px;"></div>
            <button class="btn" id="inf-btn" onclick="startInference()">Execute Graph</button>
        </div>
        <canvas id="mainCanvas"></canvas>
    </div>
</div>

<script>
let z, N, totalBits, isRunning = false;
let board, fixed, inputHistory = [], adj = [];
let rowM, colM, blkM;
const ADELIC_CONST = 0x517cc1b727220a95n;

const HEX_SENTINEL = "#00ff41", HEX_GOLD = "#d4af37", HEX_FRICTION = "#ff3333";
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

// --- 1. FIRST STATE: GRAPH INITIALIZATION ---
function initGraph() {
    adj = Array.from({ length: totalBits }, () => []);
    for (let i = 0; i < totalBits; i++) {
        let r = Math.floor(i / N), c = i % N, b = Math.floor(r / z) * z + Math.floor(c / z);
        for (let j = 0; j < totalBits; j++) {
            if (i === j) continue;
            let rr = Math.floor(j / N), cc = j % N, bb = Math.floor(rr / z) * z + Math.floor(cc / z);
            if (r === rr || c === cc || b === bb) {
                adj[i].push(j); 
            }
        }
    }
}

function factoryReset() {
    z = parseInt(document.getElementById('z-val').value);
    N = z * z; totalBits = N * N;
    fixed = new Uint16Array(totalBits);
    inputHistory = [];
    document.getElementById('history-list').innerHTML = '';
    document.getElementById('total-val').innerText = totalBits;
    initGraph();
    softReset();
}

function softReset() {
    isRunning = false;
    board = new Uint16Array(totalBits);
    rowM = new Array(N).fill(0n); colM = new Array(N).fill(0n); blkM = new Array(N).fill(0n);
    for(let i=0; i<totalBits; i++) {
        if(fixed[i]) {
            let r = Math.floor(i/N), c = i%N, b = Math.floor(r/z)*z + Math.floor(c/z);
            let bit = 1n << BigInt(fixed[i]);
            rowM[r] |= bit; colM[c] |= bit; blkM[b] |= bit;
        }
    }
    canvas.width = canvas.height = Math.min(window.innerWidth * 0.8, 500);
    render();
}

function getValidOptions(idx) {
    let r = Math.floor(idx / N), c = idx % N, b = Math.floor(r / z) * z + Math.floor(c / z);
    let mask = rowM[r] | colM[c] | blkM[b];
    let opts = [];
    for (let v = 1; v <= N; v++) if (!(mask & (1n << BigInt(v)))) opts.push(v);
    return opts;
}

function countPressure(idx) {
    let count = 0;
    for(let neighbor of adj[idx]) {
        if (!fixed[neighbor] && !board[neighbor]) count++;
    }
    return count;
}

function solidifyBoard() {
    for (let i = 0; i < totalBits; i++) {
        if (!fixed[i] && board[i]) fixed[i] = board[i];
    }
    updateHistoryUI();
    softReset();
}

// --- 2. v9.0 GRAPH-BEDROCK INFERENCE ---
async function startInference() {
    if (isRunning) { isRunning = false; return; }
    softReset();
    isRunning = true;
    document.getElementById('inf-btn').innerText = "STOP";
    
    let anchor = BigInt(document.getElementById('path-id').value || 40947045) | 1n;
    let driftCount = 0, activeID = anchor;

    while (isRunning) {
        let targetNode = -1, minOpts = N + 1, bestOpts = [], maxPressure = -1, filledCount = 0;

        // TOPOLOGICAL SCAN: Find the node with the highest constraint pressure
        for (let i = 0; i < totalBits; i++) {
            if (fixed[i] || board[i]) { filledCount++; continue; }

            let opts = getValidOptions(i);
            if (opts.length === 0) { targetNode = -2; break; } // Paradox

            // Heuristic: Min Options (Entropy) -> Max Pressure (Degree)
            if (opts.length < minOpts) {
                minOpts = opts.length;
                targetNode = i;
                bestOpts = opts;
                maxPressure = countPressure(i);
            } else if (opts.length === minOpts) {
                let p = countPressure(i);
                if (p > maxPressure) {
                    maxPressure = p;
                    targetNode = i;
                    bestOpts = opts;
                }
            }
        }

        if (filledCount === totalBits) { finalize(); break; }

        if (targetNode === -2) {
            // MANIFOLD DRIFT: Rotate frequency when graph collapses
            driftCount++; activeID++;
            updateStats(activeID, driftCount, filledCount);
            board.fill(0); 
            rowM.fill(0n); colM.fill(0n); blkM.fill(0n);
            for(let i=0; i<totalBits; i++) if(fixed[i]) {
                let r = Math.floor(i/N), c = i%N, b = Math.floor(r/z)*z + Math.floor(c/z);
                let bit = 1n << BigInt(fixed[i]);
                rowM[r] |= bit; colM[c] |= bit; blkM[b] |= bit;
            }
            await new Promise(r => setTimeout(r, 0));
            continue;
        }

        // RESOLUTION: The Seed is now only a tie-breaker for equal pressure nodes
        let val;
        if (minOpts === 1) {
            val = bestOpts[0];
        } else {
            let r = Math.floor(targetNode/N), c = targetNode%N, b = Math.floor(r/z)*z + Math.floor(c/z);
            let jitter = (BigInt(r) * 13n) ^ (BigInt(c) * 17n) ^ (BigInt(b) * 19n);
            let h = (activeID ^ BigInt(targetNode) ^ jitter) * ADELIC_CONST;
            val = bestOpts[Number(h % BigInt(bestOpts.length))];
        }

        let r = Math.floor(targetNode/N), c = targetNode%N, b = Math.floor(r/z)*z + Math.floor(c/z);
        board[targetNode] = val;
        let bit = 1n << BigInt(val);
        rowM[r] |= bit; colM[c] |= bit; blkM[b] |= bit;

        if (filledCount % Math.floor(N/2) === 0) {
            updateStats(activeID, driftCount, filledCount);
            render();
            await new Promise(r => setTimeout(r, 0));
        }
    }
    document.getElementById('inf-btn').innerText = "EXECUTE GRAPH";
}

function updateStats(id, d, f) {
    document.getElementById('index-val').innerText = `#${id.toString()}`;
    document.getElementById('f-val').innerText = d;
    document.getElementById('filled-val').innerText = f;
}

function render(final = false) {
    const s = canvas.width / N;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for(let i=0; i<=z; i++) {
        ctx.strokeStyle = "rgba(0, 212, 255, 0.15)"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(i*s*z, 0); ctx.lineTo(i*s*z, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i*s*z); ctx.lineTo(canvas.width, i*s*z); ctx.stroke();
    }
    for (let i = 0; i < totalBits; i++) {
        let x = (i % N) * s, y = Math.floor(i / N) * s;
        ctx.lineWidth = 1; ctx.strokeStyle = "#111"; ctx.strokeRect(x, y, s, s);
        let val = fixed[i] || board[i];
        if (val) {
            let isUser = fixed[i] !== 0;
            ctx.fillStyle = isUser ? HEX_GOLD : (final ? HEX_SENTINEL : "white");
            ctx.font = `bold ${s*0.5}px monospace`; ctx.textAlign = "center";
            ctx.fillText(val, x+s/2, y+s*0.7);
        }
    }
}

canvas.addEventListener('mousedown', (e) => {
    const r = canvas.getBoundingClientRect(); const s = canvas.width / N;
    const idx = Math.floor((e.clientY - r.top) / s) * N + Math.floor((e.clientX - r.left) / s);
    let v = prompt(`Plant Digit at C${idx}:`);
    if (v !== null) {
        let val = parseInt(v) || 0; fixed[idx] = val;
        updateHistoryUI(); softReset();
    }
});

function updateHistoryUI() {
    document.getElementById('history-list').innerHTML = inputHistory.slice().reverse().map(h => 
        `<div class="history-item legal"><span>C${h.idx}</span><span>→ ${h.val}</span></div>`
    ).join('');
}

function finalize() { isRunning = false; render(true); }
factoryReset();
</script>
</body>
</html>
