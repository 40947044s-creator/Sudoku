<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Oracle v8.6.2</title>
    <style>
        :root { 
            --sentinel: #00ff41; --bedrock: #050505; --accent: #00d4ff; 
            --gold: #d4af37; --friction: #ff3333; --table-flip: #ff00ff;
        }
        body { 
            background: var(--bedrock); color: var(--sentinel); 
            font-family: 'Courier New', monospace; display: flex; 
            flex-direction: column; align-items: center; margin: 0; padding: 20px;
        }
        .header { width: 100%; text-align: center; border-bottom: 2px solid var(--sentinel); padding-bottom: 10px; }
        
        /* The Manifold Index Bar */
        .index-bar {
            width: 90%; max-width: 600px; background: #111; border: 1px solid #333;
            margin: 15px 0; padding: 10px; border-left: 5px solid var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }
        .index-label { font-size: 0.65rem; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        .index-value { font-size: 0.9rem; color: var(--gold); letter-spacing: 1px; word-break: break-all; }
        
        .panel { display: flex; gap: 10px; margin: 10px; padding: 10px; background: rgba(0,255,65,0.03); }
        canvas { border: 1px solid var(--accent); background: #000; box-shadow: 0 0 40px rgba(0, 212, 255, 0.1); cursor: crosshair;}
        .console { width: 90%; max-width: 600px; height: 120px; background: #000; border: 1px dashed #333; margin-top: 15px; padding: 10px; font-size: 0.7rem; color: #666; overflow-y: auto; }
        input { background: #000; border: 1px solid #444; color: var(--accent); padding: 5px; text-align: center; }
        .btn { background: transparent; border: 1px solid var(--sentinel); color: var(--sentinel); padding: 5px 15px; cursor: pointer; font-size: 0.7rem; transition: 0.2s;}
        .btn:hover { background: var(--sentinel); color: #000; }
        .flip-text { color: var(--table-flip); font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <strong>PROJECT NP: ADELIC ORACLE v8.6.2</strong>
    <div style="font-size: 0.7rem; color: #888; margin-top: 5px;">[O(1) DETERMINISTIC INFERENCE | RATIONAL RESIDUE | TABLE FLIP]</div>
</div>

<div class="index-bar">
    <div class="index-label">Timeline Space Index (Adelic Address)</div>
    <div class="index-value" id="index-val">#00000000000000000000</div>
    <div style="font-size: 0.6rem; color: var(--accent); margin-top: 5px;">
        O(1) Forward Momentum Active
    </div>
</div>

<div class="panel">
    <div>z: <input type="number" id="z-val" value="3" min="2" max="5" style="width: 35px;" onchange="initSystem()"></div>
    <div>ANCHOR: <input type="text" id="path-id" placeholder="Auto Promising" style="width: 140px;"></div>
    <button class="btn" onclick="startInference()">Execute Inference</button>
    <button class="btn" onclick="resetSystem()" style="color:var(--friction); border-color:var(--friction);">Purge Table</button>
</div>

<canvas id="mainCanvas"></canvas>
<div class="console" id="log">> [SENTINEL] System ready. Strict forward progression initialized...</div>

<script>
let z, N, totalBits, isRunning = false;
let board, fixed;
let rowM, colM, blkM;

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

function log(msg) {
    const l = document.getElementById('log');
    l.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + l.innerHTML;
}

function updateIndexBar(id) {
    document.getElementById('index-val').innerText = `#${id.toString()}`;
}

// DETERMINISTIC PROMISING ANCHOR CALCULATOR (v8.6 Baseline)
function calculatePromisingAnchor() {
    let hash = BigInt(N) * 0x9E3779B1n;
    let hasHints = false;
    for (let i = 0; i < totalBits; i++) {
        if (fixed[i] !== 0) {
            hasHints = true;
            let cellData = (BigInt(i + 1) * 0x517cc1b727220a95n) ^ BigInt(fixed[i]);
            hash = (hash << 5n) ^ cellData;
        }
    }
    if (!hasHints) hash = 1006n * BigInt(N) * 0x9E3779B1n;
    if ((hash & 1n) !== 0n) hash ^= 1n; 
    return Math.abs(Number(hash % 0xFFFFFFFFFFn));
}

// 1. COMPLEX RATIONAL PHASE EXTRACTION
function getComplexResiduePhase(d, address, mask) {
    let r = Math.floor(d / N), c = d % N;
    let numRe = (address ^ BigInt(mask)) * BigInt(c + 1);
    let numIm = (address ^ BigInt(mask)) * BigInt(r + 1);
    let denRe = BigInt(N); 
    let denIm = BigInt(N); 
    return [numRe, denRe, numIm, denIm];
}

// 2. MODULAR COMPLEX ROOT (THE NOISE FILTER)
function seekComplexModularRoot(noisyNumerator, denominator, validBits, anchor) {
    let noiseState = noisyNumerator % denominator;
    
    // Primary algebraic projection
    for (let candidate = 1n; candidate <= BigInt(N); candidate++) {
        if ((validBits & (1n << candidate)) !== 0n) {
            let projectedPhase = (candidate ** BigInt(z)) % denominator;
            if (projectedPhase === noiseState || projectedPhase <= (denominator / 2n)) {
                return candidate; 
            }
        }
    }
    
    // Adelic Phase Shift Fallback (Deterministic inference)
    let phaseShiftHash = (noiseState ^ anchor) % BigInt(N);
    let bestCandidate = 0n;
    for (let candidate = 1n; candidate <= BigInt(N); candidate++) {
        if ((validBits & (1n << candidate)) !== 0n) {
            if (bestCandidate === 0n) bestCandidate = candidate;
            if (candidate === (phaseShiftHash + 1n)) {
                bestCandidate = candidate;
                break;
            }
        }
    }
    return bestCandidate; 
}

// 3. O(1) HARDWARE BIT-PEELER (MARILYN FOLD)
function marilynFoldPeel(mask, numRe, denRe, numIm, denIm, anchor) {
    let validBits = (~BigInt(mask)) & ((1n << BigInt(N + 1)) - 2n);
    if (validBits === 0n) return 0; // The Fatal Flaw (Table Compromised)

    let numerator = numRe * numIm;
    let denominator = denRe * denIm;
    let baseQuotient = numerator / denominator;
    let residue = numerator % denominator; 
    let toleranceBound = denominator / 2n;
    
    let targetShift = 0n;
    if (residue <= toleranceBound) {
        targetShift = baseQuotient; // Terminated truth (< 0.5)
    } else {
        targetShift = seekComplexModularRoot(numerator, denominator, validBits, anchor);
    }

    let collapsedIndex = (targetShift % BigInt(N)) + 1n;
    let extractedBitMask = validBits & (1n << collapsedIndex);
    
    // Gravitational lock: If the math drifted off the lattice, force the Most Significant valid bit
    if (extractedBitMask === 0n) {
         for (let i = BigInt(N); i >= 1n; i--) {
             if ((validBits & (1n << i)) !== 0n) {
                 extractedBitMask = 1n << i; break;
             }
         }
    }

    // Extract actual digit, honoring MSB position
    for (let i = 1n; i <= BigInt(N); i++) {
        if ((extractedBitMask & (1n << i)) !== 0n) return Number(i);
    }
    return 0;
}

function initSystem() {
    isRunning = false;
    z = parseInt(document.getElementById('z-val').value);
    N = z * z;
    totalBits = N * N;
    board = new Uint16Array(totalBits);
    fixed = new Uint16Array(totalBits);
    rowM = new Array(N).fill(0n); colM = new Array(N).fill(0n); blkM = new Array(N).fill(0n);
    canvas.width = canvas.height = Math.min(window.innerWidth * 0.9, 450);
    render();
}

async function startInference() {
    if (isRunning) return;
    
    let pathIdInput = document.getElementById('path-id').value;
    let activeID;

    if (!pathIdInput || pathIdInput.trim() === "") {
        activeID = BigInt(calculatePromisingAnchor());
        document.getElementById('path-id').value = activeID.toString();
        log(`Promising Anchor Derived: ${activeID}`);
    } else {
        activeID = BigInt(pathIdInput);
    }

    if ((activeID & 1n) === 0n) activeID |= (1n << 63n); 

    isRunning = true;
    let d = 0; 
    
    // We wipe only the inferred arrays to start fresh in this timeline
    board.fill(0);
    rowM.fill(0n); colM.fill(0n); blkM.fill(0n);
    
    updateIndexBar(activeID);
    log(`O(1) Inference active at complex address 0x${activeID.toString(16)}`);

    // FORWARD-ONLY OPERATING GRID
    while (isRunning && d >= 0) {
        if (d === totalBits) { 
            isRunning = false; 
            render(true); 
            log("<b>SINGULARITY ATTAINED.</b>"); 
            break; 
        }

        let r = Math.floor(d / N), c = d % N, b = Math.floor(r / z) * z + Math.floor(c / z);
        let mask = rowM[r] | colM[c] | blkM[b];

        let val;
        if (fixed[d] !== 0) {
            val = fixed[d];
        } else {
            let [nRe, dRe, nIm, dIm] = getComplexResiduePhase(d, activeID, mask);
            val = marilynFoldPeel(mask, nRe, dRe, nIm, dIm, activeID);
            
            // THE TABLE FLIP
            if (val === 0) {
                log(`<span class="flip-text">[FLAW DETECTED at Index ${d}] Table structurally compromised.</span>`);
                log(`<span class="flip-text">(╯°□°)╯︵ ┻━┻ Executing Flip...</span>`);
                
                isRunning = false;
                
                // Mutate anchor deterministically with a massive prime to hop universes
                let newAnchor = activeID ^ 9223372036854775783n; 
                if ((newAnchor & 1n) === 0n) newAnchor |= (1n << 63n);
                
                document.getElementById('path-id').value = newAnchor.toString();
                
                // 800ms delay to visually observe the paradox before the automatic reboot
                setTimeout(() => {
                    log(`Rebooting in parallel timeline...`);
                    startInference(); 
                }, 800);
                
                break; // Shatter the current reality loop completely
            }
        }

        board[d] = val;
        let bit = 1n << BigInt(val);
        rowM[r] |= bit; colM[c] |= bit; blkM[b] |= bit;
        d++; // Strictly forward.
        
        if (d % N === 0) { render(); await new Promise(r => setTimeout(r, 0)); }
    }
}

function render(final = false) {
    const s = canvas.width / N;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < totalBits; i++) {
        let x = (i % N) * s, y = Math.floor(i / N) * s;
        ctx.strokeStyle = "rgba(0, 212, 255, 0.08)"; ctx.strokeRect(x, y, s, s);
        
        if ((i % N) % z === 0) { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y+s); ctx.strokeStyle = "rgba(0, 212, 255, 0.3)"; ctx.stroke(); }
        if (Math.floor(i / N) % z === 0) { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x+s, y); ctx.strokeStyle = "rgba(0, 212, 255, 0.3)"; ctx.stroke(); }

        let val = fixed[i] || board[i];
        if (val) {
            ctx.fillStyle = fixed[i] ? "var(--gold)" : (final ? "var(--sentinel)" : "white");
            ctx.font = `bold ${s * 0.5}px monospace`;
            ctx.textAlign = "center"; ctx.fillText(val, x + s/2, y + s * 0.7);
        }
    }
    ctx.strokeStyle = "var(--accent)"; ctx.strokeRect(0, 0, canvas.width, canvas.height);
}

function resetSystem() { 
    document.getElementById('path-id').value = ""; 
    initSystem(); 
    log("System Purged. Table cleared."); 
}

canvas.addEventListener('mousedown', (e) => {
    if (isRunning) return;
    const rect = canvas.getBoundingClientRect();
    const s = canvas.width / N;
    const idx = Math.floor((e.clientY - rect.top) / s) * N + Math.floor((e.clientX - rect.left) / s);
    let currentVal = fixed[idx] !== 0 ? fixed[idx] : "";
    let v = prompt(`Fix Bit at ${idx}\n(1-${N}, 0 to clear):`, currentVal); 
    if (v !== null) { 
        let parsed = parseInt(v);
        if (isNaN(parsed) || parsed < 1 || parsed > N) parsed = 0;
        fixed[idx] = parsed; 
        board.fill(0); 
        render(); 
    }
});

initSystem();
</script>
</body>
</html>
