<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Oracle v10.1 Spectral</title>
    <style>
        :root { 
            --sentinel: #00ff41; --bedrock: #050505; --accent: #00d4ff; 
            --gold: #d4af37; --friction: #ff3333; --panel: #0a0a0a;
        }
        body { 
            background: var(--bedrock); color: var(--sentinel); 
            font-family: 'Courier New', monospace; margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
        }
        .header { width: 100%; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        .index-bar { 
            width: 95%; max-width: 900px; background: var(--panel); border: 1px solid #222; 
            padding: 12px; margin-bottom: 15px; border-left: 4px solid var(--gold); 
        }
        .index-value { font-size: 0.75rem; color: var(--gold); word-break: break-all; letter-spacing: 1px; line-height: 1.4; }
        .main-layout { display: flex; gap: 20px; width: 95%; max-width: 1100px; justify-content: center; align-items: flex-start; }
        .sidebar { width: 280px; display: flex; flex-direction: column; gap: 10px; }
        .history-panel { height: 460px; background: #000; border: 1px solid #222; overflow-y: auto; padding: 10px; font-size: 0.7rem; color: #666; }
        .history-item { padding: 6px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }
        .history-item.illegal { color: var(--friction); font-weight: bold; }
        .history-item.legal { color: var(--gold); }
        .stage { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .controls { 
            display: flex; gap: 10px; padding: 15px; background: rgba(0, 255, 65, 0.02); 
            border: 1px solid #222; width: 100%; justify-content: center;
        }
        canvas { border: 1px solid var(--accent); background: #000; box-shadow: 0 0 50px rgba(0, 212, 255, 0.05); }
        input, button { background: #000; border: 1px solid #444; color: var(--accent); padding: 6px; font-size: 0.75rem; font-family: inherit; }
        .btn { border-color: var(--sentinel); color: var(--sentinel); cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn:hover { background: var(--sentinel); color: #000; }
        .btn.solidify { border-color: var(--gold); color: var(--gold); }
    </style>
</head>
<body>

<div class="header">
    <strong>PROJECT NP: ADELIC ORACLE v10.1</strong>
    <div style="font-size: 0.6rem; color: #555; margin-top: 4px;">128-BIT SPECTRAL DETERMINANT | GRAPH BEDROCK STATE</div>
</div>

<div class="index-bar">
    <div style="font-size: 0.6rem; color: #888; margin-bottom: 4px;">128-BIT SPECTRAL ANCHOR [SENTINEL | PAYLOAD]</div>
    <div class="index-value" id="index-val">0x00000000000000000000000000000000</div>
    <div style="font-size: 0.6rem; color: var(--accent); margin-top: 6px;">
        Graph Pressure: <span id="filled-val">0</span> / <span id="total-val">0</span> | Veto Count: <span id="v-val">0</span>
    </div>
</div>

<div class="main-layout">
    <div class="sidebar">
        <div style="font-size: 0.7rem; color: var(--gold); letter-spacing: 1px;">STATIONARY WAVES</div>
        <div class="history-panel" id="history-list"></div>
        <button class="btn solidify" onclick="solidifyBoard()" style="width:100%; margin-top: 5px;">Solidify Board</button>
        <button class="btn" onclick="factoryReset()" style="color:var(--friction); border-color:var(--friction); width:100%;">Factory Purge</button>
    </div>

    <div class="stage">
        <div class="controls">
            <div>z: <input type="number" id="z-val" value="3" min="2" max="5" style="width: 35px;" onchange="factoryReset()"></div>
            <button class="btn" id="inf-btn" onclick="startInference()">Execute Determinant</button>
        </div>
        <canvas id="mainCanvas"></canvas>
    </div>
</div>

<script>
let z, N, totalBits, isRunning = false;
let board, fixed, inputHistory = [], adj = [];
const ADELIC_CONST = 0x517cc1b727220a95n;
const MASK_96 = (1n << 96n) - 1n;

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

// --- 1. TOPOLOGICAL INITIALIZATION ---
function initGraph() {
    adj = Array.from({ length: totalBits }, () => []);
    for (let i = 0; i < totalBits; i++) {
        let r = Math.floor(i / N), c = i % N, b = Math.floor(r / z) * z + Math.floor(c / z);
        for (let j = 0; j < totalBits; j++) {
            if (i === j) continue;
            let rr = Math.floor(j / N), cc = j % N, bb = Math.floor(rr / z) * z + Math.floor(cc / z);
            if (r === rr || c === cc || b === bb) adj[i].push(j);
        }
    }
}

function factoryReset() {
    z = parseInt(document.getElementById('z-val').value);
    N = z * z; totalBits = N * N;
    fixed = new Uint16Array(totalBits);
    inputHistory = [];
    document.getElementById('total-val').innerText = totalBits;
    initGraph();
    softReset();
}

function softReset() {
    isRunning = false;
    board = new Uint16Array(totalBits);
    canvas.width = canvas.height = Math.min(window.innerWidth * 0.8, 500);
    render();
}

// --- 2. SPECTRAL DERIVATION: THE ANCHOR FUNCTION A(P) ---
function calculateGlobalParity() {
    let sentinelBits = 0n;
    for (let b = 0; b < N; b++) { // 16 blocks for n=16
        let blockResidue = 0n;
        for (let i = 0; i < totalBits; i++) {
            let br = Math.floor(Math.floor(i/N)/z)*z + Math.floor((i%N)/z);
            if (br === b && fixed[i]) blockResidue += BigInt(fixed[i]) * (BigInt(i % N) + 1n);
        }
        sentinelBits = (sentinelBits << 2n) | (blockResidue % 4n);
    }
    return sentinelBits;
}

function deriveSpectralAnchor() {
    let payload = 0n;
    for (let i = 0; i < totalBits; i++) {
        if (fixed[i]) {
            let pressure = BigInt(countPressure(i));
            payload ^= (BigInt(fixed[i]) * ADELIC_CONST) << (pressure % 64n);
        }
    }
    let sentinel = calculateGlobalParity();
    return (sentinel << 96n) | (payload & MASK_96);
}

// --- 3. GRAPH-BEDROCK INFERENCE ENGINE ---
async function startInference() {
    if (isRunning) { isRunning = false; return; }
    softReset();
    isRunning = true;
    document.getElementById('inf-btn').innerText = "STOP";
    
    // DERIVE: The anchor is constructed from the Graph Bedrock
    let activeID = deriveSpectralAnchor();
    let vetos = 0;

    while (isRunning) {
        let target = -1, minOpts = N + 1, bestOpts = [], maxPressure = -1, filledCount = 0;

        // Entropy Scan
        for (let i = 0; i < totalBits; i++) {
            if (fixed[i] || board[i]) { filledCount++; continue; }
            let opts = getValidOptions(i);
            if (opts.length === 0) { target = -2; break; }
            if (opts.length < minOpts) {
                minOpts = opts.length; target = i; bestOpts = opts; maxPressure = countPressure(i);
            } else if (opts.length === minOpts) {
                let p = countPressure(i);
                if (p > maxPressure) { maxPressure = p; target = i; bestOpts = opts; }
            }
        }

        if (filledCount === totalBits) { finalize(); break; }

        if (target === -2) {
            // MANIFOLD DRIFT: If the sentinel is violated, shift the Adelic address
            vetos++;
            activeID += (1n << 32n); // Drift in the mid-range
            updateStats(activeID, vetos, filledCount);
            board.fill(0);
            await new Promise(r => setTimeout(r, 0));
            continue;
        }

        // AGGRESSIVE POLICING: Seed is policed by the 128-bit Sentinel
        let val;
        if (minOpts === 1) {
            val = bestOpts[0];
        } else {
            let jitter = BigInt(target % N) * 13n;
            let h = (activeID ^ BigInt(target) ^ jitter) * ADELIC_CONST;
            // Policing: Choice must be resonant with the 128-bit phase
            val = bestOpts[Number((h & MASK_96) % BigInt(bestOpts.length))];
        }

        board[target] = val;

        if (filledCount % 8 === 0) {
            updateStats(activeID, vetos, filledCount);
            render();
            await new Promise(r => setTimeout(r, 0));
        }
    }
    document.getElementById('inf-btn').innerText = "EXECUTE DETERMINANT";
}

function countPressure(idx) {
    let c = 0;
    for(let n of adj[idx]) if(!fixed[n] && !board[n]) c++;
    return c;
}

function getValidOptions(idx) {
    let used = 0n;
    for(let n of adj[idx]) {
        let v = fixed[n] || board[n];
        if(v) used |= (1n << BigInt(v));
    }
    let opts = [];
    for(let v=1; v<=N; v++) if(!(used & (1n << BigInt(v)))) opts.push(v);
    return opts;
}

function updateStats(id, v, f) {
    document.getElementById('index-val').innerText = "0x" + id.toString(16).padStart(32, '0').toUpperCase();
    document.getElementById('v-val').innerText = v;
    document.getElementById('filled-val').innerText = f;
}

function render(final = false) {
    const s = canvas.width / N;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for(let i=0; i<=z; i++) {
        ctx.strokeStyle = "rgba(0, 212, 255, 0.2)"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(i*s*z, 0); ctx.lineTo(i*s*z, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i*s*z); ctx.lineTo(canvas.width, i*s*z); ctx.stroke();
    }
    for (let i = 0; i < totalBits; i++) {
        let x = (i % N) * s, y = Math.floor(i / N) * s;
        ctx.lineWidth = 1; ctx.strokeStyle = "#111"; ctx.strokeRect(x, y, s, s);
        let val = fixed[i] || board[i];
        if (val) {
            let isUser = fixed[i] !== 0;
            ctx.fillStyle = isUser ? "#d4af37" : (final ? "#00ff41" : "white");
            ctx.font = `bold ${s*0.5}px monospace`; ctx.textAlign = "center";
            ctx.fillText(val, x+s/2, y+s*0.7);
        }
    }
}

canvas.addEventListener('mousedown', (e) => {
    const r = canvas.getBoundingClientRect(); const s = canvas.width / N;
    const idx = Math.floor((e.clientY - r.top) / s) * N + Math.floor((e.clientX - r.left) / s);
    let v = prompt(`Stationary Wave at C${idx}:`);
    if (v !== null) { fixed[idx] = parseInt(v) || 0; softReset(); }
});

function solidifyBoard() {
    for (let i = 0; i < totalBits; i++) if (!fixed[i] && board[i]) fixed[i] = board[i];
    softReset();
}

function finalize() { isRunning = false; render(true); }
factoryReset();
</script>
</body>
</html>
