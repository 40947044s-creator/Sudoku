<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project NP | Adelic Sudoku Oracle O(1)</title>
    <style>
        :root {
            --sentinel: #00ff41;
            --bedrock: #050505;
            --glass: rgba(0, 255, 65, 0.1);
            --friction: #ff3333;
            --flip: #ff00ff;
        }
        body {
            background: var(--bedrock);
            color: var(--sentinel);
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            padding: 15px;
            box-sizing: border-box;
            overflow: hidden;
        }
        #header { text-align: center; width: 100%; border-bottom: 1px solid var(--sentinel); padding-bottom: 10px; }
        .stats { font-size: 0.7rem; color: #888; margin-top: 5px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1/1;
            border: 2px solid var(--sentinel);
            margin: 20px 0;
            background: rgba(0, 255, 65, 0.02);
        }
        .cell {
            width: 100%; height: 100%;
            border: 0.5px solid rgba(0, 255, 65, 0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; cursor: pointer; outline: none; color: #fff;
        }
        .cell:focus { background: var(--glass); }
        .cell.fixed { color: #d4af37; font-weight: bold; }
        .cell.inferred { color: var(--sentinel); }
        .cell:nth-child(3n) { border-right: 2px solid var(--sentinel); }
        .cell:nth-child(9n) { border-right: 0.5px solid rgba(0, 255, 65, 0.2); }
        .grid .cell:nth-child(n+19):nth-child(-n+27),
        .grid .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid var(--sentinel); }
        
        #console {
            width: 100%; max-width: 400px; height: 120px;
            background: #000; border: 1px dashed var(--sentinel);
            font-size: 0.75rem; padding: 10px; overflow-y: auto;
            margin-bottom: 15px; box-sizing: border-box;
        }
        .controls { display: flex; gap: 10px; width: 100%; max-width: 400px; }
        .btn {
            flex: 1; background: var(--glass); border: 1px solid var(--sentinel);
            color: var(--sentinel); padding: 15px; cursor: pointer;
            font-family: inherit; text-transform: uppercase; font-weight: bold; transition: 0.2s;
        }
        .btn:hover { background: var(--sentinel); color: #000; }
        .flip-text { color: var(--flip); font-weight: bold; }
    </style>
</head>
<body>

    <div id="header">
        <strong>PROJECT NP: ADELIC ORACLE</strong>
        <div class="stats">GUARD: 1855-BIT | O(1) DETERMINISTIC FOLD | MSB INTACT</div>
    </div>

    <div id="console">
        [SYSTEM] STANDBY. Singularity Mode 0 Detected.<br>
        [INFO] Awaiting MSB Injection.
    </div>

    <div class="grid" id="lattice"></div>

    <div class="controls">
        <button class="btn" onclick="executeSnapFold()">Snap Fold</button>
        <button class="btn" onclick="purgeManifold()" style="color:var(--friction); border-color:var(--friction);">Purge Trace</button>
    </div>

    <script>
        const lattice = document.getElementById('lattice');
        const consoleLog = document.getElementById('console');
        const cells = [];
        const N = 9;
        
        let rowM = new Array(N).fill(0n);
        let colM = new Array(N).fill(0n);
        let blkM = new Array(N).fill(0n);
        let isRunning = false;
        let currentAnchor = 0n;

        // 1. ADELIC GEOMETRY: RATIONAL COMPLEX PLANE
        class Complex2Adic {
            constructor(d, address, mask) {
                let r = Math.floor(d / N), c = d % N;
                // Rational integers only. No floating points.
                this.numRe = (address ^ mask) * BigInt(c + 1);
                this.numIm = (address ^ mask) * BigInt(r + 1);
                this.denRe = BigInt(N);
                this.denIm = BigInt(N);
            }

            // The Marilyn Fold: Galois Norm Collapse
            collapse(validBits, anchor) {
                if (validBits === 0n) return 0; // Liar Paradox: The Flaw

                let numerator = this.numRe * this.numIm;
                let denominator = this.denRe * this.denIm;
                
                let baseQuotient = numerator / denominator;
                let residue = numerator % denominator;
                let toleranceBound = denominator / 2n;

                let targetShift = 0n;

                // O(1) Deterministic Collapse based on bounded noise
                if (residue <= toleranceBound) {
                    targetShift = baseQuotient;
                } else {
                    targetShift = this.seekModularRoot(numerator, denominator, validBits, anchor);
                }

                let collapsedIndex = (targetShift % BigInt(N)) + 1n;
                let extractedBitMask = validBits & (1n << collapsedIndex);

                // Gravitational lock to nearest valid physical bit
                if (extractedBitMask === 0n) {
                    for (let i = BigInt(N); i >= 1n; i--) {
                        if ((validBits & (1n << i)) !== 0n) {
                            extractedBitMask = 1n << i; break;
                        }
                    }
                }

                // Return positional magnitude strictly preserving MSB
                for (let i = 1n; i <= BigInt(N); i++) {
                    if ((extractedBitMask & (1n << i)) !== 0n) return Number(i);
                }
                return 0;
            }

            seekModularRoot(noisyNumerator, denominator, validBits, anchor) {
                let noiseState = noisyNumerator % denominator;
                
                // Primary Projection
                for (let candidate = 1n; candidate <= BigInt(N); candidate++) {
                    if ((validBits & (1n << candidate)) !== 0n) {
                        let projectedPhase = (candidate ** 3n) % denominator;
                        if (projectedPhase === noiseState || projectedPhase <= (denominator / 2n)) {
                            return candidate;
                        }
                    }
                }
                
                // Adelic Phase Shift
                let phaseShiftHash = (noiseState ^ anchor) % BigInt(N);
                let bestCandidate = 0n;
                for (let candidate = 1n; candidate <= BigInt(N); candidate++) {
                    if ((validBits & (1n << candidate)) !== 0n) {
                        if (bestCandidate === 0n) bestCandidate = candidate;
                        if (candidate === (phaseShiftHash + 1n)) {
                            bestCandidate = candidate; break;
                        }
                    }
                }
                return bestCandidate;
            }
        }

        // 2. LATTICE INITIALIZATION
        for (let i = 0; i < 81; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.contentEditable = "true";
            cell.oninput = (e) => {
                if (!/[1-9]/.test(e.data)) { e.target.innerText = ""; cell.classList.remove('fixed'); }
                else { e.target.innerText = e.data[0]; cell.classList.add('fixed'); }
            };
            lattice.appendChild(cell);
            cells.push(cell);
        }

        function updateLog(msg) {
            consoleLog.innerHTML = `> [${new Date().toLocaleTimeString()}] ${msg}<br>` + consoleLog.innerHTML;
        }

        function extractTopologyHash() {
            let hash = 9n * 0x9E3779B1n;
            let hasHints = false;
            for (let i = 0; i < 81; i++) {
                if (cells[i].classList.contains('fixed')) {
                    hasHints = true;
                    let val = BigInt(parseInt(cells[i].innerText));
                    let cellData = (BigInt(i + 1) * 0x517cc1b727220a95n) ^ val;
                    hash = (hash << 5n) ^ cellData;
                }
            }
            if (!hasHints) hash = 1006n * 9n * 0x9E3779B1n;
            if ((hash & 1n) === 0n) hash |= (1n << 63n); // MSB Injection
            return Math.abs(Number(hash % 0xFFFFFFFFFFn));
        }

        // 3. THE SENTINEL ENGINE (Forward Momentum Loop)
        async function executeSnapFold() {
            if (isRunning) return;
            const start = performance.now();
            
            if (currentAnchor === 0n) {
                currentAnchor = BigInt(extractTopologyHash());
                updateLog("INITIATING MSB INJECTION...");
                updateLog(`Symmetry broken. Timeline Address: 0x${currentAnchor.toString(16)}`);
            }

            isRunning = true;
            rowM.fill(0n); colM.fill(0n); blkM.fill(0n);

            // Populate masks with fixed bits
            for (let i = 0; i < 81; i++) {
                if (!cells[i].classList.contains('fixed')) cells[i].innerText = "";
                else {
                    let r = Math.floor(i / N), c = i % N, b = Math.floor(r / 3) * 3 + Math.floor(c / 3);
                    let val = parseInt(cells[i].innerText);
                    let bit = 1n << BigInt(val);
                    rowM[r] |= bit; colM[c] |= bit; blkM[b] |= bit;
                }
            }

            let d = 0;

            // O(1) Engine - No Backtracking Allowed
            while (isRunning && d < 81) {
                if (cells[d].classList.contains('fixed')) {
                    d++; continue;
                }

                let r = Math.floor(d / N), c = d % N, b = Math.floor(r / 3) * 3 + Math.floor(c / 3);
                let mask = rowM[r] | colM[c] | blkM[b];
                let validBits = (~mask) & ((1n << 10n) - 2n);

                // Dimension Up: Lift into Complex Plane
                let lift = new Complex2Adic(d, currentAnchor, mask);
                
                // Galois Collapse to Peel Bit
                let val = lift.collapse(validBits, currentAnchor);

                if (val === 0) {
                    updateLog(`<span class="flip-text">LIAR PARADOX DETECTED at Depth ${d}. NO GROUNDING.</span>`);
                    updateLog(`<span class="flip-text">(╯°□°)╯︵ ┻━┻ FLIPPING TABLE...</span>`);
                    
                    isRunning = false;
                    currentAnchor = currentAnchor ^ 9223372036854775783n; 
                    if ((currentAnchor & 1n) === 0n) currentAnchor |= (1n << 63n);
                    
                    setTimeout(() => {
                        updateLog(`Rebooting trace in new timeline...`);
                        executeSnapFold(); 
                    }, 500);
                    return;
                }

                cells[d].innerText = val;
                cells[d].classList.add('inferred');
                let bit = 1n << BigInt(val);
                rowM[r] |= bit; colM[c] |= bit; blkM[b] |= bit;
                
                d++;
                if (d % N === 0) await new Promise(res => setTimeout(res, 0));
            }

            if (d === 81) {
                const elapsed = (performance.now() - start).toFixed(4);
                updateLog(`LATTER COLLAPSED. [Snap Time: ${elapsed}ms]`);
                updateLog(`GROUNDING PHASE: Ψ EXTRACTED.`);
                isRunning = false;
                currentAnchor = 0n;
            }
        }

        function purgeManifold() {
            isRunning = false;
            currentAnchor = 0n;
            cells.forEach(c => {
                c.innerText = "";
                c.classList.remove('fixed', 'inferred');
            });
            updateLog("ADELIC TRACE PURGED. System Idle.");
        }
    </script>
</body>
</html>
