<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Oracle v18.5</title>
    <style>
        :root { --sentinel: #00ff41; --bedrock: #050505; --accent: #00d4ff; --gold: #d4af37; --psi: #ff00ff; --error: #ff3333; }
        body { background: var(--bedrock); color: var(--sentinel); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .header { text-align: center; border-bottom: 2px solid var(--sentinel); width: 100%; max-width: 900px; padding-bottom: 10px; margin-bottom: 25px; }
        .panel { display: flex; gap: 20px; background: #111; padding: 20px; border: 1px solid #333; border-top: 4px solid var(--gold); width: 100%; max-width: 1150px; box-sizing: border-box; }
        .grid-container { flex: 1.5; display: flex; flex-direction: column; align-items: center; }
        .grid { display: grid; border: 3px solid var(--sentinel); background: rgba(0, 255, 65, 0.02); }
        .cell { border: 0.5px solid rgba(0, 255, 65, 0.1); display: flex; align-items: center; justify-content: center; color: var(--gold); font-weight: bold; outline: none; cursor: text; overflow: hidden; }
        .cell.invalid { background: rgba(255, 51, 51, 0.3); color: var(--error); border: 1.5px solid var(--error); }
        .cell.calculated { color: #fff; font-weight: normal; background: rgba(0, 212, 255, 0.03); }
        .controls { flex: 1; display: flex; flex-direction: column; gap: 12px; }
        .io-label { font-size: 0.65rem; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        #rank-id-io { width: 100%; background: #000; color: var(--accent); border: 1px solid #444; padding: 12px; box-sizing: border-box; font-family: inherit; font-size: 0.85rem; word-break: break-all; min-height: 140px; outline: none; text-align: center; resize: none; }
        .btn { background: rgba(0, 255, 65, 0.1); border: 1px solid var(--sentinel); color: var(--sentinel); padding: 14px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .btn:hover { background: var(--sentinel); color: #000; }
        #status { font-size: 0.75rem; color: #999; margin-top: 10px; border-left: 2px solid var(--gold); padding-left: 10px; min-height: 60px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="header">
    <strong>PROJECT NP: ADELIC ORACLE v18.5</strong>
    <div style="font-size:0.6rem; color:#888;">[BOUNDARY GUARD | ASYNC PROPAGATION]</div>
</div>

<div class="panel">
    <div class="grid-container">
        <div style="display:flex; gap:10px; width:100%; margin-bottom:10px;">
            <div style="flex:1;"><div class="io-label">Dim (z)</div><input type="number" id="z-val" value="3" min="2" max="4" style="width:100%; background:#000; color:var(--accent); border:1px solid #444; padding:5px;" onchange="init()"></div>
            <button class="btn" style="flex:2; font-size:0.65rem; border-color:var(--error); color:var(--error);" onclick="purge()">Purge Grid</button>
        </div>
        <div id="grid-root"></div>
    </div>
    <div class="controls">
        <div class="io-label">Adelic Rank-ID</div>
        <textarea id="rank-id-io" placeholder="Enter ID..."></textarea>
        <button class="btn" onclick="executeSnap()">Path A: Snap Pointer</button>
        <button class="btn" style="border-color:var(--psi); color:var(--psi);" onclick="executeInference()">Path B: Infer Plant</button>
        <div id="status">> [SYSTEM] Safety Governor Active. Max z=4.</div>
    </div>
</div>

<script>
    let z, n, total, cells = [];
    let isRunning = false;

    function log(msg) { document.getElementById('status').innerHTML = `> ${msg}`; }

    function init() {
        let zInput = parseInt(document.getElementById('z-val').value);
        if (zInput > 4) { zInput = 4; document.getElementById('z-val').value = 4; log("WARN: z limited to 4 to prevent manifold collapse."); }
        z = zInput; n = z * z; total = n * n;
        const root = document.getElementById('grid-root'); root.innerHTML = '';
        const grid = document.createElement('div');
        grid.className = 'grid'; grid.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
        const size = Math.min(window.innerWidth * 0.45, 500);
        grid.style.width = grid.style.height = `${size}px`;
        cells = [];
        for (let i = 0; i < total; i++) {
            const c = document.createElement('div'); c.className = 'cell'; c.contentEditable = "true";
            c.style.fontSize = `${(size/n) * (n > 9 ? 0.35 : 0.5)}px`;
            if ((Math.floor(i / n) + 1) % z === 0 && Math.floor(i / n) < n - 1) c.style.borderBottom = "2.5px solid var(--sentinel)";
            if ((i + 1) % z === 0 && (i + 1) % n !== 0) c.style.borderRight = "2.5px solid var(--sentinel)";
            c.oninput = () => { validate(); };
            grid.appendChild(c); cells.push(c);
        }
        root.appendChild(grid);
        log(`Scaled: n=${n} (${total} cells). Ready.`);
    }

    function getOpts(board, d) {
        let r = Math.floor(d / n), c = d % n, b = Math.floor(r / z) * z + Math.floor(c / z);
        let mask = 0;
        for (let j = 0; j < n; j++) {
            mask |= (1 << (board[r * n + j] - 1));
            mask |= (1 << (board[j * n + c] - 1));
        }
        let br = Math.floor(r / z) * z, bc = Math.floor(c / z) * z;
        for (let i = 0; i < z; i++) for (let j = 0; j < z; j++) mask |= (1 << (board[(br + i) * n + (bc + j)] - 1));
        let opts = [];
        for (let i = 1; i <= n; i++) if (!(mask & (1 << (i - 1)))) opts.push(i);
        return opts;
    }

    function validate() {
        let board = cells.map(c => parseInt(c.innerText) || 0);
        let violations = new Set();
        for (let i = 0; i < total; i++) {
            if (board[i] === 0) continue;
            let r = Math.floor(i/n), c = i%n, b = Math.floor(r/z)*z + Math.floor(c/z);
            for(let j=0; j<total; j++) {
                if(i===j || board[j]===0) continue;
                if((Math.floor(j/n)===r || j%n===c || (Math.floor(Math.floor(j/n)/z)*z + Math.floor((j%n)/z))===b) && board[i]===board[j]) violations.add(i);
            }
        }
        cells.forEach((c, idx) => violations.has(idx) ? c.classList.add('invalid') : c.classList.remove('invalid'));
        return violations.size === 0;
    }

    async function executeSnap() {
        let input = document.getElementById('rank-id-io').value.replace(/\D/g, '');
        let idVal = BigInt(input || "0");
        let board = new Uint32Array(total);
        log("Snap: Async Projection...");
        for (let d = 0; d < total; d++) {
            let opts = getOpts(board, d).sort((a,b) => a-b);
            if (opts.length === 0) return log("<span style='color:var(--error)'>WA: Out of Bounds.</span>");
            let choiceIdx = Number(idVal % BigInt(opts.length));
            idVal /= BigInt(opts.length);
            board[d] = opts[choiceIdx];
            cells[d].innerText = board[d];
            cells[d].classList.add('calculated');
            if (d % n === 0) await new Promise(r => requestAnimationFrame(r));
        }
        log("SUCCESS.");
    }

    async function executeInference() {
        if (isRunning || !validate()) return;
        isRunning = true;
        let board = cells.map(c => parseInt(c.innerText) || 0);
        let fixed = board.map((v, i) => v !== 0 ? i : -1).filter(i => i !== -1);
        function solve() {
            let bestCell = -1, minOpts = n + 1, bestOpts = [];
            for (let i = 0; i < total; i++) {
                if (board[i] === 0) {
                    let opts = getOpts(board, i);
                    if (opts.length === 0) return false;
                    if (opts.length < minOpts) { minOpts = opts.length; bestCell = i; bestOpts = opts; }
                }
            }
            if (bestCell === -1) return true;
            for (let val of bestOpts) {
                board[bestCell] = val;
                if (solve()) return true;
                board[bestCell] = 0;
            }
            return false;
        }
        const t0 = performance.now();
        let success = solve();
        const t1 = performance.now();
        if (success) {
            board.forEach((v, i) => { cells[i].innerText = v; if (!fixed.includes(i)) cells[i].classList.add('calculated'); });
            log(`Truth URL Grounded in ${(t1-t0).toFixed(1)}ms.`);
            synthesis();
        } else log("<span style='color:var(--error)'>WA: Irrational.</span>");
        isRunning = false;
    }

    function synthesis() {
        let board = cells.map(c => parseInt(c.innerText) || 0);
        let id = 0n, mult = 1n, tBoard = new Uint32Array(total);
        for (let d = 0; d < total; d++) {
            let opts = getOpts(tBoard, d).sort((a,b) => a-b);
            if (board[d] !== 0) { id += BigInt(opts.indexOf(board[d])) * mult; tBoard[d] = board[d]; }
            mult *= BigInt(opts.length || 1);
        }
        document.getElementById('rank-id-io').value = id.toString();
    }

    function purge() { cells.forEach(c => { c.innerText = ""; c.className = 'cell'; }); log("Purged."); }
    init();
</script>
</body>
</html>
