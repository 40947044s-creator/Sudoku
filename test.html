<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Project NP | v11.4 DPI Phase</title>
    <style>
        :root { 
            --sentinel: #00ff41; --bedrock: #050505; --accent: #00d4ff; 
            --gold: #d4af37; --friction: #ff3333; --panel: #0a0a0a;
        }
        body { background: var(--bedrock); color: var(--sentinel); font-family: 'Courier New', monospace; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        .index-bar { width: 95%; max-width: 1000px; background: var(--panel); border: 1px solid #222; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--accent); }
        .index-value { font-size: 0.7rem; color: var(--gold); word-break: break-all; font-weight: bold; }
        .status-panel { background: #000; border: 1px solid #222; padding: 10px; font-size: 0.8rem; line-height: 1.6; margin-bottom: 10px; width: 280px; }
        canvas { border: 1px solid var(--accent); background: #000; }
        .btn { border: 1px solid var(--sentinel); color: var(--sentinel); background: none; cursor: pointer; padding: 10px; text-transform: uppercase; width: 100%; font-weight: bold; margin: 5px 0; }
        .btn:hover { background: var(--sentinel); color: #000; }
        .btn.dpi { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>

<div class="header">
    <strong>PROJECT NP: ADELIC ORACLE v11.4</strong>
    <div style="font-size: 0.6rem; color: #555; margin-top: 4px;">DPI PHASE INTEGRATION | O(N) WAVEFRONT | MANIFOLD RESONANCE</div>
</div>

<div class="index-bar">
    <div style="font-size: 0.6rem; color: #888; margin-bottom: 5px;">128-BIT ANCHOR (ACTIVE PHASE)</div>
    <div class="index-value" id="anchor-hex">0x00000000000000000000000000000000</div>
</div>

<div style="display:flex; gap:20px; align-items:flex-start;">
    <div class="sidebar">
        <div class="status-panel">
            <span style="color:var(--accent)">STATUS:</span> <span id="stat-text">READY</span><br>
            <span style="color:var(--accent)">RESONANCE:</span> <span id="res-val">0%</span><br>
            <span style="color:var(--friction)">CONFLICTS:</span> <span id="conflict-val">0</span><br>
            <span style="color:var(--accent)">DPI DRIFTS:</span> <span id="dpi-val">0</span>
        </div>
        <button class="btn" onclick="factoryReset()">Purge</button>
        <button class="btn" onclick="solidifyBoard()">Solidify</button>
        <button class="btn dpi" onclick="executeDPIPhase()">Execute DPI Snap</button>
    </div>
    <canvas id="mainCanvas"></canvas>
</div>

<script>
let z, N, totalBits, activeID = 0n, dpiCount = 0;
let board, fixed, adj = [];
const ADELIC_CONST = 0x517cc1b727220a95n;

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

function initGraph() {
    adj = Array.from({ length: totalBits }, () => []);
    for (let i = 0; i < totalBits; i++) {
        let r = Math.floor(i / N), c = i % N, b = Math.floor(r / z) * z + Math.floor(c / z);
        for (let j = 0; j < totalBits; j++) {
            if (i === j) continue;
            let rr = Math.floor(j / N), cc = j % N, bb = Math.floor(rr / z) * z + Math.floor(cc / z);
            if (r === rr || c === cc || b === bb) adj[i].push(j);
        }
    }
}

function factoryReset() {
    z = parseInt(prompt("Enter Z (3, 4, 5):", "3")) || 3;
    N = z * z; totalBits = N * N;
    fixed = new Uint16Array(totalBits);
    dpiCount = 0;
    initGraph();
    softReset();
}

function softReset() {
    board = new Uint16Array(totalBits);
    canvas.width = canvas.height = Math.min(window.innerWidth * 0.7, 550);
    render();
}

function marilynFold(anchor, idx) {
    let r = Math.floor(idx / N), c = idx % N;
    let rotation = BigInt((r * 13) + (c * 17)) % 128n;
    let projection = (anchor >> rotation) | (anchor << (128n - rotation));
    return Number((projection * ADELIC_CONST) % BigInt(N)) + 1;
}

function deriveAnchor(conflictIdx = -1) {
    let payload = 0n;
    for (let i = 0; i < totalBits; i++) {
        if (fixed[i]) {
            let rot = BigInt((Math.floor(i/N)*13) + ((i%N)*17)) % 128n;
            payload ^= (BigInt(fixed[i]) * ADELIC_CONST) << rot;
        }
    }
    // DPI Injection: If we have a conflict, use its topological weight to nudge the phase
    if (conflictIdx !== -1) {
        payload ^= (BigInt(conflictIdx) * ADELIC_CONST);
    }
    return payload | (1n << 127n); // Maintain high-order sentinel bit
}

async function executeDPIPhase() {
    const start = performance.now();
    let conflicts = [];
    
    // 1. Initial Snap
    activeID = deriveAnchor();
    for (let i = 0; i < totalBits; i++) if (!fixed[i]) board[i] = marilynFold(activeID, i);

    // 2. Law Audit
    for (let i = 0; i < totalBits; i++) {
        let val = fixed[i] || board[i];
        for (let n of adj[i]) {
            if ((fixed[n] || board[n]) === val) { conflicts.push(i); break; }
        }
    }

    // 3. DPI Loop: If not real, inject interference and re-snap
    if (conflicts.length > 0 && dpiCount < 10) {
        document.getElementById('stat-text').innerText = "DPI TUNING...";
        dpiCount++;
        activeID = deriveAnchor(conflicts[0]); // Inject first conflict into phase
        for (let i = 0; i < totalBits; i++) if (!fixed[i]) board[i] = marilynFold(activeID, i);
    }

    // Final Stats
    let finalConflicts = 0;
    for (let i = 0; i < totalBits; i++) {
        let val = fixed[i] || board[i];
        let c = false;
        for (let n of adj[i]) if ((fixed[n] || board[n]) === val) { c = true; break; }
        if (c) finalConflicts++;
    }

    document.getElementById('anchor-hex').innerText = "0x" + activeID.toString(16).toUpperCase();
    document.getElementById('conflict-val').innerText = finalConflicts;
    document.getElementById('dpi-val').innerText = dpiCount;
    document.getElementById('res-val').innerText = Math.round(((totalBits - finalConflicts) / totalBits) * 100) + "%";
    document.getElementById('stat-text').innerText = finalConflicts === 0 ? "RESONANT" : "DISSONANT";
    
    render();
}

function render() {
    const s = canvas.width / N;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < totalBits; i++) {
        let x = (i % N) * s, y = Math.floor(i / N) * s;
        let val = fixed[i] || board[i];
        if (val) {
            let conflict = false;
            for (let n of adj[i]) if ((fixed[n] || board[n]) === val) { conflict = true; break; }
            ctx.fillStyle = fixed[i] ? "#d4af37" : (conflict ? "#ff3333" : "white");
            ctx.font = `${s*0.5}px monospace`; ctx.textAlign = "center";
            ctx.fillText(val, x+s/2, y+s*0.7);
        }
        ctx.strokeStyle = "#222"; ctx.strokeRect(x, y, s, s);
    }
}

canvas.addEventListener('mousedown', (e) => {
    const r = canvas.getBoundingClientRect(); const s = canvas.width / N;
    const idx = Math.floor((e.clientY - r.top) / s) * N + Math.floor((e.clientX - r.left) / s);
    let v = prompt("Digit:"); if (v !== null) { fixed[idx] = parseInt(v) || 0; softReset(); }
});

function solidifyBoard() {
    for (let i = 0; i < totalBits; i++) if (!fixed[i] && board[i]) fixed[i] = board[i];
    softReset();
}

factoryReset();
</script>
</body>
</html>
