<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Oracle v8.6.6</title>
    <style>
        :root { --sentinel: #00ff41; --bedrock: #050505; --gold: #d4af37; --friction: #ff3333; }
        body { background: var(--bedrock); color: var(--sentinel); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; overflow: hidden; height: 100vh; }
        #header { text-align: center; border-bottom: 1px solid var(--sentinel); width: 100%; padding-bottom: 5px; }
        .archive-link { font-size: 0.75rem; color: var(--gold); margin: 5px 0; text-decoration: none; border-bottom: 1px solid var(--gold); }
        #lattice-container { width: 90vmin; height: 90vmin; background: #000; border: 1px solid var(--sentinel); position: relative; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; }
        .controls { display: flex; gap: 10px; margin: 10px; font-size: 0.8rem; width: 90vmin; }
        input { background: #000; border: 1px solid #444; color: var(--gold); padding: 5px; flex: 1; text-align: center; }
        #console { width: 90vmin; height: 80px; background: #000; border: 1px dashed #333; padding: 5px; font-size: 0.65rem; overflow-y: auto; color: #666; }
    </style>
</head>
<body>

<div id="header">
    <strong>PROJECT NP | ADELIC ORACLE v8.6.6</strong>
    <div style="font-size: 0.6rem;">Optimized for N=81 | Static Anchor Mapping</div>
    <a href="https://40947044s-creator.github.io/Sudoku/archive/v86" class="archive-link" target="_blank">v8.6 Research Core (N=NP Link)</a>
</div>

<div id="lattice-container">
    <canvas id="mCanvas"></canvas>
</div>

<div id="console">> [SYSTEM] Standby. Select z (3 for N=9, 9 for N=81).</div>

<div class="controls">
    z:<input type="number" id="zVal" value="3" style="max-width: 40px;">
    Anchor:<input type="text" id="aIn" placeholder="Static Key">
    <button onclick="executeInference()">Execute</button>
    <button onclick="purge()" style="color:var(--friction)">Purge</button>
</div>

<script>
    const canvas = document.getElementById('mCanvas');
    const ctx = canvas.getContext('2d');
    const log = document.getElementById('console');
    let z, N, total, board, fixed, phase, rowM, colM, blkM, shadowR, shadowC, shadowB, isRunning = false;

    function init() {
        z = parseInt(document.getElementById('zVal').value);
        N = z * z; total = N * N;
        board = new Uint16Array(total); fixed = new Uint16Array(total); phase = new Uint16Array(total);
        rowM = new BigUint64Array(N); colM = new BigUint64Array(N); blkM = new BigUint64Array(N);
        // Using Typed Arrays for memory efficiency at N=81
        shadowR = new BigUint64Array(total * N); 
        shadowC = new BigUint64Array(total * N);
        shadowB = new BigUint64Array(total * N);
        render();
    }

    function updateLog(m) { log.innerHTML = `> ${m}<br>` + log.innerHTML; }

    function render() {
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        const s = canvas.width / N;
        ctx.clearRect(0,0,canvas.width, canvas.height);
        for(let i=0; i<total; i++) {
            let x = (i%N)*s, y = Math.floor(i/N)*s;
            ctx.strokeStyle = "#111"; ctx.strokeRect(x,y,s,s);
            if(board[i]) {
                ctx.fillStyle = fixed[i] ? "var(--gold)" : "var(--sentinel)";
                ctx.font = `${s*0.6}px monospace`; ctx.textAlign="center";
                ctx.fillText(board[i], x+s/2, y+s*0.75);
            }
        }
    }

    async function executeInference() {
        if(isRunning) return;
        let anchor = document.getElementById('aIn').value;
        let aVal = anchor ? BigInt(anchor) : (BigInt(N) * 0x9E3779B1n) | (1n << 63n);
        document.getElementById('aIn').value = aVal.toString();
        
        isRunning = true; d = 0; friction = 0;
        rowM.fill(0n); colM.fill(0n); blkM.fill(0n);
        for(let i=0; i<total; i++) {
            if(fixed[i]) {
                let r=Math.floor(i/N), c=i%N, b=Math.floor(r/z)*z+Math.floor(c/z);
                let bit = 1n << BigInt(fixed[i]);
                rowM[r]|=bit; colM[c]|=bit; blkM[b]|=bit; board[i]=fixed[i];
            }
        }

        while(isRunning && d < total) {
            if(d < 0) { updateLog("VOID: Anchor Mismatch."); isRunning=false; return; }
            if(fixed[d]) { d++; continue; }

            let r=Math.floor(d/N), c=d%N, b=Math.floor(r/z)*z+Math.floor(c/z);
            let mask = rowM[r] | colM[c] | blkM[b];
            let opts = [];
            for(let i=1; i<=N; i++) if(!(mask & (1n << BigInt(i)))) opts.push(i);

            if(opts.length === 0) {
                board[d]=0; d--; 
                if(d >= 0) {
                    for(let i=0; i<N; i++) {
                        rowM[i] = shadowR[d*N+i]; colM[i] = shadowC[d*N+i]; blkM[i] = shadowB[d*N+i];
                    }
                    phase[d]++;
                }
                continue;
            }

            // Save state in optimized flat buffers
            for(let i=0; i<N; i++) {
                shadowR[d*N+i] = rowM[i]; shadowC[d*N+i] = colM[i]; shadowB[d*N+i] = blkM[i];
            }

            let seed = Number(((aVal ^ BigInt(d)) * 0x517cc1b727220a95n) % 0xFFFFFFFn);
            let val = opts[(Math.abs(seed) + phase[d]) % opts.length];
            board[d] = val;
            let bit = 1n << BigInt(val);
            rowM[r]|=bit; colM[c]|=bit; blkM[b]|=bit;
            d++;
            if(d % (N*2) === 0) { render(); await new Promise(r=>setTimeout(r,0)); }
        }
        updateLog("SINGULARITY ATTAINED."); render(); isRunning = false;
    }

    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect(); const s = canvas.width / N;
        const i = Math.floor((e.clientY - rect.top)/s)*N + Math.floor((e.clientX - rect.left)/s);
        let v = prompt(`N=${N} | Cell ${i}:`, fixed[i]||"");
        fixed[i] = parseInt(v)||0; board[i]=fixed[i]; render();
    });

    function purge() { board.fill(0); fixed.fill(0); phase.fill(0); render(); updateLog("Purged."); }
    document.getElementById('zVal').onchange = init;
    init();
</script>
</body>
</html>
