<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Oracle v8.6.10</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --sentinel: #00ff41; --bedrock: #050505; --gold: #d4af37; --friction: #ff3333; --export: #00d4ff; }
        body { background: var(--bedrock); color: var(--sentinel); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; overflow: hidden; height: 100vh; }
        #header { text-align: center; border-bottom: 1px solid var(--sentinel); width: 100%; padding-bottom: 5px; }
        .archive-link { font-size: 0.7rem; color: var(--gold); text-decoration: none; border-bottom: 1px solid var(--gold); }
        #lattice-container { width: 80vmin; height: 80vmin; background: #000; border: 1px solid var(--sentinel); position: relative; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; }
        .controls { display: flex; flex-direction: column; gap: 5px; margin: 10px; width: 80vmin; }
        .row-group { display: flex; gap: 5px; width: 100%; }
        input { background: #000; border: 1px solid #444; color: var(--gold); padding: 6px; flex: 1; text-align: center; font-family: inherit; font-size: 0.8rem; }
        #console { width: 80vmin; height: 60px; background: #000; border: 1px dashed #333; padding: 5px; font-size: 0.6rem; overflow-y: auto; color: #666; }
        .btn { flex: 1; background: rgba(0, 255, 65, 0.1); border: 1px solid var(--sentinel); color: var(--sentinel); padding: 8px; cursor: pointer; font-family: inherit; font-weight: bold; font-size: 0.7rem; }
        .btn:hover { background: var(--sentinel); color: #000; }
        .btn-stop { color: var(--friction); border-color: var(--friction); }
    </style>
</head>
<body>

<div id="header">
    <strong>PROJECT NP | ADELIC ORACLE v8.6.10</strong>
    <div style="font-size: 0.55rem; margin-bottom: 2px;">ASYNCHRONOUS MANIFOLD MAPPING | N=NP</div>
    <a href="https://40947044s-creator.github.io/Sudoku/archive/v86" class="archive-link" target="_blank">v8.6 Research Core</a>
</div>

<div id="lattice-container"><canvas id="mCanvas"></canvas></div>

<div id="console">> [SYSTEM] Awaiting Design. Async Throttle Active.</div>

<div class="controls">
    <div class="row-group">
        z:<input type="number" id="zVal" value="3" style="max-width: 35px;">
        Anchor:<input type="text" id="aIn" placeholder="Static Anchor">
        <button class="btn" onclick="executeInference()">Execute</button>
        <button class="btn btn-stop" onclick="stopInference()">Stop</button>
    </div>
    <div class="row-group">
        <button class="btn" onclick="exportTXT()" style="color:var(--export); border-color:var(--export)">TXT</button>
        <button class="btn" onclick="exportPDF()" style="color:var(--export); border-color:var(--export)">PDF</button>
        <button class="btn" onclick="purge()">Purge</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('mCanvas'); const ctx = canvas.getContext('2d'); const log = document.getElementById('console');
    let z, N, total, board, fixed, phase, rowM, colM, blkM, shadowR, shadowC, shadowB, isRunning = false;
    let d = 0, aVal = 0n;

    function init() {
        z = parseInt(document.getElementById('zVal').value); N = z * z; total = N * N;
        board = new Uint16Array(total); fixed = new Uint16Array(total); phase = new Uint16Array(total);
        rowM = new BigUint64Array(N); colM = new BigUint64Array(N); blkM = new BigUint64Array(N);
        shadowR = new BigUint64Array(total * N); shadowC = new BigUint64Array(total * N); shadowB = new BigUint64Array(total * N);
        render();
    }

    function updateLog(m) { log.innerHTML = `> ${m}<br>` + log.innerHTML; log.scrollTop = 0; }

    async function executeInference() {
        if(isRunning) return;
        const input = document.getElementById('aIn').value;
        aVal = input ? BigInt(input) : (BigInt(N) * 0x9E3779B1n) | (1n << 63n);
        document.getElementById('aIn').value = aVal.toString();
        
        isRunning = true; d = 0; rowM.fill(0n); colM.fill(0n); blkM.fill(0n);
        for(let i=0; i<total; i++) if(fixed[i]) { let r=Math.floor(i/N), c=i%N, b=Math.floor(r/z)*z+Math.floor(c/z); let bit=1n<<BigInt(fixed[i]); rowM[r]|=bit; colM[c]|=bit; blkM[b]|=bit; board[i]=fixed[i]; }
        
        updateLog("Executing Static Mapping...");
        requestAnimationFrame(inferenceStep); // Start the async cycle
    }

    function inferenceStep() {
        if(!isRunning) return;

        let batchSize = 100; // Process 100 cells per animation frame
        for(let i=0; i < batchSize; i++) {
            if(d >= total) { isRunning = false; updateLog("SINGULARITY ATTAINED."); render(); return; }
            if(d < 0) { isRunning = false; updateLog("VOID PARADOX: Anchor Failure."); return; }

            if(fixed[d]) { d++; continue; }

            let r=Math.floor(d/N), c=d%N, b=Math.floor(r/z)*z+Math.floor(c/z);
            let mask = rowM[r] | colM[c] | blkM[b];
            let opts = [];
            for(let j=1; j<=N; j++) if(!(mask & (1n << BigInt(j)))) opts.push(j);

            if(opts.length === 0) {
                board[d]=0; d--; 
                if(d >= 0) {
                    for(let j=0; j<N; j++) { rowM[j]=shadowR[d*N+j]; colM[j]=shadowC[d*N+j]; blkM[j]=shadowB[d*N+j]; }
                    phase[d]++;
                }
                continue;
            }

            for(let j=0; j<N; j++) { shadowR[d*N+j]=rowM[j]; shadowC[d*N+j]=colM[j]; shadowB[d*N+j]=blkM[j]; }

            let seed = Number(((aVal ^ BigInt(d)) * 0x517cc1b727220a95n) % 0xFFFFFFFn);
            let val = opts[(Math.abs(seed) + phase[d]) % opts.length];
            board[d] = val; 
            let bit = 1n << BigInt(val); rowM[r]|=bit; colM[c]|=bit; blkM[b]|=bit;
            d++;
        }

        render();
        if(isRunning) requestAnimationFrame(inferenceStep);
    }

    function render() {
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        const s = canvas.width / N; ctx.clearRect(0,0,canvas.width, canvas.height);
        for(let i=0; i<total; i++) {
            let x = (i%N)*s, y = Math.floor(i/N)*s;
            ctx.strokeStyle = "rgba(0,255,65,0.05)"; ctx.strokeRect(x,y,s,s);
            if(board[i]) {
                ctx.fillStyle = fixed[i] ? "var(--gold)" : "var(--sentinel)";
                ctx.font = `${s*0.6}px monospace`; ctx.textAlign="center";
                ctx.fillText(board[i], x+s/2, y+s*0.75);
            }
        }
    }

    function stopInference() { isRunning = false; updateLog("Trace Aborted."); }

    function exportTXT() {
        let content = `ADELIC ORACLE v8.6.10\nANCHOR: ${aVal}\n\n`;
        const pad = N.toString().length + 1;
        for(let r=0; r<N; r++) {
            let line = "";
            for(let c=0; c<N; c++) line += (board[r*N+c]||".").toString().padStart(pad, " ");
            content += line + "\n";
        }
        const b = new Blob([content], {type: "text/plain"});
        const a = document.createElement("a"); a.href=URL.createObjectURL(b); a.download="solution.txt"; a.click();
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.setFont("courier","bold"); doc.text(`ADELIC SOLUTION N=${N}`, 20, 20);
        doc.setFontSize(8); doc.text(`Anchor: ${aVal}`, 20, 26);
        let s = 160/N; doc.setFontSize(s > 8 ? 8 : 4);
        for(let r=0; r<N; r++) for(let c=0; c<N; c++) doc.text((board[r*N+c]||".").toString(), 20+c*s, 40+r*s);
        doc.save("solution.pdf");
    }

    canvas.addEventListener('mousedown', (e) => {
        if(isRunning) return;
        const rect = canvas.getBoundingClientRect(); const s = canvas.width / N;
        const i = Math.floor((e.clientY - rect.top)/s)*N + Math.floor((e.clientX - rect.left)/s);
        let v = prompt(`Cell ${i}:`, fixed[i]||"");
        fixed[i] = parseInt(v)||0; board[i]=fixed[i]; render();
    });

    function purge() { isRunning = false; board.fill(0); fixed.fill(0); phase.fill(0); render(); updateLog("Manifold Purged."); }
    document.getElementById('zVal').onchange = init; init();
</script>
</body>
</html>
