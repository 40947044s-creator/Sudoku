<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>libmarilynnp | Manifold Explorer v7.5</title>
    <style>
        :root { --bg: #0a0b0d; --card: #14161a; --border: #2d333b; --ntnu-red: #e63946; --gold: #ffb703; --ground: #06d6a0; --text: #e1e4e8; --cyan: #219ebc; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* Research Sidebar */
        aside { width: 320px; background: var(--card); border-right: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; gap: 15px; flex-shrink: 0; }
        .metric { background: #1c1f24; padding: 12px; border-radius: 6px; border: 1px solid var(--border); }
        .label { color: #8b949e; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .val { color: var(--gold); font-family: 'Courier New', monospace; font-size: 1.1rem; }

        /* Main Workspace */
        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .toolbar { padding: 15px 30px; background: #14161a; border-bottom: 1px solid var(--border); display: flex; gap: 20px; align-items: center; z-index: 10; }
        
        #workspace-container { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; align-items: center; gap: 60px; scroll-behavior: smooth; }
        
        /* The Origin Grid (Input) */
        #origin-wrapper { background: var(--card); padding: 25px; border-radius: 12px; border: 2px solid var(--gold); box-shadow: 0 15px 50px rgba(0,0,0,0.6); position: relative; }
        .grid-tag { position: absolute; top: -12px; left: 20px; background: var(--gold); color: black; padding: 2px 12px; font-size: 0.7rem; font-weight: bold; border-radius: 4px; }
        
        /* General Grid Styling */
        .grid { display: grid; gap: 1px; background: var(--border); border: 1px solid var(--border); }
        .cell { background: var(--bg); display: flex; align-items: center; justify-content: center; position: relative; }
        .cell input { width: 100%; height: 100%; border: none; background: transparent; color: var(--gold); text-align: center; font-weight: bold; outline: none; }
        .cell.conflict { background: rgba(230, 57, 70, 0.25) !important; }
        .cell.solution { color: var(--ground); font-weight: bold; }

        /* Buttons & Inputs */
        button { background: var(--ntnu-red); border: none; color: white; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { filter: brightness(1.2); }
        button.secondary { background: #21262d; border: 1px solid var(--border); }
        input[type="number"] { background: #0d1117; border: 1px solid var(--border); color: white; padding: 8px; width: 60px; border-radius: 4px; text-align: center; }
        
        .solution-instance { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .sol-tag { color: var(--ground); font-size: 0.6rem; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <aside>
        <h2 style="color: var(--ntnu-red); margin: 0; font-size: 1.5rem;">libmarilynnp</h2>
        <div class="metric"><div class="label">Manifold Scale</div><div class="val" id="n-display">---</div></div>
        <div class="metric"><div class="label">Hamiltonian Solutions</div><div class="val" id="sol-count">0</div></div>
        <div class="metric"><div class="label">Processing Latency</div><div id="timer" class="val">0.00ms</div></div>
        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
            <button onclick="inferAll()">INFER ALL SOLUTIONS</button>
            <button class="secondary" onclick="stopSearch = true">HALT ENGINE</button>
        </div>
    </aside>

    <main>
        <div class="toolbar">
            <span class="label">N:</span>
            <input type="number" id="n-val" value="9" min="4" max="16" onchange="initOrigin()">
            <button class="secondary" onclick="initOrigin()">RESET ORIGIN</button>
            <div id="status-msg" style="font-weight: bold; margin-left: auto; font-size: 0.8rem;"></div>
        </div>

        <div id="workspace-container">
            <div id="origin-wrapper">
                <div class="grid-tag">ORIGIN MANIFOLD (USER PLANTED)</div>
                <div id="origin-grid" class="grid"></div>
            </div>
            </div>
    </main>

    <script>
        let N, bR, bC, stopSearch = false, solFound = 0;
        let originData = [];

        function getFactors(n) {
            let r = Math.floor(Math.sqrt(n));
            while (n % r !== 0) r--;
            return [r, n / r];
        }

        function initOrigin() {
            N = parseInt(document.getElementById('n-val').value);
            [bR, bC] = getFactors(N);
            document.getElementById('n-display').innerText = `${N}x${N} (${bR}x${bC})`;
            
            const container = document.getElementById('origin-grid');
            const workspace = document.getElementById('workspace-container');
            
            // Clear previous solutions but keep the origin wrapper
            while (workspace.childNodes.length > 2) workspace.removeChild(workspace.lastChild);
            
            container.innerHTML = '';
            const cellSize = Math.min(45, Math.floor(550 / N));
            container.style.gridTemplateColumns = `repeat(${N}, ${cellSize}px)`;

            for(let i=0; i<N*N; i++) {
                let r = Math.floor(i / N), c = i % N;
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.style.width = cellSize + 'px';
                cell.style.height = cellSize + 'px';
                if ((Math.floor(r/bR) + Math.floor(c/bC)) % 2 == 0) cell.style.background = '#0d1117';

                const input = document.createElement('input');
                input.type = 'text';
                input.dataset.idx = i;
                input.style.fontSize = (cellSize * 0.5) + 'px';
                input.addEventListener('input', () => validateOrigin());

                cell.appendChild(input);
                container.appendChild(cell);
            }
            solFound = 0;
            document.getElementById('sol-count').innerText = "0";
            updateStatus("READY", "var(--cyan)");
        }

        function getSieve(r, c, g) {
            let mask = 0n;
            let b = Math.floor(r / bR) * bR + Math.floor(c / bC);
            for (let j = 0; j < N; j++) {
                if (g[r][j]) mask |= (1n << (g[r][j] - 1n));
                if (g[j][c]) mask |= (1n << (g[j][c] - 1n));
                let boxR = Math.floor(b / bR) * bR + Math.floor(j / bC);
                let boxC = (b % bR) * bC + (j % bC);
                if (g[boxR][boxC]) mask |= (1n << (g[boxR][boxC] - 1n));
            }
            return (~mask) & ((1n << BigInt(N)) - 1n);
        }

        function validateOrigin() {
            const inputs = document.querySelectorAll('#origin-grid input');
            let g = Array.from({length: N}, () => Array(N).fill(0n));
            inputs.forEach(input => {
                if(input.value) g[Math.floor(input.dataset.idx/N)][idx%N] = BigInt(input.value);
            });
            // Simple visual check for immediate conflicts
            inputs.forEach(input => {
                input.parentElement.classList.remove('conflict');
                let val = BigInt(input.value || 0);
                if(val > 0n) {
                    let r = Math.floor(input.dataset.idx/N), c = input.dataset.idx%N;
                    let temp = g[r][c]; g[r][c] = 0n;
                    if(!(getSieve(r, c, g) & (1n << (val - 1n)))) input.parentElement.classList.add('conflict');
                    g[r][c] = temp;
                }
            });
        }

        async function inferAll() {
            stopSearch = false;
            solFound = 0;
            const start = performance.now();
            updateStatus("MAPPING MANIFOLD...", "var(--gold)");
            
            // Read origin grid
            let g = Array.from({length: N}, () => Array(N).fill(0n));
            const inputs = document.querySelectorAll('#origin-grid input');
            inputs.forEach(input => {
                if(input.value) g[Math.floor(input.dataset.idx/N)][input.dataset.idx%N] = BigInt(input.value);
            });
            originData = g.map(row => [...row]);

            // Clear previous solution stream
            const workspace = document.getElementById('workspace-container');
            while (workspace.childNodes.length > 2) workspace.removeChild(workspace.lastChild);

            async function backtrack(idx) {
                if (stopSearch || solFound >= 100) return;
                if (idx === N * N) {
                    solFound++;
                    document.getElementById('sol-count').innerText = solFound;
                    printSolution(g);
                    return;
                }

                let r = Math.floor(idx / N), c = idx % N;
                if (g[r][c] !== 0n) return await backtrack(idx + 1);

                let mask = getSieve(r, c, g);
                for (let v = 1n; v <= BigInt(N); v++) {
                    if (mask & (1n << (v - 1n))) {
                        g[r][c] = v;
                        if (idx % 20 === 0) await new Promise(res => setTimeout(res, 0));
                        await backtrack(idx + 1);
                        g[r][c] = 0n;
                    }
                }
            }

            await backtrack(0);
            document.getElementById('timer').innerText = (performance.now() - start).toFixed(2) + "ms";
            updateStatus(solFound > 0 ? "AC: MANIFOLD MAPPED" : "IMPOSSIBLE", solFound > 0 ? "var(--ground)" : "var(--ntnu-red)");
        }

        function printSolution(sol) {
            const container = document.getElementById('workspace-container');
            const wrapper = document.createElement('div');
            wrapper.className = 'solution-instance';
            
            const tag = document.createElement('div');
            tag.className = 'sol-tag';
            tag.innerText = `GROUND STATE SOLUTION #${solFound}`;
            wrapper.appendChild(tag);

            const gridEl = document.createElement('div');
            gridEl.className = 'grid';
            const cellSize = Math.min(30, Math.floor(400 / N));
            gridEl.style.gridTemplateColumns = `repeat(${N}, ${cellSize}px)`;

            for(let r=0; r<N; r++) {
                for(let c=0; c<N; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.style.width = cellSize + 'px';
                    cell.style.height = cellSize + 'px';
                    cell.style.fontSize = (cellSize * 0.6) + 'px';
                    cell.innerText = sol[r][c];
                    // If it was part of the origin, mark it gold
                    if (originData[r][c] !== 0n) {
                        cell.style.color = "var(--gold)";
                    } else {
                        cell.style.color = "var(--ground)";
                    }
                    gridEl.appendChild(cell);
                }
            }
            wrapper.appendChild(gridEl);
            container.appendChild(wrapper);
            wrapper.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }

        function updateStatus(msg, color) {
            const el = document.getElementById('status-msg');
            el.innerText = msg; el.style.color = color;
        }

        window.onload = initOrigin;
    </script>
</body>
</html>
