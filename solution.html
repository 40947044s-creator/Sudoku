<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>libmarilynnp | Success Stream v7.8</title>
    <style>
        :root { --bg: #050505; --card: #0d0d0d; --border: #1a1a1a; --ntnu-red: #e63946; --gold: #d4af37; --cyan: #00d4ff; --ground: #00ff00; --text: #e0e0e0; --muted: #444; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        aside { width: 320px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px; gap: 20px; flex-shrink: 0; }
        .metric-card { background: #111; padding: 15px; border-radius: 4px; border: 1px solid var(--border); }
        .label { color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
        .value { color: var(--cyan); font-size: 1.1rem; margin-top: 5px; }
        main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; position: relative; overflow-y: auto; }
        .toolbar { position: sticky; top: -20px; width: 100%; padding: 15px; background: rgba(5, 5, 5, 0.95); display: flex; justify-content: center; gap: 20px; border-bottom: 1px solid var(--border); z-index: 10; margin-bottom: 20px; }
        #grid-container { display: grid; gap: 1px; background: var(--border); border: 2px solid var(--border); box-shadow: 0 0 50px rgba(0, 212, 255, 0.1); margin-bottom: 30px; }
        .cell { background: var(--bg); position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .cell input { position: absolute; width: 100%; height: 100%; background: transparent; border: none; color: var(--gold); text-align: center; font-family: inherit; font-weight: bold; font-size: 1.2rem; outline: none; z-index: 2; }
        .cell.grounded input { color: var(--ground); }
        #achievement-log { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 10px; }
        .log-entry { background: #0a0a0a; border-left: 3px solid var(--ground); padding: 12px; font-size: 0.85rem; color: #888; border: 1px solid #111; }
        button { background: var(--ntnu-red); border: none; color: white; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        button.secondary { background: #222; border: 1px solid var(--muted); }
    </style>
</head>
<body>
    <aside>
        <h2 style="color: var(--ntnu-red); margin: 0;">libmarilynnp</h2>
        <div class="metric-card"><div class="label">Total Achievements</div><div id="ac-total" class="value" style="color: var(--ground);">0</div></div>
        <div class="metric-card"><div class="label">Inference Timer</div><div id="live-timer" class="value" style="color: var(--gold);">0.000s</div></div>
        <div class="metric-card"><div class="label">Manifold Complexity</div><div id="complexity" class="value">---</div></div>
        <div style="margin-top: auto;">
            <button style="width: 100%;" onclick="startInference()">RUN MARILYN FOLD</button>
            <button class="secondary" style="width: 100%; margin-top: 10px;" onclick="resetManifold()">RESET PLANTING</button>
            <button class="secondary" style="width: 100%; margin-top: 10px;" onclick="randomVerifiedInject()">RANDOM SEED</button>
        </div>
    </aside>
    <main>
        <div class="toolbar">
            <span class="label">Scale (N):</span>
            <input type="number" id="n-val" value="9" min="4" max="25" style="width: 50px; background:#111; color:white; border:1px solid #333;">
            <button class="secondary" onclick="initGrid()">INITIALIZE</button>
            <div id="status-tag" style="color: var(--gold); font-weight: bold;">[ ENGINE IDLE ]</div>
        </div>
        <div id="grid-container"></div>
        <div id="achievement-log"><div class="label" style="text-align: center; margin-bottom: 10px;">> Success Stream</div></div>
    </main>

    <script src="marilyn_engine.js"></script>
    <script>
        let N, bR, bC, marilynEngine, acCount = 0;

        // Unified WASM Handshake
        Module.onRuntimeInitialized = () => {
            marilynEngine = { solve: Module.cwrap('solve_manifold', 'number', ['number', 'number']) };
            document.getElementById('status-tag').innerText = "[ CORE GROUNDED ]";
        };

        function initGrid() {
            N = parseInt(document.getElementById('n-val').value);
            let root = Math.floor(Math.sqrt(N)); 
            while (N % root !== 0) root--;
            [bR, bC] = [root, N / root];
            
            document.getElementById('complexity').innerText = `N^${N*N}`;
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            
            const totalSize = Math.min(window.innerWidth - 450, window.innerHeight - 300);
            const cellSize = Math.floor(totalSize / N);
            
            container.style.gridTemplateColumns = `repeat(${N}, ${cellSize}px)`;
            for (let i = 0; i < N * N; i++) {
                const r = Math.floor(i / N);
                const c = i % N;
                const cell = document.createElement('div');
                cell.className = 'cell'; 
                cell.style.width = cell.style.height = cellSize + 'px';
                
                // Checkerboard pattern for sectors
                if ((Math.floor(r / bR) + Math.floor(c / bC)) % 2 == 0) {
                    cell.style.background = '#0a0a0a';
                }
                
                const input = document.createElement('input'); 
                input.dataset.idx = i;
                cell.appendChild(input); 
                container.appendChild(cell);
            }
        }

        async function startInference() {
            if (typeof Module._malloc !== 'function') return alert("Engine initializing...");
            
            const startTime = performance.now();
            const statusTag = document.getElementById('status-tag');
            statusTag.innerText = "[ ANNIHILATING NOISE... ]";
            
            const inputs = document.querySelectorAll('.cell input');
            const initialData = new BigUint64Array(N * N);
            inputs.forEach((inp, i) => initialData[i] = BigInt(inp.value || 0));
            
            const ptr = Module._malloc(N * N * 8);
            (new BigUint64Array(Module.HEAPU8.buffer, ptr, N * N)).set(initialData);
            
            // THE MARILYN FOLD
            const status = marilynEngine.solve(N, ptr);
            const duration = ((performance.now() - startTime) / 1000).toFixed(3);
            
            if (status === 1) {
                acCount++; 
                document.getElementById('ac-total').innerText = acCount;
                document.getElementById('live-timer').innerText = duration + 's';
                statusTag.innerText = `[ AC ACHIEVED: ${duration}s ]`;
                
                const log = document.getElementById('achievement-log');
                const entry = document.createElement('div'); 
                entry.className = 'log-entry';
                entry.innerHTML = `[${new Date().toLocaleTimeString()}] <b>AC ACHIEVED</b>: N=${N} grounded in <b>${duration}s</b>.`;
                log.insertBefore(entry, log.firstChild.nextSibling);
                
                const resultData = new BigUint64Array(Module.HEAPU8.buffer, ptr, N * N);
                inputs.forEach((inp, i) => { 
                    if(!inp.value) { 
                        inp.value = Number(resultData[i]); 
                        inp.parentElement.classList.add('grounded'); 
                    }
                });
            } else { 
                statusTag.innerText = "[ RAF OVERFLOW ]"; 
            }
            Module._free(ptr);
        }

        function randomVerifiedInject() {
            if (!N) return alert("Initialize Manifold first.");
            
            let injectedCount = 0;
            const inputs = document.querySelectorAll('.cell input');
            
            const getJsSieve = (idx) => {
                let r = Math.floor(idx / N);
                let c = idx % N;
                let used = new Set();
                
                inputs.forEach((inp, i) => {
                    let ir = Math.floor(i / N);
                    let ic = i % N;
                    let val = parseInt(inp.value);
                    if (!val) return;
                    
                    if (ir === r || ic === c) used.add(val);
                    if (Math.floor(ir/bR) === Math.floor(r/bR) && Math.floor(ic/bC) === Math.floor(c/bC)) {
                        used.add(val);
                    }
                });
                
                let possible = [];
                for (let v = 1; v <= N; v++) if (!used.has(v)) possible.push(v);
                return possible;
            };

            for (let attempts = 0; attempts < N * 2 && injectedCount < N; attempts++) {
                let randIdx = Math.floor(Math.random() * (N * N));
                if (inputs[randIdx].value) continue;
                
                let validResidues = getJsSieve(randIdx);
                if (validResidues.length > 0) {
                    let pick = validResidues[Math.floor(Math.random() * validResidues.length)];
                    inputs[randIdx].value = pick;
                    inputs[randIdx].parentElement.classList.add('grounded');
                    injectedCount++;
                }
            }
            document.getElementById('status-tag').innerText = `[ SEEDED: ${injectedCount} CORNERSTONES ]`;
        }

        function resetManifold() { initGrid(); }
        window.onload = initGrid;
    </script>
</body>
</html>
