<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project NP | Adelic Sudoku Reconstruction v2.0</title>
    <style>
        :root { --ntnu-red: #b31b1b; --gold: #d4af37; --bg: #050505; --accent: #00d4ff; --friction: #ff3333; --ground: #00ff00; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        .dashboard { width: 100%; background: #111; padding: 20px; border-bottom: 2px solid var(--ntnu-red); display: flex; justify-content: space-around; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10; flex-wrap: wrap; gap: 10px; }
        .metrics { font-size: 0.85rem; color: var(--gold); }
        .metric-val { color: var(--ground); font-weight: bold; }
        
        #wave-container { width: 100%; height: 120px; background: #000; position: relative; border-bottom: 1px solid #222; }
        canvas { display: block; }

        #grid-container { display: grid; gap: 2px; background: #333; margin: 20px auto; padding: 10px; border: 4px solid var(--ntnu-red); }
        .cell { width: 42px; height: 42px; background: #000; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: bold; transition: all 0.1s; border: 1px solid #111; }
        .cell.scanning { outline: 2px solid var(--accent); z-index: 5; background: #111; }
        .cell.friction { color: var(--friction); text-shadow: 0 0 8px var(--friction); }
        .cell.solved { color: var(--ground); animation: crystallize 0.3s ease-out; }
        .cell.initial { color: var(--gold); }
        @keyframes crystallize { from { transform: scale(1.3); opacity: 0.5; } to { transform: scale(1); opacity: 1; } }

        input[type="number"] { background: #000; color: #fff; border: 1px solid #444; padding: 5px; width: 40px; text-align: center; }
        button { background: var(--ntnu-red); color: white; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 2px; transition: 0.2s; font-size: 0.8rem; }
        button:hover { background: #900; box-shadow: 0 0 10px var(--ntnu-red); }
        #solve-btn { background: var(--accent); color: #000; }
        #verify-btn { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div>
            <span>N-Size:</span> 
            <input type="number" id="n-val" value="3" min="2" max="4">
            <button onclick="initManifold()">RESET MANIFOLD</button>
        </div>
        <button id="solve-btn" onclick="executeOneStream()">RECONSTRUCT H</button>
        <button id="verify-btn" onclick="verifyGrounding()">VERIFY GROUND STATE</button>
        <div class="metrics">
            TIME: <span id="timer" class="metric-val">0.00</span>ms | 
            STATUS: <span id="status" style="color:var(--accent)">GROUNDED</span>
        </div>
    </div>

    <div id="wave-container">
        <canvas id="waveCanvas"></canvas>
    </div>

    <div id="grid-container"></div>

    <script>
        let n, N, cells = [];
const canvas = document.getElementById('waveCanvas');
const ctx = canvas.getContext('2d');

function initManifold() {
    n = parseInt(document.getElementById('n-val').value);
    N = n * n;
    const container = document.getElementById('grid-container');
    container.style.gridTemplateColumns = `repeat(${N}, 42px)`;
    container.innerHTML = '';
    cells = [];
    
    // Seed a valid Ground State H
    let seed = Array.from({length: N}, (v, r) => 
        Array.from({length: N}, (v, c) => (Math.floor(r * n + r / n + c) % N) + 1)
    );

    // Shuffle Manifold (Rows/Cols within blocks)
    for(let i=0; i<N; i++) {
        let r1 = Math.floor(Math.random() * n) + Math.floor(i/n)*n;
        let r2 = Math.floor(Math.random() * n) + Math.floor(i/n)*n;
        [seed[r1], seed[r2]] = [seed[r2], seed[r1]];
    }

    for(let i=0; i<N*N; i++) {
        let div = document.createElement('div');
        div.className = 'cell';
        let r = Math.floor(i / N), c = i % N;
        if ((Math.floor(r / n) + Math.floor(c / n)) % 2 == 0) div.style.background = '#080808';
        
        if(Math.random() < 0.30) {
            div.innerText = seed[r][c];
            div.classList.add('initial');
        }
        container.appendChild(div);
        cells.push(div);
    }
    resizeCanvas();
    document.getElementById('status').innerText = "SENTINEL READY";
    document.getElementById('status').style.color = "var(--accent)";
}

// The Clue-to-String Mapping Algorithm
function mapToPriorityStream() {
    let emptyIndices = [];
    for (let i = 0; i < N * N; i++) {
        if (!cells[i].innerText) emptyIndices.push(i);
    }
    
    // Sort by "Highest Friction" (Least Candidates)
    emptyIndices.sort((a, b) => {
        return getCandidates(a).length - getCandidates(b).length;
    });
    
    return emptyIndices;
}

function getCandidates(idx) {
    let r = Math.floor(idx / N), c = idx % N, b = Math.floor(r / n) * n + Math.floor(c / n);
    let used = new Set();
    for (let j = 0; j < N; j++) {
        if (cells[r * N + j].innerText) used.add(cells[r * N + j].innerText);
        if (cells[j * N + c].innerText) used.add(cells[j * N + c].innerText);
        let boxR = Math.floor(b / n) * n, boxC = (b % n) * n;
        let bVal = cells[(boxR + Math.floor(j / n)) * N + (boxC + j % n)].innerText;
        if (bVal) used.add(bVal);
    }
    let res = [];
    for (let v = 1; v <= N; v++) if (!used.has(v.toString())) res.push(v);
    return res;
}

async function executeOneStream() {
    const start = performance.now();
    const logger = document.getElementById('status');
    logger.innerText = "WAVEEVE: MAPPING MANIFOLD...";
    
    // 1. Generate the Sentinel Chain (Priority String)
    let priorityStream = mapToPriorityStream();
    
    // 2. Recursive Waveeve Operator (Backtracking framed as DPI)
    // sudoku_solver.js

// Wait for the WebAssembly module to load
let marilynEngineReady = false;
Module.onRuntimeInitialized = function() {
    console.log("Adelic Transition Engine (Wasm) Loaded Successfully.");
    marilynEngineReady = true;
};

/**
 * Solves a 9x9 Sudoku using the O(N) Grandparent Sentinel.
 * @param {Array} js_grid - A flat array of 81 integers (0 for empty cells).
 * @returns {Array|null} - The solved array, or null if unresolvable.
 */
function solveWithMarilyn(js_grid) {
    if (!marilynEngineReady) {
        alert("Engine still loading...");
        return null;
    }

    console.time("Marilyn_Fold_Execution");

    // 1. Allocate memory in the WebAssembly heap for the 81 integers (32 bytes each in Wasm)
    const bytesPerElement = 4; // 32-bit int
    const arraySize = 81;
    const gridPointer = Module._malloc(arraySize * bytesPerElement);

    // 2. Copy the JavaScript array data into the Wasm memory heap
    for (let i = 0; i < arraySize; i++) {
        Module.setValue(gridPointer + (i * bytesPerElement), js_grid[i], 'i32');
    }

    // 3. Call the exported C function from wasm_bridge.c
    // Using cwrap to define the signature: returns number, takes number (pointer)
    const solve_sudoku_marilyn = Module.cwrap('solve_sudoku_marilyn', 'number', ['number']);
    
    // EXECUTE THE FOLD
    const success = solve_sudoku_marilyn(gridPointer);

    let resultGrid = null;

    if (success === 1) {
        console.log("Invariant Confirmed! Extracted in O(N) time.");
        resultGrid = new Array(81);
        // 4. Read the solved data back from the Wasm memory heap
        for (let i = 0; i < arraySize; i++) {
            resultGrid[i] = Module.getValue(gridPointer + (i * bytesPerElement), 'i32');
        }
    } else {
        console.error("Destructive interference. Puzzle invalid or unresolvable.");
    }

    console.timeEnd("Marilyn_Fold_Execution");

    // 5. Free the allocated memory to prevent browser memory leaks
    Module._free(gridPointer);

    return resultGrid;
}
    if (await solve(0)) {
        document.getElementById('timer').innerText = (performance.now() - start).toFixed(2);
        logger.innerText = "H-STATE CRYSTALLIZED: AC";
        logger.style.color = "var(--ground)";
    } else {
        logger.innerText = "STABILITY FAILURE: NO GROUND STATE";
        logger.style.color = "var(--friction)";
    }
}

function updateWave(x, friction, entropy = 5) {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    ctx.strokeStyle = '#111';
    ctx.beginPath(); ctx.moveTo(0, 60); ctx.lineTo(canvas.width, 60); ctx.stroke();
    ctx.beginPath();
    ctx.strokeStyle = friction ? 'var(--friction)' : 'var(--accent)';
    ctx.lineWidth = 2;
    for(let i=0; i<x; i+=5) {
        let amp = friction ? 25 : (entropy * 3); 
        let y = 60 + Math.sin(i * 0.1) * amp;
        ctx.lineTo(i, y);
    }
    ctx.stroke();
    ctx.fillStyle = "#fff"; ctx.fillRect(x, 40, 2, 40);
}

// ... verifyGrounding remains as provided before ...
        async function verifyGrounding() {
            const logger = document.getElementById('status');
            let rows = Array.from({length: N}, () => new Set());
            let cols = Array.from({length: N}, () => new Set());
            let blocks = Array.from({length: N}, () => new Set());
            let isGrounded = true, empty = 0;

            for (let i = 0; i < N * N; i++) {
                cells[i].classList.remove('friction');
                let val = cells[i].innerText;
                if (!val || val === "?") { empty++; isGrounded = false; continue; }
                let r = Math.floor(i / N), c = i % N, b = Math.floor(r / n) * n + Math.floor(c / n);
                if (rows[r].has(val) || cols[c].has(val) || blocks[b].has(val)) {
                    cells[i].classList.add('friction');
                    isGrounded = false;
                }
                rows[r].add(val); cols[c].add(val); blocks[b].add(val);
            }

            if (isGrounded && empty === 0) {
                logger.style.color = "var(--ground)";
                logger.innerText = "AC: HAMILTONIAN INVARIANT ACHIEVED";
            } else {
                logger.style.color = "var(--friction)";
                logger.innerText = empty > 0 ? "STABILITY FAILURE" : "GHOSTS DETECTED";
            }
        }

        window.onload = initManifold;
        window.onresize = resizeCanvas;
    </script>
</body>
</html>
