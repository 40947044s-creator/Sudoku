<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Scalable Adelic Transition Engine</title>
    <style>
        :root { --ntnu-red: #b31b1b; --gold: #d4af37; --bg: #050505; --accent: #00d4ff; --friction: #ff3333; --ground: #00ff00; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        .dashboard { width: 100%; background: #111; padding: 15px; border-bottom: 2px solid var(--ntnu-red); display: flex; justify-content: space-around; align-items: center; flex-wrap: wrap; gap: 10px; }
        .metrics { font-size: 0.8rem; color: var(--gold); display: flex; gap: 15px; }
        .metric-val { color: var(--ground); font-weight: bold; }
        
        #wave-container { width: 100%; height: 80px; background: #000; position: relative; border-bottom: 1px solid #222; }
        canvas { display: block; }

        #grid-container { display: grid; gap: 1px; background: #333; margin: 20px auto; padding: 5px; border: 2px solid var(--ntnu-red); }
        .cell { background: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #111; }
        .cell.initial { color: var(--gold); background: #0a0a0a; }
        .cell.solved { color: var(--ground); transition: color 0.2s; }
        .cell.friction { color: var(--friction); text-shadow: 0 0 5px var(--friction); }
        
        button { background: var(--ntnu-red); color: white; border: none; padding: 8px 12px; cursor: pointer; font-weight: bold; font-size: 0.7rem; }
        #solve-btn { background: var(--accent); color: #000; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div>
            <span>N:</span> 
            <input type="number" id="n-size" value="10" min="4" max="25" onchange="initManifold()" style="background:#000; color:#fff; width:45px;">
            <button onclick="initManifold()">RESET</button>
        </div>
        <button id="solve-btn" onclick="executeOneStream()">RECONSTRUCT H</button>
        <div class="metrics">
            <div>TIME: <span id="timer" class="metric-val">0.00</span>ms</div>
            <div>STATUS: <span id="status" style="color:var(--accent)">READY</span></div>
        </div>
    </div>

    <div id="wave-container"><canvas id="waveCanvas"></canvas></div>
    <div id="grid-container"></div>

    <script>
        let N, bR, bC, cells = [], grid = [];
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');

        function findBlockFactors(n) {
            // Lemma: Blocks should be as "square" as possible
            let r = Math.floor(Math.sqrt(n));
            while (n % r !== 0) r--;
            return [r, n / r]; // returns [rows, cols]
        }

        function initManifold() {
            N = parseInt(document.getElementById('n-size').value);
            [bR, bC] = findBlockFactors(N);
            
            const container = document.getElementById('grid-container');
            // Responsive cell sizing
            let cellSize = Math.min(40, Math.floor(600 / N));
            container.style.gridTemplateColumns = `repeat(${N}, ${cellSize}px)`;
            container.innerHTML = '';
            
            grid = Array.from({length: N}, () => Array(N).fill(0));
            cells = [];

            for(let i=0; i<N*N; i++) {
                let r = Math.floor(i / N), c = i % N;
                let div = document.createElement('div');
                div.className = 'cell';
                div.style.width = cellSize + 'px';
                div.style.height = cellSize + 'px';
                div.style.fontSize = (cellSize * 0.5) + 'px';
                
                // Checkerboard blocks
                if ((Math.floor(r / bR) + Math.floor(c / bC)) % 2 == 0) div.style.background = '#080808';
                
                // Grounding ~25% of the bitstream
                if(Math.random() < 0.25) {
                    let val = (Math.floor(r * bC + r / bR + c) % N) + 1;
                    div.innerText = val;
                    div.classList.add('initial');
                    grid[r][c] = val;
                }
                container.appendChild(div);
                cells.push(div);
            }
            resizeCanvas();
        }

        function getHamiltonianMask(idx) {
            const r = Math.floor(idx / N), c = idx % N;
            const b = Math.floor(r / bR) * bR + Math.floor(c / bC);
            let mask = 0;
            for (let j = 0; j < N; j++) {
                if (grid[r][j]) mask |= (1n << BigInt(grid[r][j] - 1));
                if (grid[j][c]) mask |= (1n << BigInt(grid[j][c] - 1));
                
                const boxR = Math.floor(b / bR) * bR + Math.floor(j / bC);
                const boxC = (b % bR) * bC + (j % bC);
                if (grid[boxR][boxC]) mask |= (1n << BigInt(grid[boxR][boxC] - 1));
            }
            return (~mask) & ((1n << BigInt(N)) - 1n);
        }

        async function executeOneStream() {
            const start = performance.now();
            const empty = [];
            for(let i=0; i<N*N; i++) if(!grid[Math.floor(i/N)][i%N]) empty.push(i);

            // Entropy Mapping: Highest Friction First
            empty.sort((a, b) => {
                const countBits = (m) => m.toString(2).split('1').length - 1;
                return countBits(getHamiltonianMask(a)) - countBits(getHamiltonianMask(b));
            });

            async function solve(idx) {
                if (idx === empty.length) return true;
                const cellIdx = empty[idx];
                const r = Math.floor(cellIdx / N), c = cellIdx % N;
                let mask = getHamiltonianMask(cellIdx);

                for (let v = 1; v <= N; v++) {
                    if (mask & (1n << BigInt(v - 1))) {
                        grid[r][c] = v;
                        cells[cellIdx].innerText = v;
                        cells[cellIdx].classList.add('solved');
                        
                        if (await solve(idx + 1)) return true;

                        grid[r][c] = 0;
                        cells[cellIdx].innerText = "";
                        cells[cellIdx].classList.remove('solved');
                    }
                }
                return false;
            }

            const status = document.getElementById('status');
            status.innerText = "COLLAPSING...";
            if (await solve(0)) {
                status.innerText = "AC: H ACHIEVED";
                status.style.color = "var(--ground)";
            } else {
                status.innerText = "RAF ERROR";
                status.style.color = "var(--friction)";
            }
            document.getElementById('timer').innerText = (performance.now() - start).toFixed(2);
        }

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = 80; }
        window.onload = initManifold;
    </script>
</body>
</html>
