<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>libmarilynnp | Adelic Console</title>
    <style>
        :root { 
            --bg: #0a0b0d; --card: #14161a; --border: #2d333b;
            --ntnu-red: #e63946; --gold: #ffb703; --cyan: #219ebc;
            --ground: #06d6a0; --text: #e1e4e8; --muted: #8b949e;
        }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, monospace; 
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* Sidebar for Adelic Metrics */
        aside { 
            width: 300px; background: var(--card); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 20px; gap: 20px;
        }

        .metric-card { background: #1c1f24; padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .label { color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
        .value { color: var(--gold); font-family: 'Courier New', monospace; font-size: 1.2rem; margin-top: 5px; }

        /* Main Workspace */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        .toolbar { 
            position: absolute; top: 0; width: 100%; padding: 15px; 
            background: rgba(20, 22, 26, 0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: center; gap: 20px; border-bottom: 1px solid var(--border);
        }

        /* The Manifold Grid */
        #grid-container { 
            display: grid; gap: 4px; padding: 10px; background: var(--border); 
            border-radius: 4px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .cell { 
            background: var(--bg); display: flex; align-items: center; justify-content: center;
            border-radius: 2px; font-weight: 600; transition: all 0.2s; position: relative;
        }
        
        .cell.initial { color: var(--gold); background: #161b22; }
        .cell.solved { color: var(--ground); font-size: 1.4rem; }
        
        /* Phase Cloud: Hidden by default, toggled via JS */
        .cloud { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(8px, 1fr));
            width: 90%; height: 90%; gap: 1px; opacity: 0.6;
        }
        .cloud span { font-size: 9px; color: var(--cyan); text-align: center; }

        /* Controls */
        input, select, button { 
            background: #21262d; border: 1px solid var(--border); color: white;
            padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer;
        }
        button:hover { background: #30363d; border-color: var(--muted); }
        .btn-primary { background: var(--ntnu-red); border: none; }
        .btn-primary:hover { background: #ff4d5a; }

        #status-indicator { font-size: 0.8rem; padding: 5px 10px; border-radius: 20px; background: #23863622; color: #238636; border: 1px solid #238636; }
    </style>
</head>
<body>

    <aside>
        <h2 style="color: var(--ntnu-red); margin: 0; font-size: 1.2rem;">libmarilynnp <span style="font-size: 0.6rem; color: var(--muted);">v7.0</span></h2>
        
        <div class="metric-card">
            <div class="label">Ground State Energy (H)</div>
            <div id="h-energy" class="value">Pending</div>
        </div>

        <div class="metric-card">
            <div class="label">Solutions Inferred</div>
            <div id="sol-count" class="value">0</div>
        </div>

        <div class="metric-card">
            <div class="label">Compute Time</div>
            <div id="timer" class="value">0.00ms</div>
        </div>

        <div style="margin-top: auto;">
            <div class="label" style="margin-bottom: 5px;">View Mode</div>
            <button style="width: 100%;" onclick="toggleCloud()">Toggle Phase Clouds</button>
        </div>
    </aside>

    <main>
        <div class="toolbar">
            <div>
                <span class="label">Manifold Size:</span>
                <input type="number" id="n-val" value="10" min="4" max="16" onchange="initManifold()">
            </div>
            <button class="btn-primary" onclick="inferManifold()">INFER TARGET</button>
            <button onclick="initManifold()">RESET</button>
            <div id="status-indicator">SENTINEL IDLE</div>
        </div>

        <div id="grid-container"></div>
    </main>

    <script>
        let N, bR, bC, grid = [], masterMask = [], solutions = [], showClouds = false;

        function getFactors(n) {
            let r = Math.floor(Math.sqrt(n));
            while (n % r !== 0) r--;
            return [r, n / r];
        }

        function initManifold() {
            N = parseInt(document.getElementById('n-val').value);
            [bR, bC] = getFactors(N);
            const container = document.getElementById('grid-container');
            
            // Auto-scaling the grid to fit the viewport
            let cellSize = Math.min(50, Math.floor((window.innerHeight - 150) / N));
            container.style.gridTemplateColumns = `repeat(${N}, ${cellSize}px)`;
            container.innerHTML = '';
            
            grid = Array.from({length: N}, () => Array(N).fill(0n));
            masterMask = Array(N * N).fill(0n);
            solutions = [];

            for(let i=0; i<N*N; i++) {
                let r = Math.floor(i / N), c = i % N;
                let div = document.createElement('div');
                div.className = 'cell';
                div.style.width = cellSize + 'px'; div.style.height = cellSize + 'px';
                
                // Visual block grouping
                if ((Math.floor(r / bR) + Math.floor(c / bC)) % 2 == 0) div.style.background = '#0d1117';
                
                if(Math.random() < 0.3) {
                    let val = (Math.floor(r * bC + r / bR + c) % N) + 1;
                    div.innerText = val; div.classList.add('initial');
                    grid[r][c] = BigInt(val);
                }
                container.appendChild(div);
            }
            updateStatus("READY", "var(--cyan)");
        }

        function getSieve(r, c, currentGrid) {
            let mask = 0n;
            let b = Math.floor(r / bR) * bR + Math.floor(c / bC);
            for (let j = 0; j < N; j++) {
                if (currentGrid[r][j]) mask |= (1n << (currentGrid[r][j] - 1n));
                if (currentGrid[j][c]) mask |= (1n << (currentGrid[j][c] - 1n));
                let boxR = Math.floor(b / bR) * bR + Math.floor(j / bC);
                let boxC = (b % bR) * bC + (j % bC);
                if (currentGrid[boxR][boxC]) mask |= (1n << (currentGrid[boxR][boxC] - 1n));
            }
            return (~mask) & ((1n << BigInt(N)) - 1n);
        }

        async function inferManifold() {
            const start = performance.now();
            updateStatus("FOLDING...", var(--ntnu-red));
            solutions = [];
            masterMask = Array(N * N).fill(0n);
            await solveRecursive(0);
            
            document.getElementById('timer').innerText = (performance.now() - start).toFixed(2) + "ms";
            document.getElementById('sol-count').innerText = solutions.length;
            document.getElementById('h-energy').innerText = (solutions.length > 0) ? "0 (GROUNDED)" : "RAF ERROR";
            
            renderManifold();
            updateStatus("AC ACHIEVED", "var(--ground)");
        }

        async function solveRecursive(cellIdx) {
            if (solutions.length >= 200) return;
            if (cellIdx === N * N) {
                let currentSol = grid.flat();
                solutions.push(currentSol);
                currentSol.forEach((val, i) => masterMask[i] |= (1n << (val - 1n)));
                return;
            }
            let r = Math.floor(cellIdx / N), c = cellIdx % N;
            if (grid[r][c] !== 0n) return solveRecursive(cellIdx + 1);

            let mask = getSieve(r, c, grid);
            for (let v = 1n; v <= BigInt(N); v++) {
                if (mask & (1n << (v - 1n))) {
                    grid[r][c] = v;
                    await solveRecursive(cellIdx + 1);
                    grid[r][c] = 0n;
                }
            }
        }

        function renderManifold() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, i) => {
                if (cell.classList.contains('initial')) return;
                let mask = masterMask[i];
                let bits = [];
                for(let v=1; v<=N; v++) if(mask & (1n << BigInt(v-1))) bits.push(v);

                if (bits.length === 1) {
                    cell.innerHTML = bits[0];
                    cell.classList.add('solved');
                } else if (bits.length > 1) {
                    if (showClouds) {
                        cell.innerHTML = `<div class="cloud">${bits.map(b => `<span>${b}</span>`).join('')}</div>`;
                    } else {
                        cell.innerHTML = `<span style="color: var(--cyan)">●</span>`;
                    }
                }
            });
        }

        function toggleCloud() {
            showClouds = !showClouds;
            renderManifold();
        }

        function updateStatus(msg, color) {
            const s = document.getElementById('status-indicator');
            s.innerText = msg;
            s.style.color = color;
            s.style.borderColor = color;
        }

        window.onload = initManifold;
    </script>
</body>
</html>
