<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>libmarilynnp | Adelic Console v7.6</title>
    <style>
        :root { 
            --bg: #050505; --card: #0d0d0d; --border: #1a1a1a;
            --ntnu-red: #e63946; --gold: #d4af37; --cyan: #00d4ff;
            --ground: #00ff00; --text: #e0e0e0; --muted: #444;
        }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; 
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* Sidebar: Adelic Metrics */
        aside { 
            width: 320px; background: var(--card); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 25px; gap: 20px; flex-shrink: 0;
        }
        .metric-card { background: #111; padding: 15px; border-radius: 4px; border: 1px solid var(--border); }
        .label { color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
        .value { color: var(--cyan); font-size: 1.1rem; margin-top: 5px; }

        /* Main Workspace */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        .toolbar { 
            position: absolute; top: 0; width: 100%; padding: 15px; background: rgba(10, 10, 10, 0.9);
            display: flex; justify-content: center; gap: 20px; border-bottom: 1px solid var(--border); z-index: 10;
        }

        /* The Manifold Grid */
        #grid-container { 
            display: grid; gap: 1px; background: var(--border); border: 2px solid var(--border);
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.1); transition: transform 0.3s ease;
        }

        .cell { 
            background: var(--bg); position: relative; display: flex; 
            align-items: center; justify-content: center; overflow: hidden;
        }
        
        /* The "Phase Cloud" Styling */
        .cloud {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(8px, 1fr));
            width: 100%; height: 100%; padding: 2px; opacity: 0.4; pointer-events: none;
        }
        .cloud span { font-size: 8px; color: var(--cyan); text-align: center; line-height: 1; }

        .cell input {
            position: absolute; width: 100%; height: 100%; background: transparent;
            border: none; color: var(--gold); text-align: center; font-family: inherit;
            font-weight: bold; font-size: 1.2rem; outline: none; z-index: 2;
        }
        .cell.grounded input { color: var(--ground); }

        button { 
            background: var(--ntnu-red); border: none; color: white; padding: 10px 20px; 
            font-weight: bold; cursor: pointer; border-radius: 4px;
        }
        button.secondary { background: #222; border: 1px solid var(--muted); }
    </style>
</head>
<body>

    <aside>
        <h2 style="color: var(--ntnu-red); margin: 0;">libmarilynnp</h2>
        <div class="metric-card">
            <div class="label">Residue Friction (RAF)</div>
            <div id="raf-val" class="value">0.000</div>
        </div>
        <div class="metric-card">
            <div class="label">Inference Target</div>
            <div id="target-status" class="value">WAITING...</div>
        </div>
        <div class="metric-card">
            <div class="label">Manifold Complexity</div>
            <div id="complexity" class="value">---</div>
        </div>
        <div style="margin-top: auto;">
            <button style="width: 100%;" onclick="startInference()">RUN MARILYN FOLD</button>
            <button class="secondary" style="width: 100%; margin-top: 10px;" onclick="resetManifold()">RESET PLANTING</button>
        </div>
    </aside>

    <main>
        <div class="toolbar">
            <span class="label">Scale (N):</span>
            <input type="number" id="n-val" value="9" min="4" max="25" style="width: 50px; background:#111; color:white; border:1px solid #333;">
            <button class="secondary" onclick="initGrid()">INITIALIZE MANIFOLD</button>
            <div id="status-tag" style="color: var(--gold); font-weight: bold;">[ ENGINE IDLE ]</div>
        </div>

        <div id="grid-container"></div>
    </main>

    <script src="marilyn_engine.js"></script>

    <script>
        let N, bR, bC, marilynEngine;

        // Initialize WASM
        Module.onRuntimeInitialized = () => {
            marilynEngine = {
                // Link to the solve_manifold entry point in Adelic.c
                solve: Module.cwrap('solve_manifold', 'number', ['number', 'number'])
            };
            document.getElementById('status-tag').innerText = "[ ADELIC CORE GROUNDED ]";
        };

        function getFactors(n) {
            let r = Math.floor(Math.sqrt(n));
            while (n % r !== 0) r--;
            return [r, n / r];
        }

        function initGrid() {
            N = parseInt(document.getElementById('n-val').value);
            [bR, bC] = getFactors(N);
            document.getElementById('complexity').innerText = `N^${N*N}`;
            document.getElementById('raf-val').innerText = "0.000";
            document.getElementById('target-status').innerText = "WAITING...";
            
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            
            const totalSize = Math.min(window.innerWidth - 400, window.innerHeight - 150);
            const cellSize = Math.floor(totalSize / N);
            
            container.style.gridTemplateColumns = `repeat(${N}, ${cellSize}px)`;

            for (let i = 0; i < N * N; i++) {
                let r = Math.floor(i / N), c = i % N;
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.style.width = cellSize + 'px';
                cell.style.height = cellSize + 'px';
                if ((Math.floor(r/bR) + Math.floor(c/bC)) % 2 == 0) cell.style.background = '#0a0a0a';

                const input = document.createElement('input');
                input.dataset.idx = i;
                
                // POPULATING THE WAVE (Superposition Cloud)
                const cloud = document.createElement('div');
                cloud.className = 'cloud';
                cloud.id = `cloud-${i}`;
                
                // Each cell starts in a state of all possible residues
                for (let v = 1; v <= N; v++) {
                    const span = document.createElement('span');
                    span.innerText = v;
                    cloud.appendChild(span);
                }

                cell.appendChild(cloud);
                cell.appendChild(input);
                container.appendChild(cell);
            }
        }

        async function startInference() {
            if (!marilynEngine) return alert("WASM Engine loading...");
            
            document.getElementById('status-tag').innerText = "[ ANNIHILATING NOISE... ]";
            document.getElementById('target-status').innerText = "FOLDING...";
            
            const inputs = document.querySelectorAll('.cell input');
            const initialData = new BigUint64Array(N * N);
            inputs.forEach((inp, i) => initialData[i] = BigInt(inp.value || 0));

            // WASM Memory Allocation
            const ptr = Module._malloc(N * N * 8);
            let heapData = new BigUint64Array(Module.HEAPU8.buffer, ptr, N * N);
            heapData.set(initialData);

            const start = performance.now();
            
            // THE MARILYN FOLD: Adelic Transition at Hardware Speed
            const status = marilynEngine.solve(N, ptr); 
            
            const end = performance.now();
            const latency = (end - start).toFixed(2);

            if (status === 1) {
                document.getElementById('raf-val').innerText = "0.000";
                document.getElementById('target-status').innerText = "H=0 (STABLE)";
                document.getElementById('status-tag').innerText = `[ AC ACHIEVED: ${latency}ms ]`;
                
                // CRYSTALLIZATION: The Wave collapses into a Solid Sentinel
                for (let i = 0; i < N * N; i++) {
                    const val = Number(heapData[i]);
                    const input = inputs[i];
                    if (!input.value) {
                        input.value = val;
                        input.parentElement.classList.add('grounded');
                    }
                    // Annihilate the cloud
                    document.getElementById(`cloud-${i}`).style.display = 'none';
                }
            } else {
                document.getElementById('raf-val').innerText = "OVERFLOW";
                document.getElementById('target-status').innerText = "RAF ERROR";
                document.getElementById('status-tag').innerText = "[ IMPOSSIBLE MANIFOLD ]";
            }

            Module._free(ptr);
        }

        function resetManifold() {
            initGrid();
            document.getElementById('status-tag').innerText = "[ ENGINE IDLE ]";
        }

        window.onload = initGrid;
    </script>
</body>
</html>
