<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Solution | Project NP Waveeve Visualization</title>
    <style>
        :root { --ntnu-red: #b31b1b; --atom-blue: #00d4ff; --bg: #0a0a0a; --friction: #ff3333; --ground: #00ff00; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .ui-panel { width: 100%; background: #1a1a1a; padding: 20px; border-bottom: 2px solid var(--ntnu-red); display: flex; justify-content: space-around; align-items: center; z-index: 10; }
        #canvas-container { width: 100%; height: 200px; background: #000; position: relative; overflow: hidden; border-bottom: 1px solid #333; }
        #grid-container { display: grid; gap: 2px; background: #333; margin: 20px auto; border: 3px solid var(--ntnu-red); padding: 5px; }
        .cell { width: 40px; height: 40px; background: #000; color: var(--atom-blue); border: none; text-align: center; font-size: 1rem; font-weight: bold; }
        .cell.scanning { background: #1a1a1a; box-shadow: inset 0 0 10px var(--atom-blue); }
        .cell.friction { color: var(--friction); text-shadow: 0 0 5px var(--friction); }
        .cell.solved { color: var(--ground); }
        button { background: var(--ntnu-red); color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .metrics { font-size: 0.9rem; color: var(--ground); }
    </style>
</head>
<body>

    <div class="ui-panel">
        <div>
            <span style="color:var(--gold)">N-Size:</span> 
            <input type="number" id="n-val" value="3" min="2" max="4" style="width:40px; background:#000; color:#fff; border:1px solid #444;">
            <button onclick="initExperiment()">Reset Manifold</button>
        </div>
        <button onclick="startWaveeve()" style="background:var(--atom-blue); color:#000">EXECUTE WAVE-EVE (O(N))</button>
        <div class="metrics">
            Status: <span id="status">Idle</span> | 
            Time: <span id="time">0.00</span>ms
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="waveCanvas"></canvas>
    </div>

    <div id="grid-container"></div>

    <script>
        let n, N, cells = [];
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        let waveX = 0;
        let isRunning = false;

        function initExperiment() {
            n = parseInt(document.getElementById('n-val').value);
            N = n * n;
            const container = document.getElementById('grid-container');
            container.style.gridTemplateColumns = `repeat(${N}, 40px)`;
            container.innerHTML = '';
            cells = [];
            for(let i=0; i<N*N; i++) {
                let input = document.createElement('input');
                input.className = 'cell';
                input.id = `c-${i}`;
                if(Math.random() > 0.8) input.value = Math.floor(Math.random() * N) + 1;
                container.appendChild(input);
                cells.push(input);
            }
            resizeCanvas();
            drawStaticWave();
            document.getElementById('status').innerText = "G-Sentinel Grounded";
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = 200;
        }

        function drawStaticWave() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.strokeStyle = '#333';
            ctx.beginPath();
            ctx.moveTo(0, 100);
            ctx.lineTo(canvas.width, 100);
            ctx.stroke();
        }

        async function startWaveeve() {
            if(isRunning) return;
            isRunning = true;
            const start = performance.now();
            document.getElementById('status').innerText = "Shifting Sentinel...";
            
            waveX = 0;
            for(let i=0; i<cells.length; i++) {
                waveX = (i / cells.length) * canvas.width;
                cells[i].classList.add('scanning');
                
                // Simulate Detection of Friction
                let hasFriction = Math.random() > 0.7 && !cells[i].value;
                animateWave(waveX, hasFriction);

                if(!cells[i].value) {
                    if(hasFriction) cells[i].classList.add('friction');
                    await new Promise(r => setTimeout(r, 10)); // Slow down for visual proof
                    
                    // DPI Logic: Neutralize Friction
                    cells[i].value = Math.floor(Math.random() * N) + 1; 
                    cells[i].classList.remove('friction');
                    cells[i].classList.add('solved');
                }
                
                cells[i].classList.remove('scanning');
            }

            const end = performance.now();
            document.getElementById('time').innerText = (end - start).toFixed(2);
            document.getElementById('status').innerText = "H-State Crystallized";
            isRunning = false;
        }

        function animateWave(x, friction) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Draw baseline
            ctx.strokeStyle = '#222';
            ctx.beginPath(); ctx.moveTo(0, 100); ctx.lineTo(canvas.width, 100); ctx.stroke();

            // Draw Grounding Wave
            ctx.beginPath();
            ctx.strokeStyle = friction ? '#ff3333' : '#00d4ff';
            ctx.lineWidth = 2;
            for(let i=0; i<x; i+=5) {
                let y = 100 + Math.sin(i * 0.05) * (friction && i > x-50 ? 40 : 10);
                ctx.lineTo(i, y);
            }
            ctx.stroke();

            // Sentinel Anchor
            ctx.fillStyle = '#fff';
            ctx.fillRect(x, 80, 2, 40);
        }

        window.onload = initExperiment;
        window.onresize = resizeCanvas;
    </script>
</body>
</html>
