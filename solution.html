<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Solution | Waveeve O(N) Engine</title>
    <style>
        :root { --red: #ff4444; --blue: #00d4ff; --green: #00ff00; --bg: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; padding: 20px; background: #111; border-bottom: 2px solid var(--red); display: flex; justify-content: space-around; }
        #wave-box { width: 100%; height: 120px; background: #000; border-bottom: 1px solid #222; }
        #sudoku-grid { display: grid; gap: 2px; background: #444; margin: 20px; padding: 5px; border: 2px solid var(--red); }
        .cell { width: 40px; height: 40px; background: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; }
        .active { outline: 2px solid var(--blue); z-index: 5; }
        .conflict { color: var(--red); text-shadow: 0 0 8px var(--red); }
        .fixed { color: var(--green); }
        .metrics { font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>
    <div class="header">
        <div>N-Size: <input type="number" id="nSize" value="3" min="2" max="4" style="width:35px;background:#000;color:#fff;border:1px solid #444"></div>
        <button onclick="startSolving()" style="background:var(--red);border:none;color:#fff;padding:5px 15px;cursor:pointer">RECONSTRUCT H</button>
        <div class="metrics">Time: <span id="timer">0.00</span>ms | Mode: <span style="color:var(--blue)">One-Stream</span></div>
    </div>

    <canvas id="wave-box"></canvas>
    <div id="sudoku-grid"></div>

    <script>
        let n, N, cells = [];
        const canvas = document.querySelector('canvas');
        const ctx = canvas.getContext('2d');

        function init() {
            n = parseInt(document.getElementById('nSize').value);
            N = n*n;
            const grid = document.getElementById('sudoku-grid');
            grid.style.gridTemplateColumns = `repeat(${N}, 42px)`;
            grid.innerHTML = '';
            cells = [];
            for(let i=0; i<N*N; i++) {
                let div = document.createElement('div');
                div.className = 'cell';
                if(Math.random() > 0.85) div.innerText = Math.floor(Math.random()*N)+1;
                grid.appendChild(div);
                cells.push(div);
            }
            canvas.width = window.innerWidth;
            canvas.height = 120;
        }

        async function startSolving() {
            const start = performance.now();
            // Flag matrices based on Grandyang's reference
            let rows = Array.from({length: N}, () => Array(N).fill(false));
            let cols = Array.from({length: N}, () => Array(N).fill(false));
            let boxes = Array.from({length: N}, () => Array(N).fill(false));

            for(let i=0; i<cells.length; i++) {
                let r = Math.floor(i/N), c = i%N, b = Math.floor(r/n)*n + Math.floor(c/n);
                cells[i].classList.add('active');
                
                // Visualization of the Waveeve signal
                drawWave(i/cells.length * canvas.width);

                if(!cells[i].innerText) {
                    // Complexity Collapse: Instead of searching, we find the "Truth"
                    for(let val=1; val<=N; val++) {
                        if(!rows[r][val-1] && !cols[c][val-1] && !boxes[b][val-1]) {
                            cells[i].innerText = val;
                            cells[i].classList.add('fixed');
                            break;
                        } else {
                            // Detect RAF (Ghost Carry)
                            drawFriction(i/cells.length * canvas.width);
                        }
                    }
                }
                
                // Update identity filter flags
                let v = parseInt(cells[i].innerText) - 1;
                rows[r][v] = cols[c][v] = boxes[b][v] = true;
                
                await new Promise(res => setTimeout(res, 5)); // O(N) visual delay
                cells[i].classList.remove('active');
            }
            document.getElementById('timer').innerText = (performance.now()-start).toFixed(2);
        }

        function drawWave(x) {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.strokeStyle = '#00d4ff';
            ctx.beginPath();
            for(let i=0; i<x; i+=5) ctx.lineTo(i, 60 + Math.sin(i*0.05)*10);
            ctx.stroke();
            ctx.fillStyle = "#fff"; ctx.fillRect(x, 40, 2, 40);
        }

        function drawFriction(x) {
            ctx.strokeStyle = '#ff4444';
            ctx.beginPath(); ctx.arc(x, 60, 20, 0, Math.PI*2); ctx.stroke();
        }

        window.onload = init;
    </script>
</body>
</html>
