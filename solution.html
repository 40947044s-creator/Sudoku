<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project NP | Adelic Sudoku Reconstruction v2.1</title>
    <style>
        :root { --ntnu-red: #b31b1b; --gold: #d4af37; --bg: #050505; --accent: #00d4ff; --friction: #ff3333; --ground: #00ff00; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        .dashboard { width: 100%; background: #111; padding: 20px; border-bottom: 2px solid var(--ntnu-red); display: flex; justify-content: space-around; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10; flex-wrap: wrap; gap: 10px; }
        .metrics { font-size: 0.85rem; color: var(--gold); }
        .metric-val { color: var(--ground); font-weight: bold; }
        
        #wave-container { width: 100%; height: 100px; background: #000; position: relative; border-bottom: 1px solid #222; }
        canvas { display: block; width: 100%; height: 100%; }

        #num-toolbar { display: flex; gap: 5px; margin: 10px auto; flex-wrap: wrap; justify-content: center; max-width: 95vw; }
        .num-btn { background: #222; border: 1px solid #444; color: #fff; padding: 8px 12px; cursor: pointer; font-weight: bold; border-radius: 3px; transition: 0.2s; font-size: 0.8rem; }
        .num-btn:hover, .num-btn.active-num { background: var(--accent); color: #000; box-shadow: 0 0 10px var(--accent); }

        #grid-wrapper { max-width: 95vw; max-height: 60vh; overflow: auto; margin: 10px auto; border: 4px solid var(--ntnu-red); background: #333; }
        #grid-container { display: grid; gap: 2px; padding: 10px; background: #222; }
        
        .cell { width: 34px; height: 34px; background: #000; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: bold; transition: all 0.1s; cursor: default; }
        .cell.highlight-target { background-color: var(--accent) !important; color: #000 !important; transform: scale(1.05); z-index: 5; }
        .cell.friction { color: var(--friction); text-shadow: 0 0 8px var(--friction); }
        .cell.solved { color: var(--ground); animation: crystallize 0.4s ease-out; }
        .cell.initial { color: var(--gold); }
        
        @keyframes crystallize { from { transform: scale(1.4); opacity: 0.4; } to { transform: scale(1); opacity: 1; } }

        input[type="number"] { background: #000; color: #fff; border: 1px solid #444; padding: 5px; width: 45px; text-align: center; }
        button { background: var(--ntnu-red); color: white; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 2px; transition: 0.2s; }
        button:hover { background: #900; box-shadow: 0 0 10px var(--ntnu-red); }
        #solve-btn { background: var(--accent); color: #000; }
        #verify-btn { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div>
            <span>N-Size:</span> 
            <input type="number" id="n-val" value="3" min="2" max="10">
            <button onclick="initManifold()">RESET</button>
        </div>
        <button id="solve-btn" onclick="executeWasmFold()">RECONSTRUCT H</button>
        <button id="verify-btn" onclick="verifyGrounding()">VERIFY STATE</button>
        <div class="metrics">
            LATENCY: <span id="timer" class="metric-val">0.00</span>ms | 
            STATUS: <span id="status" style="color:var(--accent)">INITIATING...</span>
        </div>
    </div>

    <div id="wave-container">
        <canvas id="waveCanvas"></canvas>
    </div>

    <div id="num-toolbar"></div>

    <div id="grid-wrapper">
        <div id="grid-container"></div>
    </div>

    <script src="marilyn_engine.js"></script>

    <script>
        let n = 3, N = 9, cells = [], activeHighlight = null;
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        let marilynEngineReady = false;

        Module.onRuntimeInitialized = function() {
            marilynEngineReady = true;
            document.getElementById('status').innerText = "ENGINE READY";
            console.log("Adelic Hamiltonian Engine Online.");
        };

        function initManifold() {
            n = parseInt(document.getElementById('n-val').value);
            N = n * n;
            const container = document.getElementById('grid-container');
            container.style.gridTemplateColumns = `repeat(${N}, 34px)`;
            container.innerHTML = '';
            cells = [];
            
            // Generate valid base pattern
            let seed = Array.from({length: N}, (v, r) => 
                Array.from({length: N}, (v, c) => (Math.floor(r * n + r / n + c) % N) + 1)
            );

            // Populate Grid
            for(let i = 0; i < N * N; i++) {
                let div = document.createElement('div');
                div.className = 'cell';
                let r = Math.floor(i / N), c = i % N;
                if ((Math.floor(r / n) + Math.floor(c / n)) % 2 == 0) div.style.background = '#080808';
                
                // 30% clue density
                if(Math.random() < 0.30) {
                    div.innerText = seed[r][c];
                    div.classList.add('initial');
                }
                container.appendChild(div);
                cells.push(div);
            }

            // Build Number Toolbar
            const toolbar = document.getElementById('num-toolbar');
            toolbar.innerHTML = ''; 
            for (let v = 1; v <= N; v++) {
                let btn = document.createElement('button');
                btn.className = 'num-btn';
                btn.innerText = v;
                btn.onclick = () => toggleHighlight(v);
                toolbar.appendChild(btn);
            }
            activeHighlight = null;
            resizeCanvas();
        }

        function toggleHighlight(val) {
            if (activeHighlight === val) {
                activeHighlight = null;
                cells.forEach(c => c.classList.remove('highlight-target'));
                document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active-num'));
                return;
            }
            activeHighlight = val;
            document.querySelectorAll('.num-btn').forEach(b => b.classList.toggle('active-num', b.innerText == val));
            cells.forEach(c => c.classList.toggle('highlight-target', c.innerText == val));
        }

        // --- WASM BRIDGE ---
        function solveWithMarilyn(js_grid, base_n) {
            if (!marilynEngineReady) return null;

            const totalCells = js_grid.length;
            const bytesPerElement = 4;
            const gridPointer = Module._malloc(totalCells * bytesPerElement);

            // Copy JS array to Wasm memory
            for (let i = 0; i < totalCells; i++) {
                Module.setValue(gridPointer + (i * bytesPerElement), js_grid[i], 'i32');
            }

            // Call the C function from libmarilynnp
            const solve_func = Module.cwrap('solve_sudoku_marilyn', 'number', ['number', 'number']);
            const result = solve_func(gridPointer, base_n);

            let solvedArray = null;
            if (result === 1) {
                solvedArray = new Array(totalCells);
                for (let i = 0; i < totalCells; i++) {
                    solvedArray[i] = Module.getValue(gridPointer + (i * bytesPerElement), 'i32');
                }
            }

            Module._free(gridPointer);
            return solvedArray;
        }

        function executeWasmFold() {
            const statusLabel = document.getElementById('status');
            statusLabel.innerText = "FOLDING MANIFOLD...";
            
            let gridData = cells.map(c => parseInt(c.innerText) || 0);
            
            const start = performance.now();
            let result = solveWithMarilyn(gridData, n);
            const end = performance.now();

            document.getElementById('timer').innerText = (end - start).toFixed(2);

            if (result) {
                result.forEach((val, i) => {
                    if (!cells[i].classList.contains('initial')) {
                        cells[i].innerText = val;
                        cells[i].classList.add('solved');
                    }
                });
                statusLabel.innerText = "H-STATE RECONSTRUCTED";
                statusLabel.style.color = "var(--ground)";
            } else {
                statusLabel.innerText = "STABILITY FAILURE";
                statusLabel.style.color = "var(--friction)";
            }
        }

        function verifyGrounding() {
            let rows = Array.from({length: N}, () => new Set());
            let cols = Array.from({length: N}, () => new Set());
            let blocks = Array.from({length: N}, () => new Set());
            let error = false;

            cells.forEach((cell, i) => {
                cell.classList.remove('friction');
                let val = cell.innerText;
                if (!val) return;
                let r = Math.floor(i / N), c = i % N, b = Math.floor(r/n)*n + Math.floor(c/n);
                if (rows[r].has(val) || cols[c].has(val) || blocks[b].has(val)) {
                    cell.classList.add('friction');
                    error = true;
                }
                rows[r].add(val); cols[c].add(val); blocks[b].add(val);
            });

            document.getElementById('status').innerText = error ? "GHOSTS DETECTED" : "GROUND STATE VERIFIED";
        }

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }

        window.onload = initManifold;
        window.onresize = resizeCanvas;
    </script>
</body>
</html>
