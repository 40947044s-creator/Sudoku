<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Inference & Manifold Mapping</title>
    <style>
        :root { --ntnu-red: #b31b1b; --gold: #d4af37; --bg: #050505; --accent: #00d4ff; --friction: #ff3333; --ground: #00ff00; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .dashboard { width: 100%; background: #111; padding: 15px; border-bottom: 2px solid var(--ntnu-red); display: flex; justify-content: space-around; align-items: center; flex-wrap: wrap; }
        .metrics { font-size: 0.8rem; color: var(--gold); display: flex; gap: 15px; }
        .metric-val { color: var(--ground); font-weight: bold; }
        #grid-container { display: grid; gap: 1px; background: #333; margin: 20px auto; padding: 5px; border: 2px solid var(--ntnu-red); }
        .cell { background: #000; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; border: 1px solid #111; font-weight: bold; overflow: hidden; position: relative; }
        .cell.initial { color: var(--gold); background: #0a0a0a; font-size: 1.2rem; }
        .cell.solved { color: var(--ground); font-size: 1.2rem; }
        /* Phase Cloud styling */
        .cloud { font-size: 0.5rem; color: var(--accent); display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; line-height: 1; }
        button { background: var(--ntnu-red); color: white; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; }
        #map-btn { background: var(--accent); color: #000; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div>
            <span>N:</span> 
            <input type="number" id="n-val" value="9" min="4" max="16" onchange="initManifold()" style="background:#000; color:#fff; width:45px;">
            <button onclick="initManifold()">RESET</button>
        </div>
        <button id="map-btn" onclick="inferManifold()">INFER ALL OUTCOMES</button>
        <div class="metrics">
            <div>SOLUTIONS: <span id="sol-count" class="metric-val">0</span></div>
            <div>TIME: <span id="timer" class="metric-val">0.00</span>ms</div>
            <div>STATUS: <span id="status" style="color:var(--accent)">READY</span></div>
        </div>
    </div>

    <div id="grid-container"></div>

    <script>
        let N, bR, bC, cells = [], grid = [], solutions = [], masterMask = [];

        function getFactors(n) {
            let r = Math.floor(Math.sqrt(n));
            while (n % r !== 0) r--;
            return [r, n / r];
        }

        function initManifold() {
            N = parseInt(document.getElementById('n-val').value);
            [bR, bC] = getFactors(N);
            const container = document.getElementById('grid-container');
            let size = Math.min(45, Math.floor(600 / N));
            container.style.gridTemplateColumns = `repeat(${N}, ${size}px)`;
            container.innerHTML = '';
            grid = Array.from({length: N}, () => Array(N).fill(0n));
            masterMask = Array(N * N).fill(0n);
            solutions = [];
            cells = [];

            for(let i=0; i<N*N; i++) {
                let r = Math.floor(i / N), c = i % N;
                let div = document.createElement('div');
                div.className = 'cell';
                div.style.width = size + 'px'; div.style.height = size + 'px';
                if ((Math.floor(r / bR) + Math.floor(c / bC)) % 2 == 0) div.style.background = '#080808';
                
                // Seed a few clues (approx 35%)
                if(Math.random() < 0.35) {
                    let val = (Math.floor(r * bC + r / bR + c) % N) + 1;
                    div.innerText = val; div.classList.add('initial');
                    grid[r][c] = BigInt(val);
                }
                container.appendChild(div); cells.push(div);
            }
            updateStatus("MANIFOLD READY");
        }

        function getSieve(r, c, currentGrid) {
            let mask = 0n;
            let b = Math.floor(r / bR) * bR + Math.floor(c / bC);
            for (let j = 0; j < N; j++) {
                if (currentGrid[r][j]) mask |= (1n << (currentGrid[r][j] - 1n));
                if (currentGrid[j][c]) mask |= (1n << (currentGrid[j][c] - 1n));
                let boxR = Math.floor(b / bR) * bR + Math.floor(j / bC);
                let boxC = (b % bR) * bC + (j % bC);
                if (currentGrid[boxR][boxC]) mask |= (1n << (currentGrid[boxR][boxC] - 1n));
            }
            return (~mask) & ((1n << BigInt(N)) - 1n);
        }

        async function inferManifold() {
            const start = performance.now();
            updateStatus("FOLDING NOISE...");
            solutions = [];
            masterMask = Array(N * N).fill(0n);
            
            // Tier 3: Exhaustive search leveraging Tier 1/2 logic
            // We use recursion to find ALL valid ground states
            await solveRecursive(0);

            const end = performance.now();
            document.getElementById('timer').innerText = (end - start).toFixed(2);
            document.getElementById('sol-count').innerText = solutions.length;
            
            if (solutions.length > 0) {
                renderMasterManifold();
                updateStatus("AC: MANIFOLD INFERRED");
            } else {
                updateStatus("RAF OVERFLOW: NO SOLUTIONS");
            }
        }

        async function solveRecursive(cellIdx) {
            if (solutions.length >= 500) return; // Safety cap for browser memory
            if (cellIdx === N * N) {
                // Ground state H=0 reached
                let currentSol = grid.flat();
                solutions.push(currentSol);
                // Update Master Tensor
                currentSol.forEach((val, i) => masterMask[i] |= (1n << (val - 1n)));
                return;
            }

            let r = Math.floor(cellIdx / N), c = cellIdx % N;
            if (grid[r][c] !== 0n) return solveRecursive(cellIdx + 1);

            let mask = getSieve(r, c, grid);
            for (let v = 1n; v <= BigInt(N); v++) {
                if (mask & (1n << (v - 1n))) {
                    grid[r][c] = v;
                    await solveRecursive(cellIdx + 1);
                    grid[r][c] = 0n; // Boolean Reverse
                }
            }
        }

        function renderMasterManifold() {
            cells.forEach((cell, i) => {
                if (cell.classList.contains('initial')) return;
                let mask = masterMask[i];
                let activeBits = [];
                for(let v=1; v<=N; v++) if(mask & (1n << BigInt(v-1))) activeBits.push(v);

                if (activeBits.length === 1) {
                    cell.innerText = activeBits[0];
                    cell.classList.add('solved');
                } else if (activeBits.length > 1) {
                    // Render Phase Cloud (The Superposition)
                    cell.innerHTML = `<div class="cloud">${activeBits.slice(0, 9).join(' ')}</div>`;
                    cell.style.border = "1px solid var(--accent)";
                } else {
                    cell.innerText = "?";
                    cell.style.color = "var(--friction)";
                }
            });
        }

        function updateStatus(msg) { document.getElementById('status').innerText = msg; }
        window.onload = initManifold;
    </script>
</body>
</html>
