<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Universal Adelic Transition Engine</title>
    <style>
        :root { --ntnu-red: #b31b1b; --gold: #d4af37; --bg: #050505; --accent: #00d4ff; --friction: #ff3333; --ground: #00ff00; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .dashboard { width: 100%; background: #111; padding: 15px; border-bottom: 2px solid var(--ntnu-red); display: flex; justify-content: space-around; align-items: center; flex-wrap: wrap; }
        .metrics { font-size: 0.8rem; color: var(--gold); display: flex; gap: 10px; }
        .metric-val { color: var(--ground); font-weight: bold; }
        #grid-container { display: grid; gap: 1px; background: #333; margin: 20px auto; padding: 5px; border: 2px solid var(--ntnu-red); }
        .cell { background: #000; display: flex; align-items: center; justify-content: center; border: 1px solid #111; font-weight: bold; }
        .cell.initial { color: var(--gold); background: #0a0a0a; }
        .cell.solved { color: var(--ground); }
        .cell.friction { background: rgba(255, 51, 51, 0.2); color: var(--friction); }
        button { background: var(--ntnu-red); color: white; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; }
        #solve-btn { background: var(--accent); color: #000; }
        #verify-btn { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div>
            <span>Arbitrary N:</span> 
            <input type="number" id="n-val" value="10" min="4" max="25" onchange="initManifold()" style="background:#000; color:#fff; width:50px;">
            <button onclick="initManifold()">RESET</button>
        </div>
        <button id="solve-btn" onclick="executeOneStream()">RECONSTRUCT H</button>
        <button id="verify-btn" onclick="strictAudit()">STRICT AUDIT</button>
        <div class="metrics">
            <div>TIME: <span id="timer" class="metric-val">0.00</span>ms</div>
            <div>STATUS: <span id="status" style="color:var(--accent)">SENTINEL IDLE</span></div>
        </div>
    </div>

    <div id="grid-container"></div>

    <script>
        let N, bR, bC, cells = [], grid = [];

        // Adelic Factorization: Finds the most balanced block R x C = N
        function getFactors(n) {
            let r = Math.floor(Math.sqrt(n));
            while (n % r !== 0) r--;
            return [r, n / r];
        }

        function initManifold() {
            N = parseInt(document.getElementById('n-val').value);
            [bR, bC] = getFactors(N);
            const container = document.getElementById('grid-container');
            let size = Math.min(35, Math.floor(600 / N));
            container.style.gridTemplateColumns = `repeat(${N}, ${size}px)`;
            container.innerHTML = '';
            grid = Array.from({length: N}, () => Array(N).fill(0));
            cells = [];

            for(let i=0; i<N*N; i++) {
                let r = Math.floor(i / N), c = i % N;
                let div = document.createElement('div');
                div.className = 'cell';
                div.style.width = size + 'px'; div.style.height = size + 'px';
                div.style.fontSize = (size * 0.5) + 'px';
                if ((Math.floor(r / bR) + Math.floor(c / bC)) % 2 == 0) div.style.background = '#080808';
                
                // Seed grounded invariants (~20% to allow for complex manifolds)
                if(Math.random() < 0.2) {
                    let val = (Math.floor(r * bC + r / bR + c) % N) + 1;
                    div.innerText = val; div.classList.add('initial');
                    grid[r][c] = val;
                }
                container.appendChild(div); cells.push(div);
            }
            document.getElementById('status').innerText = `SENTINEL READY (${N}x${N}, Block: ${bR}x${bC})`;
        }

        // The Hamiltonian Sieve: Using BigInt to prevent bit-overflow for N > 31
        function getSieve(r, c) {
            let mask = 0n;
            let b = Math.floor(r / bR) * bR + Math.floor(c / bC);
            for (let j = 0; j < N; j++) {
                if (grid[r][j]) mask |= (1n << BigInt(grid[r][j] - 1));
                if (grid[j][c]) mask |= (1n << BigInt(grid[j][c] - 1));
                let boxR = Math.floor(b / bR) * bR + Math.floor(j / bC);
                let boxC = (b % bR) * bC + (j % bC);
                if (grid[boxR][boxC]) mask |= (1n << BigInt(grid[boxR][boxC] - 1));
            }
            return (~mask) & ((1n << BigInt(N)) - 1n);
        }

        async function executeOneStream() {
            const start = performance.now();
            const empty = [];
            for(let i=0; i<N*N; i++) if(!grid[Math.floor(i/N)][i%N]) empty.push(i);

            // Entropy Mapping: Solve highest friction cells first
            empty.sort((a, b) => {
                const countBits = (m) => m.toString(2).split('1').length - 1;
                return countBits(getSieve(Math.floor(a/N), a%N)) - countBits(getSieve(Math.floor(b/N), b%N));
            });

            async function solve(idx) {
                if (idx === empty.length) return true;
                let cellIdx = empty[idx], r = Math.floor(cellIdx/N), c = cellIdx%N;
                let mask = getSieve(r, c);
                for (let v = 1; v <= N; v++) {
                    if (mask & (1n << BigInt(v - 1))) {
                        grid[r][c] = v; cells[cellIdx].innerText = v;
                        cells[cellIdx].classList.add('solved');
                        if (await solve(idx + 1)) return true;
                        grid[r][c] = 0; cells[cellIdx].innerText = "";
                        cells[cellIdx].classList.remove('solved');
                    }
                }
                return false;
            }

            document.getElementById('status').innerText = "COLLAPSING...";
            if (await solve(0)) {
                document.getElementById('status').innerText = "H-STATE ACHIEVED";
            } else {
                document.getElementById('status').innerText = "RAF OVERFLOW";
            }
            document.getElementById('timer').innerText = (performance.now() - start).toFixed(2);
        }

        function strictAudit() {
            let errors = 0;
            cells.forEach(c => c.classList.remove('friction'));
            for(let i=0; i<N*N; i++) {
                let r = Math.floor(i/N), c = i%N, val = grid[r][c];
                if(!val) { errors++; continue; }
                grid[r][c] = 0;
                let mask = getSieve(r, c);
                if(!(mask & (1n << BigInt(val - 1)))) {
                    cells[i].classList.add('friction');
                    errors++;
                }
                grid[r][c] = val;
            }
            const status = document.getElementById('status');
            status.innerText = errors === 0 ? "TRUE AC: AUDIT PASSED" : `STABILITY FAILURE: ${errors} ERRORS`;
            status.style.color = errors === 0 ? "var(--ground)" : "var(--friction)";
        }

        window.onload = initManifold;
    </script>
</body>
</html>
