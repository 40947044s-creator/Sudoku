<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Oracle v45.4</title>
    <style>
        :root { --sentinel: #00ff41; --bedrock: #050505; --accent: #00d4ff; --gold: #d4af37; --friction: #ff3333; }
        body { background: var(--bedrock); color: var(--sentinel); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 15px; overflow: hidden; }
        .header { width: 100%; text-align: center; border-bottom: 2px solid var(--sentinel); padding-bottom: 10px; margin-bottom: 10px; }
        .main-layout { display: flex; gap: 15px; width: 98vw; height: 85vh; }
        
        .sidebar { flex: 0.8; background: rgba(255,255,255,0.02); border: 1px solid #222; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .io-card { background: #111; border-left: 5px solid var(--accent); padding: 10px; }
        textarea { width: 100%; background: #000; color: var(--accent); border: 1px solid #333; padding: 8px; font-size: 0.75rem; height: 80px; resize: none; outline: none; }
        
        .canvas-area { flex: 1.2; display: flex; align-items: center; justify-content: center; background: #000; border: 1px solid #111; }
        canvas { border: 1px solid var(--sentinel); max-height: 100%; max-width: 100%; box-shadow: 0 0 20px rgba(0, 255, 65, 0.1); cursor: pointer; }

        .controls { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .input-group { background: #111; padding: 10px; border-left: 5px solid var(--gold); }
        input[type="text"] { width: 100%; background: #000; color: var(--gold); border: 1px solid #333; padding: 8px; font-size: 0.85rem; box-sizing: border-box; }
        
        .btn { background: rgba(0, 255, 65, 0.1); border: 1px solid var(--sentinel); color: var(--sentinel); padding: 10px; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; font-weight: bold; text-align: center; }
        .btn:hover { background: var(--sentinel); color: #000; }
        #status { font-size: 0.65rem; color: #777; border-left: 2px solid var(--gold); padding-left: 10px; min-height: 60px; background: #0a0a0a; line-height: 1.4; }
    </style>
</head>
<body>

<div class="header">
    <strong>PROJECT NP: ADELIC ORACLE v45.4</strong>
    <div style="font-size: 0.65rem; color: #888; margin-top: 5px;">[INPUT RESTORED | CSIE-NTNU HARDENED | UNIVERSAL N]</div>
</div>

<div class="main-layout">
    <div class="sidebar">
        <div class="io-card">
            <div style="font-size:0.6rem; color:#888;">TOPOLOGY OUTPUT</div>
            <textarea id="output-string" readonly></textarea>
        </div>
        <div class="io-card" style="border-left-color: var(--gold);">
            <div style="font-size:0.6rem; color:#888;">DNA PROOF</div>
            <textarea id="true-dna"></textarea>
        </div>
        <div id="proof-log" style="flex-grow:1; font-size:0.6rem; color:#444; overflow-y:auto; border:1px dashed #222; padding:5px;"></div>
    </div>

    <div class="canvas-area"><canvas id="mainCanvas"></canvas></div>

    <div class="controls">
        <div style="display:flex; gap:5px;">
            z: <input type="number" id="z-val" value="3" style="width: 45px; background:#000; color:var(--sentinel); border:1px solid #333; text-align:center;" onchange="initSystem()">
            <button class="btn" style="flex:1;" onclick="clearInferred()">Clear Board</button>
            <button class="btn" style="border-color:var(--friction); color:var(--friction);" onclick="purgeAll()">Purge System</button>
        </div>
        
        <div class="input-group">
            <div style="font-size:0.6rem; color:#888; margin-bottom:5px;">TERMINAL INPUT (81 digits)</div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="grid-string" value="800000000003600000070090200050007000000045700000100030001000068008500010090000400" placeholder="000...">
                <button class="btn" style="font-size:0.5rem; padding:2px 8px;" onclick="injectGridString()">Inject</button>
            </div>
        </div>

        <div class="input-group" style="background:#1a1a1a;">
            <div style="font-size:0.6rem; color:#888; margin-bottom:5px;">PATH ID</div>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="path-id" value="9307075996333306414" style="flex: 2;">
                <button class="btn" style="flex: 1; font-size:0.6rem;" onclick="deriveLatticeAnchor()">Derive</button>
            </div>
        </div>
        
        <button class="btn" style="border-color:var(--accent); color:var(--accent);" onclick="startUniversalSolver()">Run Adelic Solver</button>
        <div id="status">> SYSTEM READY. Manual "Inject" enabled if listener stalls.</div>
    </div>
</div>

<script>
let z, N, totalBits, isRunning = false;
let board, fixed, adj = [];
let rowM, colM, blkM, shadowR, shadowC, shadowB;
const ADELIC_CONST = 0x517cc1b727220a95n;
const canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');

function initSystem() {
    isRunning = false; // FORCE STOP
    z = parseInt(document.getElementById('z-val').value);
    N = z * z; totalBits = N * N;
    board = new Uint16Array(totalBits); fixed = new Uint16Array(totalBits);
    rowM = new BigUint64Array(N); colM = new BigUint64Array(N); blkM = new BigUint64Array(N);
    shadowR = Array.from({length: totalBits}, () => new BigUint64Array(N));
    shadowC = Array.from({length: totalBits}, () => new BigUint64Array(N));
    shadowB = Array.from({length: totalBits}, () => new BigUint64Array(N));
    adj = Array.from({ length: totalBits }, () => []);
    for (let i = 0; i < totalBits; i++) {
        let r = Math.floor(i / N), c = i % N, b = Math.floor(r / z) * z + Math.floor(c / z);
        for (let j = 0; j < totalBits; j++) {
            if (i === j) continue;
            let rr = Math.floor(j / N), cc = j % N, bb = Math.floor(rr / z) * z + Math.floor(cc / z);
            if (r === rr || c === cc || b === bb) adj[i].push(j);
        }
    }
    canvas.width = canvas.height = 600;
    injectGridString();
}

function injectGridString() {
    let str = document.getElementById('grid-string').value.replace(/[^0-9]/g, '');
    fixed.fill(0); board.fill(0);
    for (let i = 0; i < Math.min(str.length, totalBits); i++) {
        let char = str[i]; if (char >= '1' && char <= '9') fixed[i] = parseInt(char);
    }
    render();
    document.getElementById('status').innerText = "> TOPOLOGY INJECTED. Ready.";
}

function render(final = false) {
    const s = canvas.width / N;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < totalBits; i++) {
        let x = (i % N) * s, y = Math.floor(i / N) * s;
        ctx.strokeStyle = "rgba(0, 212, 255, 0.08)"; ctx.strokeRect(x, y, s, s);
        let val = board[i];
        if (val) {
            ctx.fillStyle = fixed[i] ? "#d4af37" : (final ? "#00ff41" : "#ffffff");
            ctx.font = `bold ${s * 0.5}px monospace`;
            ctx.textAlign = "center"; ctx.fillText(val, x + s/2, y + s * 0.7);
        }
    }
}

async function startUniversalSolver() {
    if (isRunning) return; isRunning = true;
    let anchor = BigInt(document.getElementById('path-id').value.replace(/\D/g, '') || "1006");
    if (await runMRVResonance(anchor)) {
        isRunning = false; render(true); packGraphToDNA();
        let s = ""; for(let i=0; i<totalBits; i++) s += board[i].toString();
        document.getElementById('output-string').value = s;
    } else {
        isRunning = false; document.getElementById('status').innerText = "> VOID DETECTED.";
    }
}

async function runMRVResonance(anchor) {
    board.fill(0); rowM.fill(0n); colM.fill(0n); blkM.fill(0n);
    let placed = new Uint8Array(totalBits), stack = [];
    for (let i = 0; i < totalBits; i++) {
        if (fixed[i]) {
            let r = Math.floor(i/N), c = i%N, b = Math.floor(r/z)*z+Math.floor(c/z);
            rowM[r] |= (1n << BigInt(fixed[i])); colM[c] |= (1n << BigInt(fixed[i])); blkM[b] |= (1n << BigInt(fixed[i]));
            board[i] = fixed[i]; placed[i] = 1;
        }
    }
    while (true) {
        let bestIdx = -1, minOpts = Infinity, bestMask = 0n;
        for (let i = 0; i < totalBits; i++) {
            if (placed[i]) continue;
            let r = Math.floor(i/N), c = i%N, b = Math.floor(r/z)*z+Math.floor(c/z);
            let mask = rowM[r] | colM[c] | blkM[b];
            let count = 0; for (let v = 1; v <= N; v++) if (!(mask & (1n << BigInt(v)))) count++;
            if (count < minOpts) { minOpts = count; bestIdx = i; bestMask = mask; }
        }
        if (bestIdx === -1) return true;
        if (minOpts === 0) {
            while (stack.length > 0) {
                let prev = stack.pop();
                board[prev.idx] = 0; placed[prev.idx] = 0;
                rowM.set(prev.rM); colM.set(prev.cM); blkM.set(prev.bM);
                let m = rowM[Math.floor(prev.idx/N)] | colM[prev.idx%N] | blkM[Math.floor(Math.floor(prev.idx/N)/z)*z+Math.floor((prev.idx%N)/z)];
                let opts = []; for (let v = 1; v <= N; v++) if (!(m & (1n << BigInt(v)))) opts.push(v);
                prev.phase++;
                if (prev.phase < opts.length) {
                    let seed = (anchor ^ BigInt(prev.idx)) * ADELIC_CONST;
                    let val = opts[(Number(seed % BigInt(opts.length)) + prev.phase) % opts.length];
                    stack.push(prev); board[prev.idx] = val; placed[prev.idx] = 1;
                    rowM[Math.floor(prev.idx/N)] |= (1n << BigInt(val)); colM[prev.idx%N] |= (1n << BigInt(val)); blkM[Math.floor(Math.floor(prev.idx/N)/z)*z+Math.floor((prev.idx%N)/z)] |= (1n << BigInt(val));
                    break;
                }
            }
            if (stack.length === 0) return false;
            continue;
        }
        let opts = []; for (let v = 1; v <= N; v++) if (!(bestMask & (1n << BigInt(v)))) opts.push(v);
        let seed = (anchor ^ BigInt(bestIdx)) * ADELIC_CONST;
        let val = opts[Number(seed % BigInt(opts.length))];
        stack.push({idx: bestIdx, phase: 0, rM: new BigUint64Array(rowM), cM: new BigUint64Array(colM), bM: new BigUint64Array(blkM)});
        board[bestIdx] = val; placed[bestIdx] = 1;
        rowM[Math.floor(bestIdx/N)] |= (1n << BigInt(val)); colM[bestIdx%N] |= (1n << BigInt(val)); blkM[Math.floor(Math.floor(bestIdx/N)/z)*z+Math.floor((bestIdx%N)/z)] |= (1n << BigInt(val));
    }
}

function deriveLatticeAnchor() {
    let anchor = 0n; let count = 0;
    for (let i = 0; i < totalBits; i++) { if (fixed[i]) { count++; anchor += BigInt(fixed[i] * (i + 1)); } }
    anchor ^= BigInt(count) * ADELIC_CONST;
    document.getElementById('path-id').value = (anchor < 0n ? -anchor : anchor).toString();
}

function packGraphToDNA() {
    let dna = 0n, mult = 1n, sim = new Uint16Array(totalBits); 
    for (let i = 0; i < totalBits; i++) {
        let val = board[i]; let mask = 0n;
        for (let j of adj[i]) if (sim[j]) mask |= (1n << BigInt(sim[j]));
        let opts = []; for (let v = 1; v <= N; v++) if (!(mask & (1n << BigInt(v)))) opts.push(v);
        let idx = opts.indexOf(val);
        if (idx !== -1) dna += BigInt(idx) * mult;
        mult *= BigInt(opts.length || 1); sim[i] = val;
    }
    document.getElementById('true-dna').value = dna.toString();
}

function purgeAll() {
    isRunning = false;
    document.getElementById('grid-string').value = "0".repeat(totalBits);
    document.getElementById('output-string').value = "";
    document.getElementById('true-dna').value = "";
    initSystem();
}

function clearInferred() { board.fill(0); isRunning = false; render(); }

canvas.addEventListener('mousedown', (e) => {
    if (isRunning) return;
    const rect = canvas.getBoundingClientRect();
    const s = canvas.width / N;
    const idx = Math.floor((e.clientY - rect.top) / s) * N + Math.floor((e.clientX - rect.left) / s);
    let v = prompt(`Node ${idx}:`); 
    if (v !== null) { fixed[idx] = Math.min(N, Math.max(0, parseInt(v) || 0)); render(); }
});

initSystem();
</script>
</body>
</html>
