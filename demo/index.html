<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Oracle v22.0</title>
    <style>
        :root { --sentinel: #00ff41; --bedrock: #050505; --accent: #00d4ff; --gold: #d4af37; }
        body { background: var(--bedrock); color: var(--sentinel); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .panel { background: #111; padding: 20px; border-top: 4px solid var(--gold); width: 100%; max-width: 1000px; border-radius: 4px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .grid { display: grid; border: 3px solid var(--sentinel); background: #000; margin: 20px auto; }
        .cell { border: 0.5px solid #222; display: flex; align-items: center; justify-content: center; color: var(--gold); font-weight: bold; outline: none; transition: background 0.2s; }
        .cell:focus { background: rgba(0, 255, 65, 0.05); }
        .cell.calculated { color: var(--accent); }
        .btn { width: 100%; padding: 15px; background: rgba(0, 255, 65, 0.1); border: 1px solid var(--sentinel); color: var(--sentinel); cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        .btn:hover { background: var(--sentinel); color: #000; }
        #status { font-size: 0.75rem; color: #888; margin-top: 15px; border-left: 2px solid var(--gold); padding-left: 10px; }
    </style>
</head>
<body>

<div class="panel">
    <div style="text-align:center">
        <strong>PROJECT NP | ADELIC ORACLE v22.0</strong>
        <div style="font-size:0.6rem; color:#555;">[ZIG-WASM NATIVE BRIDGE]</div>
    </div>

    <div style="display:flex; gap:20px; margin-top:20px; justify-content: center; align-items: center;">
        <div>Dim (z): <input type="number" id="z-val" value="3" min="2" max="6" style="background:#000; color:var(--accent); border:1px solid #444;" onchange="init()"></div>
        <button class="btn" style="width:auto; margin:0;" onclick="purge()">Purge</button>
    </div>

    <div id="grid-root"></div>
    
    <button class="btn" style="border-color: var(--accent); color: var(--accent);" onclick="autoSolve()">Automatic Native Solve</button>
    <div id="status">> Initializing Adelic Core...</div>
</div>

<script>
    let z, n, total, cells = [], wasmInstance;

    function log(msg) { document.getElementById('status').innerText = `> ${msg}`; }

    // Initialize Grid with Sudoku UX
    function init() {
        z = parseInt(document.getElementById('z-val').value); n = z * z; total = n * n;
        const root = document.getElementById('grid-root'); root.innerHTML = '';
        const grid = document.createElement('div');
        grid.className = 'grid'; grid.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
        const size = Math.min(window.innerWidth * 0.5, 500);
        grid.style.width = grid.style.height = `${size}px`;
        cells = [];
        for (let i = 0; i < total; i++) {
            const c = document.createElement('div'); c.className = 'cell'; c.contentEditable = "true";
            c.style.fontSize = `${(size/n) * 0.5}px`;
            if ((Math.floor(i / n) + 1) % z === 0 && Math.floor(i / n) < n - 1) c.style.borderBottom = "2.5px solid var(--sentinel)";
            if ((i + 1) % z === 0 && (i + 1) % n !== 0) c.style.borderRight = "2.5px solid var(--sentinel)";
            grid.appendChild(c); cells.push(c);
        }
        root.appendChild(grid);
    }

    // Load Zig WASM Freestanding
    async function loadWasm() {
        try {
            const response = await fetch('np_engine.wasm');
            const bytes = await response.arrayBuffer();
            const results = await WebAssembly.instantiate(bytes, {
                env: { memory: new WebAssembly.Memory({ initial: 256 }) }
            });
            wasmInstance = results.instance;
            log("WASM Engine Online (Zig/Intel).");
            init();
        } catch (e) {
            log("ERROR: Could not load wasm. Run via local server.");
        }
    }

    async function autoSolve() {
        if (!wasmInstance) return;
        log("Grounding Manifold...");
        
        const boardData = new Int32Array(total);
        cells.forEach((c, i) => boardData[i] = parseInt(c.innerText) || 0);

        // Raw Memory Allocation
        const byteSize = total * 4;
        const ptr = wasmInstance.exports.malloc ? wasmInstance.exports.malloc(byteSize) : 1024; // Static offset if no malloc
        const memory = new Int32Array(wasmInstance.exports.memory.buffer, ptr, total);
        memory.set(boardData);

        const t0 = performance.now();
        const success = wasmInstance.exports.solve_manifold(z, ptr);
        const t1 = performance.now();

        if (success) {
            cells.forEach((c, i) => {
                if (!c.innerText) {
                    c.innerText = memory[i];
                    c.classList.add('calculated');
                }
            });
            log(`SUCCESS: Manifold Grounded in ${(t1-t0).toFixed(1)}ms.`);
        } else {
            log("ERROR: Manifold Fracture (Irrational State).");
        }
    }

    function purge() { cells.forEach(c => { c.innerText = ""; c.className = "cell"; }); log("Purged."); }
    
    loadWasm();
</script>
</body>
</html>
