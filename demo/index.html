<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Oracle v19.0</title>
    <style>
        :root { --sentinel: #00ff41; --bedrock: #050505; --accent: #00d4ff; --gold: #d4af37; }
        body { background: var(--bedrock); color: var(--sentinel); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .header { text-align: center; border-bottom: 2px solid var(--sentinel); width: 100%; max-width: 900px; padding-bottom: 10px; }
        .panel { display: flex; gap: 20px; background: #111; padding: 20px; border-top: 4px solid var(--gold); width: 100%; max-width: 1100px; margin-top: 20px; }
        .grid-container { flex: 1.5; display: flex; flex-direction: column; align-items: center; }
        .grid { display: grid; border: 3px solid var(--sentinel); background: rgba(0, 255, 65, 0.02); }
        .cell { border: 0.5px solid rgba(0, 255, 65, 0.1); display: flex; align-items: center; justify-content: center; color: var(--gold); font-weight: bold; outline: none; }
        .cell.calculated { color: var(--accent); background: rgba(0, 212, 255, 0.05); }
        .btn { width: 100%; background: rgba(0, 255, 65, 0.1); border: 1px solid var(--sentinel); color: var(--sentinel); padding: 15px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        .btn-auto { border-color: var(--accent); color: var(--accent); background: rgba(0, 212, 255, 0.1); }
        #status { font-size: 0.75rem; color: #999; margin-top: 10px; border-left: 2px solid var(--gold); padding-left: 10px; }
    </style>
</head>
<body>

<div class="header">
    <strong>PROJECT NP: ADELIC ORACLE v19.0</strong>
    <div style="font-size:0.6rem; color:#888;">[WASM AUTOMATED ENGINE | GITHUB HOSTED]</div>
</div>

<div class="panel">
    <div class="grid-container">
        <div style="margin-bottom:10px;">
            Dim (z): <input type="number" id="z-val" value="3" min="2" max="4" style="background:#000; color:var(--accent); border:1px solid #444;" onchange="init()">
        </div>
        <div id="grid-root"></div>
    </div>
    
    <div style="flex: 1; display: flex; flex-direction: column; gap: 10px;">
        <button class="btn btn-auto" id="solve-btn" onclick="autoSolve()">Automatic Native Solve</button>
        <button class="btn" style="border-color: var(--error); color: var(--error);" onclick="purge()">Purge Grid</button>
        <div id="status">> Initializing WASM Core...</div>
    </div>
</div>

<script src="np_engine.js"></script>
<script>
    let z, n, total, cells = [];
    let isWasmLoaded = false;

    function log(msg) { document.getElementById('status').innerHTML = `> ${msg}`; }

    function init() {
        z = parseInt(document.getElementById('z-val').value); n = z * z; total = n * n;
        const root = document.getElementById('grid-root'); root.innerHTML = '';
        const grid = document.createElement('div');
        grid.className = 'grid'; grid.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
        const size = Math.min(window.innerWidth * 0.45, 500);
        grid.style.width = grid.style.height = `${size}px`;
        cells = [];
        for (let i = 0; i < total; i++) {
            const c = document.createElement('div'); c.className = 'cell'; c.contentEditable = "true";
            c.style.fontSize = `${(size/n) * 0.5}px`;
            if ((Math.floor(i / n) + 1) % z === 0 && Math.floor(i / n) < n - 1) c.style.borderBottom = "2.5px solid var(--sentinel)";
            if ((i + 1) % z === 0 && (i + 1) % n !== 0) c.style.borderRight = "2.5px solid var(--sentinel)";
            grid.appendChild(c); cells.push(c);
        }
        root.appendChild(grid);
    }

    async function autoSolve() {
        if (!isWasmLoaded) return log("WASM not ready.");
        log("WASM: Invoking Adelic Solve...");
        
        const boardData = cells.map(c => parseInt(c.innerText) || 0);
        const ptr = Module._malloc(total * 4);
        Module.HEAP32.set(new Int32Array(boardData), ptr / 4);
        
        const success = Module._solve_manifold(z, ptr);
        
        if (success) {
            const result = new Int32Array(Module.HEAP32.buffer, ptr, total);
            result.forEach((val, i) => {
                if (!cells[i].innerText) {
                    cells[i].innerText = val;
                    cells[i].classList.add('calculated');
                }
            });
            log("SUCCESS: Manifold Grounded via WASM.");
        } else {
            log("ERROR: Manifold Fracture.");
        }
        Module._free(ptr);
    }

    Module.onRuntimeInitialized = () => {
        isWasmLoaded = true;
        log("WASM Engine Online.");
        init();
    };

    function purge() { cells.forEach(c => { c.innerText = ""; c.className = "cell"; }); log("Purged."); }
</script>
</body>
</html>
