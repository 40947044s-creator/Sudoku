<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Oracle v8.6</title>
    <style>
        :root { 
            --sentinel: #00ff41; --bedrock: #050505; --accent: #00d4ff; 
            --gold: #d4af37; --friction: #ff3333; --void: #1a1a1a;
        }
        body { 
            background: var(--bedrock); color: var(--sentinel); 
            font-family: 'Courier New', monospace; display: flex; 
            flex-direction: column; align-items: center; margin: 0; padding: 20px;
        }
        .header { width: 100%; text-align: center; border-bottom: 2px solid var(--sentinel); padding-bottom: 10px; }
        
        /* The Adelic Manifold Index Bar */
        .index-bar {
            width: 95%; max-width: 700px; background: #111; border: 1px solid #333;
            margin: 15px 0; padding: 10px; border-left: 5px solid var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }
        .index-label { font-size: 0.65rem; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        .index-value { font-size: 0.9rem; color: var(--gold); letter-spacing: 1px; word-break: break-all; }
        
        .panel { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 10px; padding: 15px; background: rgba(0,255,65,0.03); border: 1px solid #222; }
        canvas { border: 1px solid var(--accent); background: #000; box-shadow: 0 0 40px rgba(0, 212, 255, 0.1); }
        .console { width: 95%; max-width: 700px; height: 120px; background: #000; border: 1px dashed #333; margin-top: 15px; padding: 10px; font-size: 0.7rem; color: #aaa; overflow-y: auto; }
        input { background: #000; border: 1px solid #444; color: var(--accent); padding: 5px; text-align: center; }
        .btn { background: transparent; border: 1px solid var(--sentinel); color: var(--sentinel); padding: 5px 15px; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; }
        .btn:hover { background: var(--sentinel); color: #000; }
        .btn.tuning { border-color: var(--gold); color: var(--gold); }
    </style>
</head>
<body>

<div class="header">
    <strong>PROJECT NP: ADELIC ORACLE v8.6</strong>
    <div style="font-size: 0.7rem; color: #888; margin-top: 5px;">[DETERMINISTIC 2-ADIC DECONVOLUTION ENGINE]</div>
</div>

<div class="index-bar">
    <div class="index-label">Active Adelic Address (Anchor + ScanStep)</div>
    <div class="index-value" id="index-val">#00000000000000000000</div>
    <div style="font-size: 0.6rem; color: var(--accent); margin-top: 5px;">
        Friction Level: <span id="friction-val">0</span> | Manifold Depth: <span id="perc-val">0.0000%</span>
    </div>
</div>

<div class="panel">
    <div>z: <input type="number" id="z-val" value="3" min="2" max="5" style="width: 35px;" onchange="initSystem()"></div>
    <div>ANCHOR: <input type="text" id="path-id" value="40947044" style="width: 140px;"></div>
    <button class="btn" onclick="startInference()">Execute Inference</button>
    <button class="btn tuning" onclick="autoTuneAnchor()">Auto-Tune Snap</button>
    <button class="btn" onclick="resetSystem()" style="color:var(--friction); border-color:var(--friction);">Purge</button>
</div>

<canvas id="mainCanvas"></canvas>
<div class="console" id="log">> [SENTINEL] System ready. Tune the Anchor to align the manifold...</div>

<script>
let z, N, totalBits, isRunning = false;
let board, fixed, phase;
let rowM, colM, blkM, shadowR, shadowC, shadowB;
const ADELIC_CONSTANT = 0x517cc1b727220a95n; // Universal Tuning Frequency

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

function log(msg) {
    const l = document.getElementById('log');
    l.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + l.innerHTML;
    l.scrollTop = 0;
}

function updateStats(id, friction) {
    document.getElementById('index-val').innerText = `#${id.toString()}`;
    document.getElementById('friction-val').innerText = friction;
    let perc = (Number(id % 1000000n) / 10000).toFixed(4);
    document.getElementById('perc-val').innerText = `${perc}%`;
}

function initSystem() {
    isRunning = false;
    z = parseInt(document.getElementById('z-val').value);
    N = z * z;
    totalBits = N * N;
    board = new Uint16Array(totalBits);
    fixed = new Uint16Array(totalBits);
    phase = new Uint16Array(totalBits).fill(0);
    rowM = new Array(N).fill(0n); colM = new Array(N).fill(0n); blkM = new Array(N).fill(0n);
    shadowR = new Array(totalBits); shadowC = new Array(totalBits); shadowB = new Array(totalBits);
    canvas.width = canvas.height = Math.min(window.innerWidth * 0.9, 450);
    render();
}

async function startInference() {
    if (isRunning) return;
    isRunning = true;
    let anchor = BigInt(document.getElementById('path-id').value);
    
    // LAW: Enforce Odd Parity to break Singularity Mode 0
    if ((anchor & 1n) === 0n) anchor |= (1n << 63n); 
    
    let d = 0, scanStep = 0n, friction = 0;
    let activeID = anchor; 

    log(`Inference active at address 0x${activeID.toString(16)}`);

    while (isRunning && d >= 0) {
        if (d === totalBits) { finalize(); break; }

        // FRICTION RESET: Perform Circular Shift on the Adelic Manifold
        if (friction > N * 15) {
            scanStep++;
            d = Math.max(0, d - N); // Linear Ripple Scan: Back-step by one block unit
            activeID = anchor + scanStep; 
            friction = 0;
            updateStats(activeID, friction);
            continue;
        }

        let r = Math.floor(d / N), c = d % N, b = Math.floor(r / z) * z + Math.floor(c / z);
        let mask = rowM[r] | colM[c] | blkM[b];
        
        let opts = [];
        for (let i = 1; i <= N; i++) if (!(mask & (1n << BigInt(i)))) opts.push(i);

        if (opts.length === 0) {
            board[d] = 0; d--;
            if (d < 0) { log("PARADOX: Manifold collapsed into Void."); isRunning = false; break; }
            rowM = [...shadowR[d]]; colM = [...shadowC[d]]; blkM = [...shadowB[d]];
            phase[d]++; friction++; continue;
        }

        shadowR[d] = [...rowM]; shadowC[d] = [...colM]; shadowB[d] = [...blkM];

        let val;
        if (fixed[d] !== 0) {
            val = opts.includes(fixed[d]) ? fixed[d] : 0;
            if (val === 0) { d--; friction += 20; continue; }
        } else if (opts.length === 1) {
            val = opts[0]; // Truth-Lock Singularity (Marilyn Fold O(1))
        } else {
            // Deterministic Bit-Peeling via Adelic XOR-Seed
            let seed = Number(((activeID ^ BigInt(d)) * ADELIC_CONSTANT) % 0xFFFFFFFn);
            val = opts[(Math.abs(seed) + phase[d]) % opts.length];
        }

        board[d] = val;
        let bit = 1n << BigInt(val);
        rowM[r] |= bit; colM[c] |= bit; blkM[b] |= bit;
        d++;
        if (d % N === 0) { 
            updateStats(activeID, friction);
            render(); 
            await new Promise(r => setTimeout(r, 0)); 
        }
    }
}

async function autoTuneAnchor() {
    log("<b>SWEEPING MANIFOLD FOR SNAP POINT...</b>");
    let base = BigInt(document.getElementById('path-id').value);
    for(let i=0n; i<100n; i++) {
        document.getElementById('path-id').value = (base + i).toString();
        // This is a simplified lab test to find the harmonic frequency
        log(`Testing Frequency: +${i}`);
        await startInference();
        if(!isRunning) break; 
    }
}

function render(final = false) {
    const s = canvas.width / N;
    const sub = s * z;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw Subgrid Boundaries
    ctx.lineWidth = 2;
    ctx.strokeStyle = "rgba(0, 212, 255, 0.3)";
    for(let i=0; i<=z; i++) {
        ctx.beginPath(); ctx.moveTo(i*sub, 0); ctx.lineTo(i*sub, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i*sub); ctx.lineTo(canvas.width, i*sub); ctx.stroke();
    }

    for (let i = 0; i < totalBits; i++) {
        let x = (i % N) * s, y = Math.floor(i / N) * s;
        ctx.lineWidth = 1;
        ctx.strokeStyle = "rgba(0, 212, 255, 0.08)"; 
        ctx.strokeRect(x, y, s, s);
        
        let val = fixed[i] || board[i];
        if (val) {
            ctx.fillStyle = fixed[i] ? "var(--gold)" : (final ? "var(--sentinel)" : "white");
            ctx.font = `bold ${s * 0.5}px monospace`;
            ctx.textAlign = "center"; 
            ctx.fillText(val, x + s/2, y + s * 0.7);
        }
    }
}

function finalize() { isRunning = false; render(true); log("<b>SINGULARITY ATTAINED.</b>"); }
function resetSystem() { initSystem(); log("System Purged."); }

canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const s = canvas.width / N;
    const idx = Math.floor((e.clientY - rect.top) / s) * N + Math.floor((e.clientX - rect.left) / s);
    let v = prompt(`Fix Bit at index ${idx}:`); 
    if (v !== null) { fixed[idx] = Math.min(N, Math.max(0, parseInt(v) || 0)); render(); }
});

initSystem();
</script>
</body>
</html>
