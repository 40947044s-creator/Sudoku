<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project NP: Adelic Sudoku Architecture</title>
    <style>
        body { 
            background: #050505; 
            color: #e0e0e0; 
            font-family: 'Courier New', monospace; 
            text-align: center; 
            padding-top: 100px; 
            margin: 0;
        }
        h1 {
            color: #d4af37; /* Gold for cornerstone status */
            letter-spacing: 2px;
            margin-bottom: 50px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        a { 
            display: block; 
            margin: 30px auto; 
            text-decoration: none; 
            font-size: 1.2rem; 
            font-weight: bold;
            transition: 0.2s; 
            width: fit-content;
        }
        a:hover { 
            text-shadow: 0 0 10px currentColor; 
            transform: scale(1.05);
        }
        .metrics-bar {
            margin-top: 50px;
            color: #888;
            font-size: 0.8rem;
        }
        #timer { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Project NP: Sudoku Implementations</h1>
        
        <a href="solution.html" style="color: #00d4ff;">
            > Launch Adelic Transition Engine (O(N) Wasm)
        </a>
        
        <a href="legacy.html" style="color: #ff3333;">
            > Launch Legacy Branching Solver (O(N!))
        </a>

        <div class="metrics-bar">
            LAST INFERENCE LATENCY: <span id="timer">0.00</span>ms
        </div>
    </div>

    <script src="marilyn_engine.js"></script>

    <script>
        let marilynEngine;

        // Initialize the WASM Module
        Module.onRuntimeInitialized = () => {
            marilynEngine = {
                // cwrap binds the C 'solve_manifold' function to a JS function
                solve: Module.cwrap('solve_manifold', 'number', ['number', 'number'])
            };
            console.log("Adelic C-Core Grounded.");
        };

        /**
         * Core Execution Logic for the O(N) Demo
         * @param {number} N - The scale of the manifold (e.g., 9, 10, 16)
         * @param {Array} initialGrid - Flat array representing the planted invariants
         */
        async function runMarilynDemo(N, initialGrid) {
            if (!marilynEngine) {
                console.error("Engine not initialized.");
                return;
            }

            const start = performance.now();
            
            // Allocate memory in the WASM heap (8 bytes per uint64_t)
            const bytesPerCell = 8;
            const totalBytes = N * N * bytesPerCell;
            const ptr = Module._malloc(totalBytes);
            
            // Transfer logic: Copy JS array to WASM heap
            // Assuming initialGrid is a BigUint64Array or regular array
            let heapData = new BigUint64Array(Module.HEAPU8.buffer, ptr, N * N);
            for (let i = 0; i < initialGrid.length; i++) {
                heapData[i] = BigInt(initialGrid[i]);
            }

            // Execute the Marilyn Fold at hardware speed
            // This function exists within the compiled Adelic.c logic
            const status = marilynEngine.solve(N, ptr);

            if (status === 1) {
                console.log("AC: Hamiltonian Ground State Achieved.");
                // Optional: Read the solved grid back from 'ptr' here
            } else {
                console.log("RAF OVERFLOW: Impossible Manifold.");
            }
            
            // Cleanup to prevent memory leaks in the WASM manifold
            Module._free(ptr);
            
            const latency = (performance.now() - start).toFixed(2);
            document.getElementById('timer').innerText = `${latency}`;
        }
    </script>
</body>
</html>
